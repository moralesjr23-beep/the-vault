<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#c7a86a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Vault">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>The Vault — AJ's Fragrance Collection</title>
<style>
:root{
  --bg:#0b1020; --bg2:#111a2d; --panel:#162238; --panel2:#1d2b46; --border:#2d3d63;
  --text:#f5f7fb; --muted:#9fb0c9; --accent:#c7a86a; --good:#76d7aa; --warn:#e8c266; --bad:#f29b9b;
}
:root[data-theme="light"]{
  --bg:#f6f2ea; --bg2:#efe7db; --panel:#fffdf8; --panel2:#f5eee4; --border:#ddd1c0;
  --text:#1f2937; --muted:#667085; --accent:#8b6a37; --good:#166534; --warn:#9a6700; --bad:#b42318;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}
.app{max-width:1280px;margin:0 auto;padding:18px}
.top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.brand small{display:block;color:var(--accent);letter-spacing:.22em;text-transform:uppercase;font-size:11px}
.brand h1{margin:.2rem 0;font-size:36px}
.brand p{margin:0;color:var(--muted)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.grid{display:grid;gap:16px}
.cols-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.cols-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.cols-4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:24px;padding:16px}
button,input,select,textarea{font:inherit}
button,.tab{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:16px;padding:10px 14px;cursor:pointer}
.tab.active{border-color:var(--accent);background:var(--panel2)}
:root[data-theme="light"] .tab.active{background:#eadfcd;color:#1f2937}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.muted{color:var(--muted)}
.pill{display:inline-block;padding:5px 9px;border-radius:999px;border:1px solid var(--border);background:var(--panel2);font-size:12px;margin:2px 6px 2px 0}
input,select,textarea{width:100%;padding:12px 14px;border-radius:16px;border:1px solid var(--border);background:var(--panel2);color:var(--text)}
:root[data-theme="light"] input,:root[data-theme="light"] select,:root[data-theme="light"] textarea{background:#fff;color:#1f2937}
textarea{min-height:110px;resize:vertical}
.field{display:flex;flex-direction:column;gap:6px;min-width:220px;flex:1}
label{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted)}
.listbtn{width:100%;text-align:left;background:var(--panel2);border:1px solid var(--border);border-radius:18px;padding:14px;color:var(--text)}
.stat{padding:14px;border:1px solid var(--border);background:var(--panel2);border-radius:20px}
.num{font-size:28px;font-weight:700}
.good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
.hidden{display:none}

.small{font-size:12px}
.section-head{display:flex;justify-content:space-between;align-items:end;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.subtle{font-size:13px;color:var(--muted)}
.iconstat{display:flex;gap:12px;align-items:center;padding:16px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:22px}
.iconbubble{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(199,168,106,.16);font-size:22px}
.badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;font-weight:600}
.badge.good{background:rgba(118,215,170,.12)}
.badge.warn{background:rgba(232,194,102,.12)}
.badge.bad{background:rgba(242,155,155,.12)}
.meter{height:10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--border);overflow:hidden}
:root[data-theme="light"] .meter{background:rgba(31,41,55,.06)}
.meter>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#f0d7a0)}
.meter.good>span{background:linear-gradient(90deg,var(--good),#b5ebd0)}
.meter.warn>span{background:linear-gradient(90deg,var(--warn),#f2df9e)}
.meter.bad>span{background:linear-gradient(90deg,var(--bad),#f6c2c2)}
.chart-card{padding:14px;border:1px solid var(--border);border-radius:22px;background:linear-gradient(180deg,var(--panel2),var(--panel))}
.bar-list{display:grid;gap:10px}
.bar-row{display:grid;grid-template-columns:minmax(90px,130px) 1fr 34px;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--muted)}
.bar-track{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
:root[data-theme="light"] .bar-track{background:rgba(31,41,55,.08)}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#f0d7a0)}
.mini-note{font-size:12px;color:var(--muted);margin-top:6px}
.shelf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.shelf-card{padding:14px;border-radius:20px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel2),var(--panel))}
.frag-header{display:flex;justify-content:space-between;align-items:start;gap:10px}
.favorite-btn{padding:6px 10px;border-radius:12px;min-width:44px}
.empty-card{padding:24px;border:1px dashed var(--border);border-radius:22px;background:rgba(255,255,255,.02);text-align:center;color:var(--muted)}
.stack{display:grid;gap:12px}


@media (max-width: 760px){
  .app{padding:12px}
  .brand h1{font-size:28px}
  .tabs{overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch}
  .tabs .tab{flex:0 0 auto; white-space:nowrap}
  .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
  .field{min-width:100%}
  .card{padding:14px; border-radius:20px}
  .listbtn{
    display:block;
    width:100%;
    text-align:left;
    padding:14px;
    overflow:hidden;
  }
  .listbtn *{
    white-space:normal !important;
    overflow-wrap:anywhere;
    word-break:break-word;
  }
}


.collection-fragrance-card{
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(0,0.9fr) minmax(0,1.1fr) minmax(0,1.6fr);
  gap:14px;
  align-items:start;
}
.collection-fragrance-card .cf-block{min-width:0}
.collection-fragrance-card .cf-label{
  font-size:12px;
  color:var(--accent);
  margin-bottom:4px;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.collection-fragrance-card .cf-name{
  font-weight:700;
  font-size:1.05rem;
  line-height:1.15;
}
.collection-fragrance-card .cf-house,
.collection-fragrance-card .cf-meta{
  color:var(--muted);
}
.collection-fragrance-card .cf-value{
  white-space:normal;
  overflow-wrap:anywhere;
  word-break:break-word;
}
@media (max-width: 760px){
  .collection-fragrance-card{
    grid-template-columns:1fr;
    gap:10px;
  }
  .collection-fragrance-card .cf-name{
    font-size:1.15rem;
  }
}


:root{
  --bg:#f2f4f8;
  --bg2:#e9edf4;
  --panel:rgba(255,255,255,0.72);
  --panel2:rgba(255,255,255,0.62);
  --border:rgba(15,23,42,0.08);
  --text:#0f172a;
  --muted:#5b6473;
  --accent:#2563eb;
  --accent-soft:rgba(37,99,235,0.12);
  --good:#16a34a;
  --warn:#d97706;
  --bad:#dc2626;
  --shadow:0 18px 50px rgba(15,23,42,0.10), 0 4px 12px rgba(15,23,42,0.06);
}
:root[data-theme="dark"]{
  --bg:#0b1220;
  --bg2:#111827;
  --panel:rgba(17,24,39,0.72);
  --panel2:rgba(17,24,39,0.58);
  --border:rgba(255,255,255,0.08);
  --text:#f8fafc;
  --muted:#a9b4c7;
  --accent:#60a5fa;
  --accent-soft:rgba(96,165,250,0.14);
  --good:#4ade80;
  --warn:#fbbf24;
  --bad:#f87171;
  --shadow:0 20px 60px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.25);
}
html,body{
  background:
    radial-gradient(circle at top left, rgba(96,165,250,0.12), transparent 32%),
    radial-gradient(circle at top right, rgba(14,165,233,0.10), transparent 28%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
}
.app{max-width:1320px;padding:18px 16px 48px}
.top{
  position:sticky; top:0; z-index:30; padding:10px 0 14px;
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  background:linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0));
}
:root[data-theme="dark"] .top{
  background:linear-gradient(180deg, rgba(11,18,32,0.55), rgba(11,18,32,0));
}
.brand small{letter-spacing:.18em;font-size:10px}
.brand h1{font-size:32px;font-weight:800;letter-spacing:-0.03em}
.brand p{font-size:14px}
.card{
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  border-radius:28px;
  padding:18px;
}
button,input,select,textarea{transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .18s ease}
button,.tab{
  border:1px solid var(--border);
  background:linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.56));
  color:var(--text);
  border-radius:18px;
  padding:11px 14px;
  box-shadow:0 2px 6px rgba(15,23,42,0.06);
}
:root[data-theme="dark"] button,:root[data-theme="dark"] .tab{
  background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
}
button:hover,.tab:hover{transform:translateY(-1px)}
button:active,.tab:active{transform:scale(.985)}
.tab{
  border-radius:999px;
  padding:10px 16px;
  background:transparent;
}
.tab.active{
  background:var(--accent-soft);
  color:var(--accent);
  border-color:transparent;
  box-shadow:none;
}
.tabs{
  gap:8px;
  padding:6px;
  border-radius:999px;
  background:rgba(255,255,255,0.42);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border:1px solid var(--border);
}
:root[data-theme="dark"] .tabs{background:rgba(255,255,255,0.04)}
.kicker{font-size:11px;letter-spacing:.16em;color:var(--accent);font-weight:700}
.muted{color:var(--muted)}
.pill{
  padding:6px 10px;
  border-radius:999px;
  background:var(--accent-soft);
  border:1px solid transparent;
  color:var(--accent);
  font-weight:600;
}
input,select,textarea{
  width:100%;
  padding:13px 14px;
  border-radius:18px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.7);
  color:var(--text);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.35);
}
:root[data-theme="dark"] input,:root[data-theme="dark"] select,:root[data-theme="dark"] textarea{
  background:rgba(255,255,255,0.05);
}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft);
}
label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
.listbtn{
  width:100%;
  text-align:left;
  background:linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.68));
  border:1px solid var(--border);
  border-radius:22px;
  padding:16px;
  box-shadow:0 8px 24px rgba(15,23,42,0.06);
}
:root[data-theme="dark"] .listbtn{
  background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
}
.stat{
  padding:16px;
  border-radius:24px;
  border:1px solid var(--border);
  background:linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.68));
  box-shadow:var(--shadow);
}
:root[data-theme="dark"] .stat{
  background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
}
.num{font-size:30px;font-weight:800;letter-spacing:-0.03em}
.good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
.collection-fragrance-card{
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(0,0.9fr) minmax(0,1.1fr) minmax(0,1.6fr);
  gap:14px;
  align-items:start;
}
.collection-fragrance-card .cf-block{min-width:0}
.collection-fragrance-card .cf-label{font-size:11px;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.collection-fragrance-card .cf-name{font-weight:800;font-size:1.05rem;line-height:1.15;letter-spacing:-0.01em}
.collection-fragrance-card .cf-house,.collection-fragrance-card .cf-meta{color:var(--muted)}
.collection-fragrance-card .cf-value{white-space:normal;overflow-wrap:anywhere;word-break:break-word}
@media (max-width:760px){
  .app{padding:12px 12px 34px}
  .top{padding-top:8px}
  .brand h1{font-size:26px}
  .tabs{overflow:auto;white-space:nowrap;flex-wrap:nowrap}
  .tabs .tab{flex:0 0 auto}
  .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
  .field{min-width:100%}
  .card{border-radius:24px;padding:16px}
  .stat{border-radius:22px}
  .collection-fragrance-card{grid-template-columns:1fr;gap:10px}
  .collection-fragrance-card .cf-name{font-size:1.12rem}
  .listbtn *{white-space:normal!important;overflow-wrap:anywhere;word-break:break-word}
}


.toast-wrap{
  position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
  z-index:200; display:flex; flex-direction:column; gap:10px; pointer-events:none;
}
.toast{
  min-width:220px; max-width:min(92vw,420px);
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-radius:18px; padding:12px 14px; color:var(--text);
}
.toast.success{border-color:rgba(22,163,74,.28)}
.toast.warn{border-color:rgba(217,119,6,.28)}
.toast.error{border-color:rgba(220,38,38,.28)}
.sheet-backdrop{
  position:fixed; inset:0; background:rgba(15,23,42,.22); z-index:120;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:130;
  max-height:84vh; overflow:auto;
  border-top-left-radius:28px; border-top-right-radius:28px;
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  box-shadow:0 -14px 40px rgba(15,23,42,.18);
  padding:18px 16px calc(18px + env(safe-area-inset-bottom));
}
.empty-state{
  text-align:center; padding:22px 16px; border:1px dashed var(--border);
  border-radius:22px; color:var(--muted); background:rgba(255,255,255,.18)
}
.action-row-sticky{
  position:sticky; bottom:0; padding-top:10px;
  background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.72) 38%, rgba(255,255,255,.88));
}
:root[data-theme="dark"] .action-row-sticky{
  background:linear-gradient(180deg, rgba(11,18,32,0), rgba(11,18,32,.72) 38%, rgba(11,18,32,.88));
}
@media (max-width:760px){
  .sheet{padding-bottom:calc(18px + env(safe-area-inset-bottom))}
}


/* --- iPhone premium pass 2 --- */
:root{
  --hero-bg:linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.58));
  --card-highlight:rgba(255,255,255,.42);
  --ring:0 0 0 4px var(--accent-soft);
}
:root[data-theme="dark"]{
  --hero-bg:linear-gradient(180deg, rgba(17,24,39,.82), rgba(17,24,39,.66));
  --card-highlight:rgba(255,255,255,.04);
}
html,body{min-height:100%}
body{padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:1180px}
.top{
  position:sticky;
  top:0;
  z-index:40;
  margin-bottom:14px;
  padding:10px 0 12px;
}
.top::before{
  content:"";
  position:absolute;
  inset:2px -6px 0 -6px;
  border-radius:30px;
  background:var(--hero-bg);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  z-index:-1;
}
.brand{padding:6px 6px 2px}
.brand small{color:var(--accent);font-weight:700}
.brand h1{font-size:clamp(28px, 4vw, 42px);letter-spacing:-0.04em;line-height:1.02}
.brand p{font-size:15px}
.tabs{
  margin-top:8px;
  padding:7px;
  border-radius:999px;
  background:rgba(255,255,255,.34);
  border:1px solid var(--border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
}
:root[data-theme="dark"] .tabs{background:rgba(255,255,255,.03)}
.tab{
  min-height:44px;
  border-radius:999px;
  font-size:15px;
  padding:0 14px;
}
.tab.active{
  background:linear-gradient(180deg, rgba(37,99,235,.18), rgba(37,99,235,.12));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 8px 18px rgba(37,99,235,.16);
}
.card,.stat,.listbtn{position:relative;overflow:hidden}
.card::after,.stat::after,.listbtn::after{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--card-highlight), transparent);
  opacity:.9;
  pointer-events:none;
}
.card{border-radius:30px}
.stat{border-radius:26px}
.listbtn{border-radius:24px}
h3{letter-spacing:-0.03em}
.kicker{font-size:10px;letter-spacing:.22em}
.section-subtitle{max-width:58ch}
.icon-badge{
  width:38px;
  height:38px;
  border-radius:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.28);
}
button,.tab,.listbtn{-webkit-tap-highlight-color:transparent}
button:focus-visible,.tab:focus-visible,.listbtn:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:none;
  box-shadow:var(--ring);
}
.score-meter{height:13px}
.score-meter > span{filter:saturate(1.05)}
.collection-fragrance-card .cf-name{font-size:1.08rem}
.collection-fragrance-card .cf-house{font-size:15px}
.empty-state strong{font-size:1.02rem}
.sheet{
  border-top-left-radius:32px;
  border-top-right-radius:32px;
  padding-top:20px;
}
.sheet::before{
  content:"";
  display:block;
  width:42px;
  height:5px;
  border-radius:999px;
  background:rgba(15,23,42,.16);
  margin:0 auto 14px;
}
:root[data-theme="dark"] .sheet::before{background:rgba(255,255,255,.18)}
.toast{border-radius:20px}
.quick-actions{gap:10px}
@media (max-width:760px){
  .app{padding:10px 12px 30px}
  .top{padding-top:6px}
  .top::before{inset:0 -2px 0 -2px;border-radius:26px}
  .brand{padding:6px 4px 2px}
  .brand h1{font-size:23px}
  .brand p{font-size:13px}
  .tabs{padding:6px}
  .tab{min-height:42px;font-size:14px;padding:0 13px}
  .card{border-radius:26px}
  .stat{border-radius:22px}
  .listbtn{border-radius:22px}
}


/* --- Premium product identity pass --- */
:root{
  --brand-grad:linear-gradient(135deg, color-mix(in srgb, var(--accent) 88%, white), color-mix(in srgb, var(--accent) 52%, #7dd3fc));
  --soft-surface:linear-gradient(180deg, rgba(255,255,255,.86), rgba(255,255,255,.72));
  --hero-shadow:0 22px 60px rgba(15,23,42,.16), 0 6px 20px rgba(15,23,42,.08);
}
:root[data-theme="dark"]{
  --soft-surface:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.035));
  --hero-shadow:0 24px 60px rgba(0,0,0,.36), 0 6px 18px rgba(0,0,0,.24);
}
.brandmark{
  width:42px;height:42px;border-radius:14px;
  display:inline-flex;align-items:center;justify-content:center;

<body>
<div class="app" id="app"></div>
<script>
const OCCASIONS=["Plane","Office","Date","Casual","Gym","Evening"];
const ENVIRONMENTS=["Indoors","Mixed","Outdoors"];
const VIEWS=["Home","Collection","Wear","Layer","More"];
const WEATHER_KEY="vault_weather_pref";
const THEME_KEY="vault_theme";
const WEAR_KEY="vault_wear_log";
const JOURNAL_KEY="vault_journal";
const WISHLIST_KEY="vault_wishlist";

function makeUserFragranceObject(item){
  return {
    id: item.id || ("uf_" + Date.now()),
    h: item.house || "Custom",
    n: item.name || "Unnamed Fragrance",
    i: item.inspiration || "Original",
    d: (item.dna || "").split(",").map(x=>x.trim()).filter(Boolean),
    o: (item.occasions || "").split(",").map(x=>x.trim()).filter(Boolean),
    s: item.season || "All Season",
    r: Number(item.rating || 4),
    _userAdded: true
  };
}

function getAllCollection(){
  const base = Array.isArray(COLLECTION) ? COLLECTION.slice() : [];
  const added = (state.userFragrances||[]).map(makeUserFragranceObject);
  return [...base, ...added];
}

function startEditUserFragrance(id){
  const item = (state.userFragrances||[]).find(x=>x.id===id);
  if (!item) return;
  state.editingFragranceId = id;
  state.newFragrance = {
    house: item.house || "",
    name: item.name || "",
    inspiration: item.inspiration || "",
    dna: item.dna || "",
    occasions: item.occasions || "",
    season: item.season || "All Season",
    rating: String(item.rating || 4)
  };
}

function clearFragranceForm(){
  state.editingFragranceId = null;
  state.newFragrance = {house:"",name:"",inspiration:"",dna:"",occasions:"",season:"All Season",rating:"4"};
}

function pushToast(message, kind="success"){
  const id = "t_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
  state.toasts = [...(state.toasts||[]), {id, message, kind}].slice(-3);
  render();
  setTimeout(()=>{
    state.toasts = (state.toasts||[]).filter(t => t.id !== id);
    render();
  }, 2200);
}

function openSheet(name){
  state.activeSheet = name;
}

function closeSheet(){
  state.activeSheet = null;
  state.pendingDelete = null;
}

function isExpanded(key, defaultValue=false){
  if (!state.expandedSections) state.expandedSections = {};
  return typeof state.expandedSections[key] === "boolean" ? state.expandedSections[key] : defaultValue;
}

function saveOnboardingPref(){
  localStorage.setItem("vault_show_onboarding", JSON.stringify(!!state.showOnboarding));
}

function formatExplainBullets(items){
  return (items || []).map(x=>`<div class="explain-row">${esc(x)}</div>`).join("");
}

function getMoodReasoning(fragrance, mood){
  const dna = displayDNAList(fragrance).map(norm);
  const occ = simplifyOccasionList(fragrance);
  const season = norm(fragrance.s || "");
  const journal = typeof getJournalEntry === "function" ? getJournalEntry(fragrance.n) : {};
  const noteBag = `${norm(journal.moodTags||"")} ${norm(journal.notes||"")} ${norm(journal.complimentContext||"")}`;
  const m = norm(mood || "Any");
  const why = [];

  if (m === "clean"){
    if (dna.some(x=>["fresh","citrus","aquatic","musk / powdery","blue"].includes(x))) why.push("Its DNA sits on the cleaner, fresher side of the collection.");
    if (occ.includes("Office") || occ.includes("Casual")) why.push("Its occasion fit keeps it easy and controlled.");
  } else if (m === "cozy"){
    if (dna.some(x=>["amber","sweet","gourmand","woody","spicy"].includes(x))) why.push("Its warmer structure makes it feel more comforting.");
    if (/fall|winter/.test(season)) why.push("Its season fit supports cooler-weather wear.");
  } else if (m === "seductive"){
    if (occ.includes("Date") || occ.includes("Evening")) why.push("Its occasion fit is stronger for closer or more intimate settings.");
    if (dna.some(x=>["amber","sweet","spicy","gourmand"].includes(x))) why.push("Its richer DNA gives it more pull and presence.");
  } else if (m === "classy"){
    if (dna.some(x=>["woody","fougere","vetiver / earthy","musk / powdery"].includes(x))) why.push("Its more polished DNA reads sharper and more refined.");
    if (occ.includes("Office") || occ.includes("Date")) why.push("Its occasion fit works well when you want something composed.");
  } else if (m === "loud"){
    if (dna.some(x=>["amber","sweet","gourmand","spicy"].includes(x))) why.push("Its denser DNA helps it feel more attention-grabbing.");
    if (occ.includes("Evening")) why.push("Its use case already leans toward stronger wear.");
  } else if (m === "relaxing"){
    if (dna.some(x=>["musk / powdery","green","fresh","woody","vetiver / earthy"].includes(x))) why.push("Its softer DNA makes it easier to wear without effort.");
    if (occ.includes("Casual") || occ.includes("Office")) why.push("It fits quieter, lower-pressure situations.");
  }

  if (m !== "any" && noteBag.includes(m)) why.push("Your own notes or mood tags already connect it to this mood.");
  if (typeof isFavorite === "function" && isFavorite(fragrance.n)) why.push("It gets a small boost because you already flagged it as a favorite.");
  if (typeof getLastWornDate === "function" && !getLastWornDate(fragrance.n)) why.push("It gets a small boost because it has not been worn recently.");

  return why.slice(0,3);
}

function getBuySkipReasonRows(analysis){
  const rows = [];
  rows.push(analysis.reason || "No verdict reason available.");
  if (analysis.overlaps && analysis.overlaps.length){
    const top = analysis.overlaps[0];
    rows.push(`Closest overlap: ${top.item.n}.`);
    if (top.overlap.sharedDNA && top.overlap.sharedDNA.length) rows.push(`Shared DNA: ${top.overlap.sharedDNA.join(", ")}.`);
    if (top.overlap.sharedOccasion && top.overlap.sharedOccasion.length) rows.push(`Shared occasions: ${top.overlap.sharedOccasion.join(", ")}.`);
  } else {
    rows.push("There is no close overlap in the current collection, which helps it fill a clearer lane.");
  }
  return rows.slice(0,4);
}

function sortCollectionItems(items, mode){
  const arr = items.slice();
  if (mode === "House") return arr.sort((a,b)=>(a.h||"").localeCompare(b.h||"") || (a.n||"").localeCompare(b.n||""));
  if (mode === "Season") return arr.sort((a,b)=>(a.s||"").localeCompare(b.s||"") || (a.n||"").localeCompare(b.n||""));
  if (mode === "Favorites") return arr.sort((a,b)=>(isFavorite(b.n)?1:0)-(isFavorite(a.n)?1:0) || (a.n||"").localeCompare(b.n||""));
  return arr.sort((a,b)=>(a.n||"").localeCompare(b.n||""));
}

function exportAllAppData(){
  const payload = {
    exportedAt: new Date().toISOString(),
    userFragrances: state.userFragrances || [],
    wearLog: state.wearLog || [],
    savedLayerCombos: state.savedLayerCombos || [],
    favorites: JSON.parse(localStorage.getItem("vault_favorites") || "[]"),
    savedDisplays: JSON.parse(localStorage.getItem("vault_saved_displays") || "[]"),
    settings: {
      theme: state.theme,
      weatherPref: state.weatherPref,
      collectionSort: state.collectionSort
    }
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "vault-backup.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function importAllAppDataFromText(textValue){
  try{
    const payload = JSON.parse(textValue);
    if (!payload || typeof payload !== "object") return {ok:false, message:"Backup file is not valid."};
    if (Array.isArray(payload.userFragrances)) state.userFragrances = payload.userFragrances;
    if (Array.isArray(payload.wearLog)) state.wearLog = payload.wearLog;
    if (Array.isArray(payload.savedLayerCombos)) state.savedLayerCombos = payload.savedLayerCombos;
    if (Array.isArray(payload.favorites)) localStorage.setItem("vault_favorites", JSON.stringify(payload.favorites));
    if (Array.isArray(payload.savedDisplays)) localStorage.setItem("vault_saved_displays", JSON.stringify(payload.savedDisplays));
    if (payload.settings && typeof payload.settings === "object"){
      if (payload.settings.theme) state.theme = payload.settings.theme;
      if (payload.settings.weatherPref) state.weatherPref = payload.settings.weatherPref;
      if (payload.settings.collectionSort) state.collectionSort = payload.settings.collectionSort;
    }
    saveUserFragrances();
    saveWearLog();
    saveLayerCombos();
    saveTheme();
    saveWeatherPref();
    return {ok:true};
  }catch(e){
    return {ok:false, message:"Import file is not valid JSON."};
  }
}

function confirmDeleteUserFragrance(id, name){
  state.pendingDelete = {type:"userFragrance", id, name};
  openSheet("confirmDelete");
}

function sheetView(){
  if (!state.activeSheet) return "";
  if (state.activeSheet === "addFragrance"){
    return `<div class="sheet-backdrop" id="sheetBackdrop"></div>
      <div class="sheet">
        <div class="row" style="justify-content:space-between;align-items:start">
          <div>
            <div class="kicker">Collection</div>
            <h3 style="margin:.2rem 0">${state.editingFragranceId ? "Edit fragrance" : "Add fragrance"}</h3>
            <div class="muted">User-added fragrances are stored in this browser on this device.</div>
          </div>
          <button id="closeSheetBtn" type="button">Close</button>
        </div>
        <div class="grid cols-3" style="margin-top:14px">
          <div class="field"><label>House</label><input id="newFragranceHouse" value="${esc(state.newFragrance.house)}"></div>
          <div class="field"><label>Name</label><input id="newFragranceName" value="${esc(state.newFragrance.name)}"></div>
          <div class="field"><label>Inspired by / style</label><input id="newFragranceInspiration" value="${esc(state.newFragrance.inspiration)}"></div>
        </div>
        <div class="grid cols-3" style="margin-top:12px">
          <div class="field"><label>DNA (comma separated)</label><input id="newFragranceDNA" value="${esc(state.newFragrance.dna)}"></div>
          <div class="field"><label>Occasions (comma separated)</label><input id="newFragranceOccasions" value="${esc(state.newFragrance.occasions)}"></div>
          <div class="field"><label>Season</label><select id="newFragranceSeason">${["All Season","Spring","Summer","Fall","Winter","Year-round","Spring · Summer","Fall · Winter"].map(x=>`<option ${state.newFragrance.season===x?"selected":""}>${x}</option>`).join("")}</select></div>
        </div>
        <div class="grid cols-3" style="margin-top:12px">
          <div class="field"><label>Rating</label><select id="newFragranceRating">${["1","2","3","4","5"].map(x=>`<option ${String(state.newFragrance.rating)===x?"selected":""}>${x}</option>`).join("")}</select></div>
        </div>
        <div class="action-row-sticky">
          <div class="row" style="margin-top:12px">
            <button id="saveNewFragrance" type="button">${state.editingFragranceId ? "Update fragrance" : "Add fragrance"}</button>
            <button id="clearNewFragranceForm" type="button">Clear</button>
          </div>
        </div>
      </div>`;
  }
  if (state.activeSheet === "backupTools"){
    return `<div class="sheet-backdrop" id="sheetBackdrop"></div>
      <div class="sheet">
        <div class="row" style="justify-content:space-between;align-items:start">
          <div><div class="kicker">Backup</div><h3 style="margin:.2rem 0">Export or import app data</h3><div class="muted">Includes user-added fragrances, favorites, wear log, saved combos, saved displays, and settings.</div></div>
          <button id="closeSheetBtn" type="button">Close</button>
        </div>
        <div class="grid cols-2" style="margin-top:16px">
          <div class="card"><div class="kicker">Export</div><div style="margin-top:8px">Create one backup file for the app.</div><div class="row" style="margin-top:12px"><button id="exportAllData" type="button">Export all data</button></div></div>
          <div class="card"><div class="kicker">Import</div><div style="margin-top:8px">Restore from a previous backup file.</div><div class="row" style="margin-top:12px"><label class="tab" style="display:inline-flex;align-items:center;gap:8px;cursor:pointer">Import backup<input id="importAllData" type="file" accept=".json,application/json" style="display:none"></label></div></div>
        </div>
      </div>`;
  }
  if (state.activeSheet === "confirmDelete" && state.pendingDelete){
    return `<div class="sheet-backdrop" id="sheetBackdrop"></div>
      <div class="sheet">
        <div class="kicker">Confirm delete</div>
        <h3 style="margin:.2rem 0">${esc(state.pendingDelete.name || "Delete item")}</h3>
        <div class="muted">This will remove the item from your local app data on this device.</div>
        <div class="row" style="margin-top:16px">
          <button id="confirmDeleteBtn" type="button">Delete</button>
          <button id="closeSheetBtn" type="button">Cancel</button>
        </div>
      </div>`;
  }
  return "";
}


function getMoreSections(){
  return ["Display","Buy or Skip","Hobby Lab"];
}
function getPrimaryViewLabel(view){
  if (view === "Wear Today") return "Wear";
  if (view === "Layering") return "Layer";
  if (getMoreSections().includes(view)) return "More";
  return view;
}
function getCurrentMoreSection(){
  return getMoreSections().includes(state.view) ? state.view : "Display";
}
function toastView(){
  if (!state.toasts || !state.toasts.length) return "";
  return `<div class="toast-wrap">
    ${state.toasts.map(t=>`<div class="toast ${esc(t.kind)}">${esc(t.message)}</div>`).join("")}
  </div>`;
}

function upsertUserFragranceFromForm(){
  const payload = {
    id: state.editingFragranceId || ("uf_" + Date.now()),
    house: (state.newFragrance.house||"").trim(),
    name: (state.newFragrance.name||"").trim(),
    inspiration: (state.newFragrance.inspiration||"").trim(),
    dna: (state.newFragrance.dna||"").trim(),
    occasions: (state.newFragrance.occasions||"").trim(),
    season: (state.newFragrance.season||"").trim() || "All Season",
    rating: String(state.newFragrance.rating||"4").trim() || "4"
  };
  if (!payload.name) return {ok:false, message:"Name is required."};

  state.userFragrances = state.userFragrances || [];
  const idx = state.userFragrances.findIndex(x=>x.id===payload.id);
  if (idx >= 0) state.userFragrances[idx] = payload;
  else state.userFragrances.unshift(payload);
  saveUserFragrances();
  clearFragranceForm();
  return {ok:true};
}

function deleteUserFragrance(id){
  state.userFragrances = (state.userFragrances||[]).filter(x=>x.id!==id);
  saveUserFragrances();
  if (state.editingFragranceId === id) clearFragranceForm();
}

function exportUserFragrances(){
  const blob = new Blob([JSON.stringify(state.userFragrances||[], null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "vault-user-fragrances.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function importUserFragrancesFromText(textValue){
  try{
    const parsed = JSON.parse(textValue);
    if (!Array.isArray(parsed)) return {ok:false, message:"Import file must contain an array."};
    state.userFragrances = parsed;
    saveUserFragrances();
    clearFragranceForm();
    return {ok:true};
  }catch(e){
    return {ok:false, message:"Import file is not valid JSON."};
  }
}

      if (dna.includes("citrus")) score += 3;
      if (dna.includes("aquatic")) score += 3;
      if (dna.includes("blue")) score += 2;
      if (dna.includes("musk / powdery")) score += 3;
      if (dna.includes("green")) score += 2;
    } else if (mood === "cozy"){
      if (dna.includes("amber")) score += 4;
      if (dna.includes("sweet")) score += 3;
      if (dna.includes("gourmand")) score += 4;
      if (dna.includes("woody")) score += 2;
      if (dna.includes("spicy")) score += 2;
      if (dna.includes("musk / powdery")) score += 1;
    } else if (mood === "seductive"){
      if (dna.includes("amber")) score += 4;
      if (dna.includes("sweet")) score += 3;
      if (dna.includes("spicy")) score += 3;
      if (dna.includes("gourmand")) score += 3;
      if (dna.includes("woody")) score += 2;
      if (dna.includes("blue")) score += 1;
    } else if (mood === "classy"){
      if (dna.includes("woody")) score += 4;
      if (dna.includes("fougere")) score += 4;
      if (dna.includes("vetiver / earthy")) score += 4;
      if (dna.includes("musk / powdery")) score += 3;
      if (dna.includes("fresh")) score += 1;
      if (dna.includes("blue")) score += 1;
    } else if (mood === "loud"){
      if (dna.includes("amber")) score += 4;
      if (dna.includes("sweet")) score += 4;
      if (dna.includes("gourmand")) score += 4;
      if (dna.includes("spicy")) score += 3;
      if (dna.includes("blue")) score += 1;
    } else if (mood === "relaxing"){
      if (dna.includes("musk / powdery")) score += 4;
      if (dna.includes("green")) score += 3;
      if (dna.includes("fresh")) score += 2;
      if (dna.includes("woody")) score += 2;
      if (dna.includes("aquatic")) score += 1;
      if (dna.includes("vetiver / earthy")) score += 2;
    }
    return score;
  }

  function moodOccasionScore(occasions, mood){
    let score = 0;
    if (mood === "clean" && (occasions.includes("Office") || occasions.includes("Casual") || occasions.includes("Gym"))) score += 3;
    if (mood === "cozy" && (occasions.includes("Casual") || occasions.includes("Evening"))) score += 2;
    if (mood === "seductive" && (occasions.includes("Date") || occasions.includes("Evening"))) score += 4;
    if (mood === "classy" && (occasions.includes("Office") || occasions.includes("Date"))) score += 3;
    if (mood === "loud" && occasions.includes("Evening")) score += 4;
    if (mood === "relaxing" && (occasions.includes("Casual") || occasions.includes("Office"))) score += 2;
    return score;
  }

  function moodSeasonScore(seasonText, mood){
    const season = norm(seasonText || "");
    let score = 0;
    if (mood === "cozy" && (/fall|winter/.test(season))) score += 3;
    if (mood === "clean" && (/spring|summer|year-round|all season/.test(season))) score += 2;
    if (mood === "classy" && (/year-round|all season|spring|fall/.test(season))) score += 2;
    if (mood === "relaxing" && (/spring|summer|year-round|all season/.test(season))) score += 1;
    if (mood === "loud" && (/fall|winter|evening/.test(season))) score += 1;
    return score;
  }

  function moodJournalScore(journal, mood){
    const tags = norm(journal.moodTags || "");
    const notes = norm(journal.notes || "");
    const context = norm(journal.complimentContext || "");
    const bag = `${tags} ${notes} ${context}`;
    let score = 0;
    if (bag.includes(mood)) score += 6;
    if (mood === "classy" && /office|formal|sharp|polished|refined|luxury/.test(bag)) score += 3;
    if (mood === "clean" && /clean|fresh|shower|crisp|easy/.test(bag)) score += 3;
    if (mood === "cozy" && /cozy|warm|comfort|soft/.test(bag)) score += 3;
    if (mood === "seductive" && /date|sexy|seductive|close/.test(bag)) score += 3;
    if (mood === "loud" && /loud|beast|strong|projection|attention/.test(bag)) score += 3;
    if (mood === "relaxing" && /relax|calm|easy|soft|peaceful/.test(bag)) score += 3;
    return score;
  }

  function moodHistoryScore(name){
    const log = (state.wearLog || []).filter(x => x.fragrance === name);
    if (!log.length) return 2;
    return 0;
  }

  function moodFavoriteScore(name){
    return (typeof isFavorite === "function" && isFavorite(name)) ? 2 : 0;
  }

  function moodUniquenessScore(fragrance, mood){
    const dna = displayDNAList(fragrance).map(norm);
    const overlapScores = all.filter(x => x.n !== fragrance.n).map(x => {
      let overlap = 0;
      displayDNAList(x).map(norm).forEach(tag => { if (dna.includes(tag)) overlap += 1; });
      return overlap;
    }).sort((a,b)=>b-a);
    const topOverlap = overlapScores[0] || 0;
    if (mood === "classy" || mood === "seductive") return topOverlap <= 2 ? 2 : 0;
    if (mood === "clean" || mood === "relaxing") return topOverlap <= 3 ? 1 : 0;
    return 0;
  }

  if (moodNorm === "any"){
    return all.slice(0, limit);
  }

  const ranked = all.map(f => {
    const dna = displayDNAList(f).map(norm);
    const occasions = simplifyOccasionList(f);
    const journal = getJournalEntry(f.n);
    let score = 0;

    score += moodDNAScore(dna, moodNorm);
    score += moodOccasionScore(occasions, moodNorm);
    score += moodSeasonScore(f.s || "", moodNorm);
    score += moodJournalScore(journal, moodNorm);
    score += moodFavoriteScore(f.n);
    score += moodHistoryScore(f.n);
    score += moodUniquenessScore(f, moodNorm);

    return { item: f, score };
  }).sort((a,b) => b.score - a.score || a.item.n.localeCompare(b.item.n));

  return ranked.slice(0, limit).map(x => x.item);
}

function displayDNAList(f){
  const raw = dnatags(f);
  const scores = {
    "Fresh":0,
    "Citrus":0,
    "Aquatic":0,
    "Blue":0,
    "Green":0,
    "Woody":0,
    "Vetiver / Earthy":0,
    "Fougere":0,
    "Musk / Powdery":0,
    "Amber":0,
    "Sweet":0,
    "Spicy":0,
    "Gourmand":0
  };

  const bump = (key, n=1) => { scores[key] += n; };
  const hasAny = (text, words) => words.some(word => text.includes(word));

  raw.forEach(tag => {
    const t = norm(tag);

    if (hasAny(t, ["fresh","clean","airy","soap","soapy","tea","crisp","bright","easy wear","freshness"])) bump("Fresh", 2);
    if (hasAny(t, ["citrus","orange","bergamot","lemon","lime","grapefruit","neroli","orange blossom","mandarin"])) bump("Citrus", 2);
    if (hasAny(t, ["aquatic","marine","watery","salty","ocean","beach"])) bump("Aquatic", 2);
    if (hasAny(t, ["blue"])) bump("Blue", 2);
    if (hasAny(t, ["green","grassy","herbal","mossy","minty"])) bump("Green", 2);
    if (hasAny(t, ["woody","woods","wood","patchouli","sandalwood","cedar","palo santo"])) bump("Woody", 2);
    if (hasAny(t, ["vetiver","earthy","mineral","earthiness"])) bump("Vetiver / Earthy", 3);
    if (hasAny(t, ["fougere","aromatic","lavender","barbershop","shaving cream"])) bump("Fougere", 2);
    if (hasAny(t, ["musk","musky","powdery","powder","iris"])) bump("Musk / Powdery", 2);
    if (hasAny(t, ["amber","ambered","amberwood","benzoin","resinous","incense"])) bump("Amber", 2);
    if (hasAny(t, ["sweet","sweetness","vanilla","sugary","sugar","hazelnut","honey","praline","fruity","apple","pear","pineapple","melon","mango","plum","cherry","coconut","floral","rose"])) bump("Sweet", 1);
    if (hasAny(t, ["spice","spicy","pepper","ginger","cinnamon","cardamom","saffron"])) bump("Spicy", 2);
    if (hasAny(t, ["gourmand","coffee","chocolate","caramel","dessert","boozy","rum","tonka","tobacco","oud","smoke","smoky","chestnut","cacao"])) bump("Gourmand", 2);

    // relationship nudges
    if (hasAny(t, ["aquatic","marine"])) bump("Fresh", 1)
    if (hasAny(t, ["citrus"])) bump("Fresh", 1)
    if (hasAny(t, ["neroli","iris","musk"])) bump("Musk / Powdery", 1)
    if (hasAny(t, ["lavender","aromatic"])) bump("Fougere", 1)
    if (hasAny(t, ["amber","vanilla","benzoin"])) bump("Sweet", 1)
    if (hasAny(t, ["tobacco","oud","coffee","chocolate"])) bump("Amber", 1)
  });

  // avoid noisy overlaps
  if (scores["Aquatic"] > 0) scores["Fresh"] += 1;
  if (scores["Citrus"] > 0) scores["Fresh"] += 1;
  if (scores["Vetiver / Earthy"] > 0) scores["Woody"] += 1;
  if (scores["Fougere"] > 0) scores["Fresh"] += 1;
  if (scores["Gourmand"] > 0 && scores["Sweet"] > 0) scores["Sweet"] += 1;

  // choose the strongest buckets only
  let ranked = Object.entries(scores)
    .filter(([,score]) => score > 0)
    .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]))
    .map(([name]) => name);

  // clean up common over-tagging patterns
  if (ranked.includes("Gourmand") && ranked.includes("Sweet")) {
    ranked = ranked.filter(x => x !== "Sweet").concat(["Sweet"]);
  }
  if (ranked.includes("Vetiver / Earthy") && ranked.includes("Woody")) {
    // keep both, but Vetiver / Earthy should stay ahead
    ranked = ranked.filter(x => x !== "Vetiver / Earthy");
    ranked.unshift("Vetiver / Earthy");
  }
  if (ranked.includes("Aquatic") && ranked.includes("Blue") && ranked.includes("Fresh")) {
    // keep all three only if they are genuinely core
    ranked = ranked.slice(0, 4);
  }

  // keep DNA cleaner and more intentional
  ranked = ranked.slice(0, 3);

  return ranked.length ? ranked : ["Fresh"];
}

function getWeatherAdjustedWeights(baseWeights, weather){
  const w = {...baseWeights};
  const temp = weather && typeof weather.temp==="number" ? weather.temp : null;
  if (temp !== null){
    if (temp <= 55){
      w["amber"] = (w["amber"]||0) + 2;
      w["woody"] = (w["woody"]||0) + 1;
      w["spicy"] = (w["spicy"]||0) + 1;
      w["fresh"] = (w["fresh"]||0) - 1;
      w["aquatic"] = (w["aquatic"]||0) - 2;
    }
    if (temp >= 82){
      w["fresh"] = (w["fresh"]||0) + 2;
      w["citrus"] = (w["citrus"]||0) + 1;
      w["aquatic"] = (w["aquatic"]||0) + 1;
      w["amber"] = (w["amber"]||0) - 2;
      w["gourmand"] = (w["gourmand"]||0) - 3;
    }
  }
  return w;
}

function scoreFragrance(f, weights, weather=null, environment="Mixed"){
  const dna = displayDNAList(f).map(norm);
  let score = f.r || 0;
  dna.forEach(tag=> score += (weights[tag]||0));
  const temp = weather && typeof weather.temp==="number" ? weather.temp : null;
  if (temp !== null){
    if (temp <= 55){
      if (norm(f.s).includes("fall") || norm(f.s).includes("winter") || norm(f.s).includes("year-round")) score += 2;
      if (dna.includes("aquatic")) score -= 2;
      if (dna.includes("amber") || dna.includes("woody") || dna.includes("spicy")) score += 1;
    }
    if (temp >= 82){
      if (dna.includes("fresh") || dna.includes("citrus") || dna.includes("aquatic") || dna.includes("blue")) score += 2;
      if (dna.includes("amber") || dna.includes("gourmand")) score -= 3;
    }
  }
  if (environment==="Indoors"){
    if (dna.includes("gourmand")) score -= 2;
    if (dna.includes("fresh") || dna.includes("woody") || dna.includes("musk / powdery")) score += 1;
  }
  return score;
}

function pickTop(items, weights, count=3, weather=null, environment="Mixed"){
  const ranked = [...items].map(item=>({item, score:scoreFragrance(item, weights, weather, environment)})).sort((a,b)=>b.score-a.score);
  const out=[], seen=new Set();
  for (const row of ranked){
    if (seen.has(row.item.n)) continue;
    seen.add(row.item.n);
    out.push(row.item);
    if (out.length>=count) break;
  }
  return out;
}

function getPlaneSafetyLevel(f){
  const dna = displayDNAList(f).map(norm);
  const occasions = simplifyOccasionList(f);
  const rich = dna.includes("amber") || dna.includes("sweet") || dna.includes("gourmand") || dna.includes("spicy");
  const veryRisky = dna.includes("gourmand") || ((f.i||"").toLowerCase().includes("oud"));
  const freshCore = dna.some(x=>["fresh","citrus","musk / powdery","woody","vetiver / earthy","blue","aquatic","green","fougere"].includes(x));
  const officeLike = occasions.includes("Office") || occasions.includes("Casual") || occasions.includes("Gym");

  if (veryRisky) return "Not Plane Safe";
  if (freshCore && !rich) return "Plane Safe";
  if ((freshCore && rich) || officeLike) return "Safe Enough";
  return "Not Plane Safe";
}

function getLayerWeatherGuidance(weather){
  const temp = weather && typeof weather.temp === "number" ? weather.temp : null;
  const humidity = weather && typeof weather.humidity === "number" ? weather.humidity : null;
  const wind = weather && typeof weather.wind === "number" ? weather.wind : null;
  const rain = weather ? [61,63,65,80,81,82].includes(weather.code) : false;

  if (humidity !== null && humidity >= 70) {
    return {badge:"High humidity — go light", note:"Humidity amplifies projection and weight, so keep the blend cleaner and lighter than you would in dry air."};
  }
  if (temp !== null && temp <= 50) {
    return {badge:"Cool air — richer works", note:"Cooler air gives richer or woodier blends more room to breathe without feeling overwhelming."};
  }
  if (temp !== null && temp >= 82) {
    return {badge:"Heat — stay fresh", note:"Warm weather makes dense blends expand faster, so fresher and cleaner layering works better."};
  }
  if (rain) {
    return {badge:"Rainy weather — keep it smooth", note:"Rain favors cleaner woods, musks, fougeres, and vetiver styles over loud sugary blends."};
  }
  if (wind !== null && wind >= 15) {
    return {badge:"Windy — use structure", note:"Wind can thin out very soft scents, so blends with some woody or aromatic backbone hold up better."};
  }
  return {badge:"Balanced conditions", note:"The weather is neutral enough that balance matters more than raw strength."};
}

function getLayerSuggestions(collection, occasion, weather, count=8){
  const pool = getWearTodayPicks(collection, occasion === "Plane" ? "Office" : occasion, weather, "Mixed", 14);
  const combos = [];
  for (let i = 0; i < pool.length; i++) {
    for (let j = 0; j < pool.length; j++) {
      if (i === j) continue;
      const base = pool[i];
      const top = pool[j];
      const res = getLayeringAnalysis(base, top);
      if (res.score >= 6) combos.push({base, top, res});
    }
  }
  combos.sort((a,b)=>b.res.score-a.res.score);
  const out = [];
  const seen = new Set();
  for (const combo of combos) {
    const key = combo.base.n + "||" + combo.top.n;
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(combo);
    if (out.length >= count) break;
  }
  return out;
}

function getLayerTags(base, top, weather){
  const bd = displayDNAList(base).map(norm);
  const td = displayDNAList(top).map(norm);
  const tags = [];
  const add = t => { if (t && !tags.includes(t)) tags.push(t); };

  if ((bd.includes("fresh") || bd.includes("citrus") || bd.includes("aquatic") || bd.includes("blue")) &&
      (td.includes("woody") || td.includes("musk / powdery") || td.includes("fougere"))) add("freshen up");
  if ((bd.includes("woody") || bd.includes("vetiver / earthy") || bd.includes("fougere")) &&
      (td.includes("musk / powdery") || td.includes("fresh"))) add("smooth out");
  if (td.includes("amber") || td.includes("sweet") || td.includes("gourmand") || td.includes("spicy")) add("darken up");
  if (td.includes("sweet") || td.includes("gourmand")) add("sweeten up");
  if (td.includes("fresh") || td.includes("citrus") || td.includes("blue")) add("sharpen the opening");

  const temp = weather && typeof weather.temp === "number" ? weather.temp : null;
  if (temp !== null && temp >= 82 && (bd.includes("sweet") || td.includes("sweet") || bd.includes("gourmand") || td.includes("gourmand"))) add("too sweet for heat");
  if ((bd.includes("gourmand") && td.includes("aquatic")) || (bd.includes("amber") && td.includes("aquatic")) || (bd.includes("gourmand") && td.includes("green"))) add("muddy drydown risk");
  if ((td.includes("fresh") || td.includes("citrus") || td.includes("aquatic")) && !(bd.includes("woody") || bd.includes("amber") || bd.includes("fougere"))) add("top may disappear fast");

  return tags;
}

function getCandidateOverlap(candidate, existing){
  const cdna = (candidate.dna||[]).map(x => x.toLowerCase());
  const edna = displayDNAList(existing).map(x => x.toLowerCase());
  const sharedDNA = cdna.filter(x => edna.includes(x));
  const sharedOccasion = (candidate.occasions||[]).filter(x => simplifyOccasionList(existing).includes(x));
  let score = sharedDNA.length * 2 + sharedOccasion.length;
  if ((candidate.inspiration||"").trim() && (existing.i||"").trim() && candidate.inspiration.trim().toLowerCase() === existing.i.trim().toLowerCase()) score += 4;
  if ((candidate.season||"").trim() && (existing.s||"").toLowerCase().includes((candidate.season||"").trim().toLowerCase())) score += 1;
  return {score, sharedDNA, sharedOccasion};
}

function getBuySkipAnalysis(){
  const source = (state.buy && (state.buy.name || state.buy.house || state.buy.inspiration || state.buy.dna || state.buy.occasions)) ? state.buy : (state.buyDraft || state.buy);
  const candidate = {
    name: (source.name||"").trim(),
    house: (source.house||"").trim(),
    inspiration: (source.inspiration||"").trim(),
    dna: (source.dna||"").split(",").map(x=>x.trim()).filter(Boolean),
    occasions: (source.occasions||"").split(",").map(x=>x.trim()).filter(Boolean),
    season: (source.season||"").trim()
  };
  if (!candidate.name && !candidate.inspiration && !candidate.dna.length) {
    return {verdict:"Add candidate details", reason:"Enter at least a name plus DNA or inspiration to compare it.", overlaps:[]};
  }

  const overlaps = getAllCollection().map(item => ({
    item,
    overlap: getCandidateOverlap(candidate, item)
  })).sort((a,b)=>b.overlap.score-a.overlap.score).slice(0,5);

  const best = overlaps[0];
  let verdict = "Worth considering";
  let reason = "It looks different enough to fill a useful gap.";

  if (best) {
    if (best.overlap.score >= 9) {
      verdict = "Good but redundant";
      reason = `It overlaps heavily with ${best.item.n}, so it does not add much new value unless you want a different twist on that lane.`;
    } else if (best.overlap.score >= 6) {
      verdict = "Interesting but unnecessary";
      reason = `It still sits fairly close to ${best.item.n}, so it is more of a sidegrade than a true gap filler.`;
    } else if (best.overlap.score >= 3) {
      verdict = "Worth considering";
      reason = `There is some overlap with ${best.item.n}, but it still looks different enough to justify itself if you want that profile.`;
    } else {
      verdict = "Strong add";
      reason = "It does not appear heavily covered by what you already own.";
    }
  }

  return {candidate, verdict, reason, overlaps};
}

}

function getWearTodayScore(f, occasion, weather, environment){
  const dna = displayDNAList(f).map(norm);
  const ctx = getWeatherContext(weather, environment);
  let score = scoreFragrance(f, getWeatherAdjustedWeights(WEIGHTS[occasion]||{}, weather), weather, environment);

  if (ctx.temp !== null){
    if (ctx.temp <= 50){
      if (dna.some(x=>["amber","woody","spicy","gourmand","vetiver / earthy"].includes(x))) score += 3;
      if (dna.some(x=>["aquatic","fresh","citrus"].includes(x)) && environment !== "Indoors") score -= 2;
    } else if (ctx.temp <= 65){
      if (dna.some(x=>["woody","fresh","fougere","vetiver / earthy","musk / powdery"].includes(x))) score += 2;
    } else if (ctx.temp <= 80){
      if (dna.some(x=>["fresh","citrus","blue","green","musk / powdery"].includes(x))) score += 2;
      if (dna.includes("gourmand")) score -= 1;
    } else {
      if (dna.some(x=>["fresh","citrus","aquatic","blue","green"].includes(x))) score += 3;
      if (dna.some(x=>["amber","gourmand","spicy"].includes(x))) score -= 3;
    }
  }

  if (ctx.humidity !== null){
    if (ctx.humidity >= 75){
      if (dna.some(x=>["fresh","citrus","aquatic","green","musk / powdery"].includes(x))) score += 2;
      if (dna.some(x=>["amber","gourmand","sweet"].includes(x))) score -= 2;
    }
  }

  if (ctx.wind !== null){
    if (ctx.wind >= 12 && environment !== "Indoors"){
      if (dna.some(x=>["woody","amber","blue","fougere"].includes(x))) score += 1;
      if (dna.some(x=>["musk / powdery","aquatic"].includes(x))) score -= 1;
    }
  }

  if (ctx.rain){
    if (dna.some(x=>["woody","vetiver / earthy","fougere","musk / powdery"].includes(x))) score += 2;
    if (dna.some(x=>["aquatic","marine"].includes(x))) score -= 1;
  }

  if (environment === "Indoors"){
    if (dna.some(x=>["musk / powdery","woody","fougere","fresh"].includes(x))) score += 2;
    if (dna.some(x=>["gourmand","sweet","amber"].includes(x))) score -= 1;
  } else if (environment === "Outdoors"){
    if (dna.some(x=>["fresh","green","blue","woody"].includes(x))) score += 1;
  }

  const occasions = simplifyOccasionList(f);
  if (occasions.includes(occasion)) score += 2;

  return score;
}

function getWearTodayPicks(collection, occasion, weather, environment, count=5){
  let pool = collection.slice();

  // Start with a whole-collection mood ranking if a mood is selected.
  if (state.wearMood && state.wearMood !== "Any") {
    const moodRanked = getMoodCandidates(state.wearMood, collection.length || 200);
    if (moodRanked.length) pool = moodRanked.slice();
  }

  const recentMap = {};
  (state.wearLog || []).forEach(entry => {
    if (!recentMap[entry.fragrance]) recentMap[entry.fragrance] = entry.date || "";
  });

  const ranked = [...pool].map(f => {
    const occasions = simplifyOccasionList(f);
    let score = occasion === "Plane"
      ? getWearTodayScore(f, "Plane", weather, environment)
      : getWearTodayScore(f, occasion, weather, environment);

    // Soft occasion weighting across the full collection instead of hard filtering.
    if (occasions.includes(occasion)) score += 5;
    else if (occasion !== "Plane" && occasions.includes("Casual")) score += 1;

    // Plane safety should strongly influence ranking.
    if (occasion === "Plane") {
      const planeLevel = getPlaneSafetyLevel(f);
      if (planeLevel === "Plane Safe") score += 5;
      else if (planeLevel === "Safe Enough") score += 1;
      else score -= 12;
    }

    // Strategy tuning
    const dna = displayDNAList(f).map(norm);
    if (state.wearStrategy === "Most unique") {
      const overlapScores = collection.filter(x => x.n !== f.n).map(x => {
        let overlap = 0;
        displayDNAList(x).map(norm).forEach(tag => { if (dna.includes(tag)) overlap += 1; });
        return overlap;
      }).sort((a,b)=>b-a);
      const topOverlap = overlapScores[0] || 0;
      score += Math.max(0, 4 - topOverlap) * 2;
    } else if (state.wearStrategy === "Best performer") {
      const journal = typeof getJournalEntry === "function" ? getJournalEntry(f.n) : {};
      score += Number(journal.performance || 0) * 1.5;
      if (dna.some(x=>["amber","sweet","gourmand","spicy","woody"].includes(x))) score += 1;
    } else {
      // Safest pick
      if (occasions.includes("Office") || occasions.includes("Casual")) score += 2;
      if (dna.some(x=>["fresh","woody","musk / powdery","fougere","blue","green"].includes(x))) score += 2;
      if (dna.some(x=>["gourmand","sweet"].includes(x)) && environment === "Indoors") score -= 1;
    }

    // Favorite / journal boost
    if (typeof isFavorite === "function" && isFavorite(f.n)) score += 1;
    if (typeof getJournalEntry === "function") {
      const j = getJournalEntry(f.n);
      score += Number(j.scent || 0) * 0.35;
      score += Number(j.performance || 0) * 0.35;
    }

    // Avoid recently worn if enabled
    if (state.avoidRecentWear && recentMap[f.n]) {
      score -= 3;
    } else if (!recentMap[f.n]) {
      score += 1;
    }

    return { item: f, score };
  })
  .filter(x => occasion !== "Plane" || getPlaneSafetyLevel(x.item) !== "Not Plane Safe")
  .sort((a,b) => b.score - a.score || a.item.n.localeCompare(b.item.n));

  const out = [];
  const seen = new Set();
  for (const row of ranked) {
    if (seen.has(row.item.n)) continue;
    seen.add(row.item.n);
    out.push(row.item);
    if (out.length >= count) break;
  }
  return out;
}

function getWearTodayReason(f, occasion, weather, environment){
  if (occasion === "Plane") return getPlaneReason(f);
  const dna = displayDNAList(f).map(norm);
  const ctx = getWeatherContext(weather, environment);
  const bits = [];

  if (ctx.temp !== null){
    if (ctx.temp <= 50 && dna.some(x=>["amber","woody","spicy","vetiver / earthy"].includes(x))) bits.push("it fits cooler air better than a bright summer scent");
    if (ctx.temp >= 80 && dna.some(x=>["fresh","citrus","aquatic","blue","green"].includes(x))) bits.push("it stays more comfortable in warm weather");
  }
  if (ctx.humidity !== null && ctx.humidity >= 75 && dna.some(x=>["fresh","citrus","green","musk / powdery"].includes(x))) bits.push("it handles humidity better than something thicker or sweeter");
  if (ctx.rain && dna.some(x=>["woody","vetiver / earthy","fougere","musk / powdery"].includes(x))) bits.push("it makes more sense in rainy weather than an airy beach-style scent");
  if (environment === "Indoors" && dna.some(x=>["musk / powdery","woody","fougere","fresh"].includes(x))) bits.push("it stays more controlled indoors");
  if (environment === "Outdoors" && dna.some(x=>["fresh","green","blue","woody"].includes(x))) bits.push("it has enough lift and structure for outdoor wear");

  const standard = getWhyWear(f, occasion);
  if (standard) bits.unshift(standard.replace(/\.$/, ""));
  return bits.length ? bits.join(". ") + "." : "It fits the selected occasion and conditions.";
}

function simplifyOccasionList(f){
  const raw = (f.o||[]).map(norm);
  const out = [];
  const add = x => { if (x && !out.includes(x)) out.push(x); };

  raw.forEach(o => {
    if (/plane|flight|airplane/.test(o)) add("Plane");
    if (/gym|sport|workout|active|poolside/.test(o)) add("Gym");
    if (/office|work|business|smart casual|daytime|professional|everyday office/.test(o)) add("Office");
    if (/date|romantic|upscale casual|close-range|intimate/.test(o)) add("Date");
    if (/evening|night|formal|special occasion|special|cocktail|club|lounge|bar|statement|bold|social night/.test(o)) add("Evening");
    if (/casual|everyday|weekend|social|outdoors|outdoor|beach|vacation|fresh|playful|day off|errands/.test(o)) add("Casual");
  });

  if (!out.length) add("Casual");

  const order = ["Plane","Office","Date","Casual","Gym","Evening"];
  return order.filter(x => out.includes(x)).slice(0,3);
}

function getMostRedundantWith(f){

  let best = null;

  COLLECTION.forEach(other => {

    let score = 0;
    displayDNAList(other).forEach(tag => { if (targetDNA.has(tag)) score += 2; });
    if ((other.i||"") === (f.i||"")) score += 4;
    simplifyOccasionList(other).forEach(tag => { if (simplifyOccasionList(f).includes(tag)) score += 1; });
    if (score > bestScore){
      bestScore = score;
      best = other;
    }
  });
  return best ? best.n : "Nothing obvious";
}

function getLayeringAnalysis(base, top){
  if (!base || !top) return {score:0, verdict:"Pick two fragrances to analyze.", why:"", ratio:"", sprays:"", baseRole:"", topRole:"", placement:""};
  const bd = displayDNAList(base).map(norm), td = displayDNAList(top).map(norm);
  const shared = bd.filter(x=>td.includes(x));
  const complementary = (bd.includes("fresh") && td.includes("woody")) || (bd.includes("citrus") && td.includes("musk / powdery")) || (bd.includes("blue") && td.includes("amber")) || (bd.includes("vetiver / earthy") && td.includes("citrus")) || (bd.includes("woody") && td.includes("fresh"));
  const clash = (bd.includes("gourmand") && td.includes("aquatic")) || (bd.includes("amber") && td.includes("aquatic")) || (bd.includes("gourmand") && td.includes("green"));
  let raw = 5 + shared.length*1.5 + (complementary?1.5:0) - (clash?2.5:0);
  const sameInspiration = (base.i||"").trim() && (top.i||"").trim() && (base.i||"").trim().toLowerCase() === (top.i||"").trim().toLowerCase();
  if (sameInspiration) raw += 1;
  let score = Math.max(1, Math.min(10, Math.round(raw)));
  let verdict = score>=9 ? "Excellent layering match" : score>=7 ? "Very good layering match" : score>=5 ? "Workable with control" : "Do not layer these";
  let ratio = score<=4 ? "Not recommended" : score>=8 ? "2 sprays base + 2 sprays top" : "2 sprays base + 1 light spray top";
  let sprays = score<=4 ? "Skip this layering combo. Wear one of them on its own instead." : score>=8 ? "Use the base for structure, then add the top evenly for lift and dimension." : "Let the base lead and keep the top clearly lighter.";
  let why = "";

  if (score>=8){
    why += "This pairing works because both fragrances connect strongly enough to smell intentional together rather than layered just for novelty. ";
    why += "There is enough overlap in structure for the blend to stay coherent, but enough contrast to add shape, movement, or extra texture. ";
  } else if (score>=5){
    why += "This pairing can work, but it depends on discipline. ";
    why += "The base should carry most of the identity, while the top should only sharpen the opening, add lift, or introduce a small tonal change. ";
    why += "If both are sprayed too heavily, the result will lose clarity and start to feel more crowded than blended. ";
  } else {
    why += "This pairing is weak because the two fragrances do not support each other naturally. ";
    why += "Instead of blending into a smoother profile, they are more likely to compete in the air and create a confused drydown. ";
  }

  if (shared.length){
    why += `They share ${shared.join(", ")}, which gives the blend a common backbone. `;
  } else {
    why += "They do not share much direct DNA, so the blend depends heavily on spray balance. ";
  }

  if (complementary){
    why += "The contrast is useful here because one fragrance adds brightness or lift while the other adds body and structure. ";
  }
  if (clash){
    why += "There is also a real clash risk in the composition, so the spray plan has to stay conservative. ";
  }

  const baseRole = getLayerRoleSummary(base);
  const topRole = getLayerRoleSummary(top);
  const placement = getLayerPlacement(base, top);

  return {score, verdict, why:why.trim(), ratio, sprays, baseRole, topRole, placement};
}

function scoreDisplay(f, season){

  if (season==="Summer"){ if (s.includes("summer")) score+=5; if (s.includes("year-round")) score+=2; if (dna.some(x=>["fresh","citrus","aquatic","blue","green"].includes(x))) score+=2; }
  if (season==="Fall"){ if (s.includes("fall")) score+=5; if (s.includes("year-round")) score+=2; if (dna.some(x=>["woody","amber","spicy","vetiver / earthy","fougere"].includes(x))) score+=2; }
  if (season==="Winter"){ if (s.includes("winter")) score+=5; if (s.includes("year-round")) score+=2; if (dna.some(x=>["amber","woody","sweet","spicy","gourmand"].includes(x))) score+=2; }
  return score;
}
function getDisplaySections(collection, season){
  const ranked=[...collection].map(f=>({item:f,score:scoreDisplay(f,season)})).sort((a,b)=>b.score-a.score);
  const display=ranked.slice(0,30).map(x=>x.item);
  const anchors=[],daily=[],statement=[];
  display.forEach(f=>{
    const dna=displayDNAList(f).map(norm);
    if ((f.r||0)>=4 && anchors.length<8) anchors.push(f);
    else if (dna.some(x=>["fresh","woody","citrus","blue","green","vetiver / earthy","musk / powdery","fougere","aquatic"].includes(x)) && daily.length<12) daily.push(f);
    else if (statement.length<10) statement.push(f);
  });
  display.forEach(f=>{
    if (!anchors.includes(f) && !daily.includes(f) && !statement.includes(f)){
      if (daily.length<12) daily.push(f); else if (statement.length<10) statement.push(f); else if (anchors.length<8) anchors.push(f);
    }
  });
  return {anchors,daily,statement,display};
}

async function fetchWeather(pref){
  try{
    if (pref.mode==="manual" && pref.city){
      const ge = await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(pref.city)+"&count=1&language=en&format=json").then(r=>r.json());
      if (ge.results && ge.results[0]){
        const g=ge.results[0];
        return await fetchWeatherByCoords(g.latitude,g.longitude,g.name+(g.admin1?", "+g.admin1:""));
      }
    }
    return new Promise(resolve=>{
      if (!navigator.geolocation) return fetchWeatherByCoords(38.8816,-77.091,"Arlington area").then(resolve);
      navigator.geolocation.getCurrentPosition(
        pos=>fetchWeatherByCoords(pos.coords.latitude,pos.coords.longitude).then(resolve),
        _=>fetchWeatherByCoords(38.8816,-77.091,"Arlington area").then(resolve),
        {enableHighAccuracy:false,timeout:8000,maximumAge:300000}
      );
    });
  }catch(e){
    return {loading:false,error:"Unable to load weather.",temp:null,code:null,wind:null,humidity:null,city:"Your area"};
  }
}
async function fetchWeatherByCoords(lat,lon,label=""){
  const wd = await fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph").then(r=>r.json());
  return {loading:false,error:"",temp:wd.current?.temperature_2m??null,code:wd.current?.weather_code??null,wind:wd.current?.wind_speed_10m??null,humidity:wd.current?.relative_humidity_2m??null,city:label||"Your area"};
}
function getWeatherLabel(code){
  if (code===0) return "Clear";
  if ([1,2,3].includes(code)) return "Partly cloudy";
  if ([61,63,65,80,81,82].includes(code)) return "Rain";
  return "Current conditions";
}

  const groups = (() => {
    let filtered = allCollection.filter(f => {
      if (state.collectionHouseFilter && state.collectionHouseFilter !== "All" && f.h !== state.collectionHouseFilter) return false;
      if (state.collectionDNAFilter && state.collectionDNAFilter !== "All" && !displayDNAList(f).includes(state.collectionDNAFilter)) return false;
      if (state.collectionInspirationFilter && state.collectionInspirationFilter !== "All" && (f.i || "Original") !== state.collectionInspirationFilter) return false;
      if (state.collectionPlaneFilter === "Plane Safe" && getPlaneSafetyLevel(f) !== "Plane Safe") return false;
      if (state.collectionPlaneFilter === "Safe Enough" && getPlaneSafetyLevel(f) !== "Safe Enough") return false;
      if (state.collectionPlaneFilter === "Not Plane Safe" && getPlaneSafetyLevel(f) !== "Not Plane Safe") return false;
      if (state.collectionSearch && !`${f.n} ${f.h} ${f.i} ${displayDNAList(f).join(" ")} ${simplifyOccasionList(f).join(" ")}`.toLowerCase().includes(state.collectionSearch.toLowerCase())) return false;
      return true;
    });

    if (state.collectionTab === "Plane") {
