    function getBuySkipAnalysis(){const src=state.buy.name||state.buy.inspiration||state.buy.dna?state.buy:state.buyDraft; const candidate={name:(src.name||"").trim(),house:(src.house||"").trim(),inspiration:(src.inspiration||"").trim(),dna:(src.dna||"").split(",").map(x=>x.trim().toLowerCase()).filter(Boolean),occasions:(src.occasions||"").split(",").map(x=>x.trim()).filter(Boolean),season:(src.season||"").trim()}; if(!candidate.name&&!candidate.inspiration&&!candidate.dna.length) return {verdict:"Add candidate details",reason:"Enter at least a name plus DNA or inspiration to compare it.",overlaps:[]}; const overlaps=allCollection().map(item=>{let score=0; const sharedDNA=candidate.dna.filter(x=>displayDNAList(item).includes(x)), sharedOccasion=candidate.occasions.filter(x=>simplifyOccasionList(item).includes(x)); score+=sharedDNA.length*2+sharedOccasion.length; if(candidate.inspiration&&norm(candidate.inspiration)===norm(item.i)) score+=4; if(candidate.season&&norm(item.s).includes(norm(candidate.season))) score+=1; return {item,overlap:{score,sharedDNA,sharedOccasion}}}).sort((a,b)=>b.overlap.score-a.overlap.score).slice(0,5); const best=overlaps[0]; let verdict="Worth considering", reason="It looks different enough to fill a useful gap."; if(best){if(best.overlap.score>=9){verdict="Good but redundant"; reason=`It overlaps heavily with ${best.item.n}.`} else if(best.overlap.score>=6){verdict="Interesting but unnecessary"; reason=`It still sits fairly close to ${best.item.n}.`} else if(best.overlap.score<3){verdict="Strong add"; reason="It does not appear heavily covered by what you already own."}} return {candidate,verdict,reason,overlaps}}
    function getLayeringAnalysis(base,top){if(!base||!top) return {score:0,verdict:"Pick two fragrances to analyze.",why:"",baseRole:"",topRole:""}; const bd=displayDNAList(base), td=displayDNAList(top), shared=bd.filter(x=>td.includes(x)); const complementary=(bd.includes("fresh")&&td.includes("woody"))||(bd.includes("citrus")&&td.includes("musk / powdery"))||(bd.includes("blue")&&td.includes("amber"))||(bd.includes("green")&&td.includes("woody")); const clash=(bd.includes("gourmand")&&td.includes("aquatic"))||(bd.includes("amber")&&td.includes("aquatic"))||(bd.includes("gourmand")&&td.includes("green")); let raw=5+shared.length*1.5+(complementary?1.5:0)-(clash?2.5:0); const score=Math.max(1,Math.min(10,Math.round(raw))), verdict=score>=9?"Excellent layering match":score>=7?"Very good layering match":score>=5?"Workable with control":"Do not layer these"; const why=score>=7?`This pairing works because it shares ${shared.length?shared.join(", "):"enough connective structure"} while still adding contrast.`:score>=5?"This pairing can work, but one fragrance needs to clearly lead.":"These two are more likely to compete than blend smoothly."; return {score,verdict,why,baseRole:bd.some(x=>["fresh","citrus","aquatic","blue"].includes(x))?"Adds lift, brightness, and a cleaner opening.":"Adds structure and backbone to the blend.",topRole:td.some(x=>["amber","sweet","gourmand","spicy","tobacco"].includes(x))?"Adds warmth, density, and evening character.":"Adds smoothness or brightness without taking over."}}

    async function fetchWeather(pref){try{if(pref.mode==="manual"&&pref.city){const ge=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(pref.city)+"&count=1&language=en&format=json").then(r=>r.json()); if(ge.results&&ge.results[0]){const g=ge.results[0]; return fetchWeatherByCoords(g.latitude,g.longitude,g.name+(g.admin1?", "+g.admin1:""))}} return new Promise(resolve=>{if(!navigator.geolocation) return fetchWeatherByCoords(38.8816,-77.091,"Arlington area").then(resolve); navigator.geolocation.getCurrentPosition(pos=>fetchWeatherByCoords(pos.coords.latitude,pos.coords.longitude).then(resolve),()=>fetchWeatherByCoords(38.8816,-77.091,"Arlington area").then(resolve),{enableHighAccuracy:false,timeout:8000,maximumAge:300000})})}catch(e){return {loading:false,error:"Unable to load weather.",temp:null,code:null,wind:null,humidity:null,city:"Your area"}}}
    async function fetchWeatherByCoords(lat,lon,label=""){const wd=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph`).then(r=>r.json()); return {loading:false,error:"",temp:wd.current?.temperature_2m??null,code:wd.current?.weather_code??null,wind:wd.current?.wind_speed_10m??null,humidity:wd.current?.relative_humidity_2m??null,city:label||"Your area"}}

    function localAnalyzeFragranceDraft(){const draft=state.analyzerDraft, bag=`${draft.name} ${draft.inspiration} ${draft.notes}`.toLowerCase(), dna=[]; if(/fresh|clean|soapy|crisp/.test(bag)) dna.push("fresh"); if(/citrus|bergamot|lemon|orange|neroli|grapefruit/.test(bag)) dna.push("citrus"); if(/aquatic|marine|water|ocean/.test(bag)) dna.push("aquatic"); if(/blue|bleu|sauvage|ysl y|percival/.test(bag)) dna.push("blue"); if(/green|tea|fig|grass|herbal/.test(bag)) dna.push("green"); if(/woody|cedar|sandal|wood/.test(bag)) dna.push("woody"); if(/vetiver|earth/.test(bag)) dna.push("vetiver / earthy"); if(/fougere|barbershop|lavender|aromatic/.test(bag)) dna.push("fougere"); if(/musk|powder|iris/.test(bag)) dna.push("musk / powdery"); if(/amber|resin/.test(bag)) dna.push("amber"); if(/sweet|vanilla|tonka|sugar/.test(bag)) dna.push("sweet"); if(/spicy|pepper|cardamom|cinnamon/.test(bag)) dna.push("spicy"); if(/gourmand|dessert|caramel|coffee|praline/.test(bag)) dna.push("gourmand"); if(/oud/.test(bag)) dna.push("oud"); if(/tobacco/.test(bag)) dna.push("tobacco"); if(!dna.length) dna.push("fresh","woody"); const occasions=[]; if(/office|clean|fresh|woody|fougere|vetiver|musk|classy/.test(bag)) occasions.push("Office"); if(/casual|daily|easy|green|aquatic|blue/.test(bag)) occasions.push("Casual"); if(/date|seductive|amber|sweet|gourmand|spicy/.test(bag)) occasions.push("Date"); if(/evening|oud|tobacco|intense|elixir|gourmand/.test(bag)) occasions.push("Evening"); if(/gym|sport|fresh|aquatic|citrus/.test(bag)) occasions.push("Gym"); if(/plane|safe|light|clean|musk/.test(bag)) occasions.push("Plane"); if(!occasions.length) occasions.push("Casual","Office"); let season="Year-round"; if(/gourmand|amber|oud|spicy|tobacco|leather/.test(bag)) season="Fall · Winter"; else if(/fresh|aquatic|citrus|green|blue|gym/.test(bag)) season="Spring · Summer"; let rating=4; if(/elixir|parfum|intense|extrait|royal|absolute/.test(bag)) rating=5; if(/sport|light|cologne/.test(bag)) rating=3; state.newFragrance.house=draft.house||state.newFragrance.house; state.newFragrance.name=draft.name||state.newFragrance.name; state.newFragrance.inspiration=draft.inspiration||"Original / custom style"; state.newFragrance.dna=unique(dna).join(", "); state.newFragrance.occasions=unique(occasions).join(", "); state.newFragrance.season=season; state.newFragrance.rating=String(rating); pushToast("Local analyzer filled the fields","success"); render()}
