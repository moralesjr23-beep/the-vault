<style>
/* ── Google Fonts ── */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

/* ══════════════════════════════════════════
   DESIGN TOKENS — single source of truth
   ══════════════════════════════════════════ */
:root {
  /* ── Palette ── */
  --bg:           #f4efe6;
  --bg2:          #e8decf;
  --panel:        rgba(255,252,246,.96);
  --panel2:       rgba(248,242,231,.88);
  --panel-strong: #fffdf8;
  --panel-inset:  rgba(239,231,214,.86);
  --border:       rgba(82,54,18,.11);
  --border-strong:rgba(82,54,18,.18);
  --text:         #17120e;
  --muted:        #645748;
  --accent:       #b78934;
  --accent-strong:#8f651d;
  --accent-soft:  rgba(183,137,52,.13);
  --accent-glow:  rgba(183,137,52,.24);
  --good:         #347a50;
  --warn:         #9d6426;
  --bad:          #ad3434;
  --shadow:       0 2px 6px rgba(48,30,8,.05), 0 14px 34px rgba(48,30,8,.10);
  --shadow-sm:    0 1px 3px rgba(48,30,8,.05), 0 6px 16px rgba(48,30,8,.07);
  --shadow-lg:    0 8px 18px rgba(48,30,8,.08), 0 24px 56px rgba(48,30,8,.16);

  /* Radii */
  --r-card:    24px;
  --r-control: 14px;
  --r-chip:    999px;
  --r-btn:     14px;
}

:root[data-theme="dark"] {
  --bg:           #100d09;
  --bg2:          #17120d;
  --panel:        rgba(30,24,17,.94);
  --panel2:       rgba(36,29,20,.84);
  --panel-strong: rgba(34,28,20,.98);
  --panel-inset:  rgba(24,18,11,.78);
  --border:       rgba(220,185,120,.10);
  --border-strong:rgba(220,185,120,.18);
  --text:         #f2ebdf;
  --muted:        #b3a18e;
  --accent:       #d5a24c;
  --accent-strong:#f0c980;
  --accent-soft:  rgba(213,162,76,.15);
  --accent-glow:  rgba(213,162,76,.24);
  --good:         #63b07e;
  --warn:         #d09541;
  --bad:          #cb6868;
  --shadow:       0 4px 12px rgba(0,0,0,.32), 0 18px 42px rgba(0,0,0,.46);
  --shadow-sm:    0 2px 6px rgba(0,0,0,.26), 0 8px 20px rgba(0,0,0,.34);
  --shadow-lg:    0 8px 18px rgba(0,0,0,.36), 0 28px 60px rgba(0,0,0,.5);
}

/* ══════════════════════════════════════════
   GLOBAL RESET & BASE
   ══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  color: var(--text);
  background:
    radial-gradient(700px 280px at 50% -6%, color-mix(in srgb, var(--accent) 11%, transparent), transparent 55%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  padding-bottom: calc(190px + env(safe-area-inset-bottom));
}

h1, h2, h3, h4 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.12;
  margin: 0;
}

h3 { font-size: 1.35rem; }
h4 { font-size: 1.08rem; }

button, input, select, textarea { font: inherit; }

/* ══════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════ */
.app {
  max-width: 900px;
  margin: 0 auto;
  padding: 18px 16px 130px;
}

.top {
  position: relative;
  margin-bottom: 20px;
}

.grid  { display: grid; gap: 14px; }
.cols-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
.cols-3 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
.cols-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
.row   { display: flex; gap: 10px; flex-wrap: wrap; }
.stack { display: grid; gap: 10px; }

/* ══════════════════════════════════════════
   BRAND HEADER
   ══════════════════════════════════════════ */
.brand {
  padding: 20px 22px 16px;
  border-radius: 28px;
  background:
    radial-gradient(circle at top right, var(--accent-soft), transparent 55%),
    var(--panel);
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow);
  backdrop-filter: blur(24px) saturate(1.12);
  -webkit-backdrop-filter: blur(24px) saturate(1.12);
  position: relative;
  overflow: hidden;
}

/* subtle grain texture on brand header */
.brand::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
  border-radius: inherit;
}

.brand-row  { display: flex; align-items: center; gap: 14px; }

.brandmark {
  width: 52px; height: 52px;
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #d4a85a 0%, #b8924a 50%, #9a7838 100%);
  color: #fff;
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.03em;
  box-shadow: 0 2px 6px rgba(60,38,10,.20), 0 6px 18px color-mix(in srgb, var(--accent) 40%, transparent);
  flex: 0 0 auto;
}

.brand small {
  display: block;
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 700;
  opacity: .9;
  margin-bottom: 2px;
}

.brand h1 {
  font-size: clamp(24px, 5.2vw, 34px);
  line-height: 1.02;
  color: var(--text);
  text-shadow: 0 1px 0 rgba(255,255,255,.28);
}

.brand p {
  margin: 4px 0 0;
  font-size: 13px;
  color: var(--muted);
}

/* ══════════════════════════════════════════
   BOTTOM TAB BAR
   ══════════════════════════════════════════ */
.tabs {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: max(10px, calc(env(safe-area-inset-bottom) + 4px));
  z-index: 999;
  width: min(430px, calc(100vw - 18px));
  display: flex;
  gap: 5px;
  padding: 7px;
  border-radius: 24px;
  background: rgba(255,250,241,.94);
  border: 1px solid rgba(90,60,20,.14);
  box-shadow: 0 6px 16px rgba(60,38,10,.09), 0 18px 46px rgba(60,38,10,.18), inset 0 1px 0 rgba(255,255,255,.84);
  backdrop-filter: blur(30px) saturate(1.35);
  -webkit-backdrop-filter: blur(30px) saturate(1.35);
  transition: opacity .28s ease, transform .28s ease;
}

:root[data-theme="dark"] .tabs {
  background: rgba(24,18,12,.92);
  border-color: rgba(220,185,120,.09);
  box-shadow: 0 2px 8px rgba(0,0,0,.40), 0 12px 32px rgba(0,0,0,.44), inset 0 1px 0 rgba(255,220,140,.06);
}

body.sheet-open .tabs {
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%) translateY(14px);
}

.tab {
  flex: 1 1 0;
  min-width: 0;
  min-height: 54px;
  padding: 6px 3px 7px;
  border-radius: 18px;
  border: 1px solid transparent;
  background: transparent;
  box-shadow: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 700;
  color: color-mix(in srgb, var(--muted) 82%, #5b4d3c 18%);
  opacity: .78;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color .22s ease, background .22s ease, border-color .22s ease, transform .22s ease, opacity .22s ease;
}

.tab .tab-ico {
  font-size: 18px;
  line-height: 1;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1);
}

.tab span:last-child { line-height: 1; }

.tab:hover { background: rgba(255,255,255,.24); }
:root[data-theme="dark"] .tab:hover { background: rgba(255,255,255,.06); }

.tab.active {
  background: linear-gradient(180deg,
    color-mix(in srgb, var(--accent) 18%, rgba(255,253,247,.995)),
    rgba(255,251,242,.985)
  );
  color: var(--accent-strong);
  border-color: color-mix(in srgb, var(--accent) 34%, transparent);
  box-shadow: 0 6px 14px color-mix(in srgb, var(--accent) 14%, transparent), inset 0 1px 0 rgba(255,255,255,.9);
  opacity: 1;
}

.tab.active .tab-ico {
  transform: translateY(-1px) scale(1.1);
  filter: drop-shadow(0 1px 3px color-mix(in srgb, var(--accent) 30%, transparent));
}

:root[data-theme="dark"] .tab.active {
  background: linear-gradient(180deg,
    rgba(213,162,76,.22),
    rgba(213,162,76,.10)
  );
  color: var(--accent-strong);
  border-color: rgba(213,162,76,.30);
  box-shadow: 0 8px 18px rgba(213,162,76,.16), inset 0 1px 0 rgba(255,255,255,.08);
}

/* ══════════════════════════════════════════
   CARDS
   ══════════════════════════════════════════ */
.card {
  background: linear-gradient(180deg, rgba(255,255,255,.14), transparent 26%), var(--panel);
  border: 1px solid color-mix(in srgb, var(--border) 92%, rgba(111,74,24,.04));
  border-radius: var(--r-card);
  padding: 20px;
  box-shadow: 0 1px 4px rgba(48,30,8,.03), 0 8px 18px rgba(48,30,8,.05);
  backdrop-filter: blur(20px) saturate(1.08);
  -webkit-backdrop-filter: blur(20px) saturate(1.08);
  position: relative;
  overflow: hidden;
}

/* inner top highlight — stronger in light mode for depth */
.card::after {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,.70) 50%, transparent 95%);
  pointer-events: none;
}

/* inset panels within cards — use a sunken surface */
.sheety {
  background: var(--panel-inset);
  border: 1px solid var(--border);
  border-radius: 16px;
}

.frag-hero {
  padding: 26px;
  border-radius: var(--r-card);
  border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--border));
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 28%, transparent), transparent 44%),
    radial-gradient(circle at top right, color-mix(in srgb, var(--accent-glow) 92%, rgba(255,255,255,.03)), transparent 36%),
    linear-gradient(180deg, rgba(255,255,255,.18), transparent 26%),
    var(--panel);
  box-shadow: 0 8px 18px rgba(48,30,8,.08), 0 28px 62px rgba(48,30,8,.16);
  position: relative;
  overflow: hidden;
}

.chart-card {
  padding: 14px;
  border-radius: var(--r-card);
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow);
}

/* ══════════════════════════════════════════
   STAT & ICONSTAT
   ══════════════════════════════════════════ */
.stat {
  padding: 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow-sm);
}

.iconstat {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 14px;
  border: 1px solid color-mix(in srgb, var(--border) 90%, rgba(120,88,40,.05));
  background: color-mix(in srgb, var(--panel) 92%, rgba(255,255,255,.18));
  border-radius: 20px;
  box-shadow: 0 2px 6px rgba(48,30,8,.035), 0 8px 18px rgba(48,30,8,.055);
}

.iconbubble, .icon-badge {
  width: 46px; height: 46px;
  border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 20px;
  flex: 0 0 auto;
  box-shadow: none;
}

.num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 31px;
  font-weight: 700;
  letter-spacing: -0.045em;
  line-height: .98;
}

/* ══════════════════════════════════════════
   SHELF CARDS
   ══════════════════════════════════════════ */
.shelf-card {
  padding: 14px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow-sm);
}

.shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.frag-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.favorite-btn {
  padding: 6px 10px;
  border-radius: 12px;
  min-width: 40px;
}

/* ══════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════ */
button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 42px;
  padding: 10px 16px;
  border-radius: var(--r-btn);
  border: 1px solid color-mix(in srgb, var(--border-strong) 94%, transparent);
  background: linear-gradient(180deg, rgba(255,255,255,.54), rgba(255,255,255,.10)), rgba(255,251,244,.64);
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: var(--shadow-sm);
  transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease, color .22s ease;
}

:root[data-theme="dark"] button {
  background: var(--panel-inset);
}

button:hover  { transform: scale(1.012); box-shadow: var(--shadow); }
button:active { transform: scale(.975); }

button:focus-visible,
.tab:focus-visible,
.listbtn:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-soft), 0 0 0 5px color-mix(in srgb, var(--accent) 20%, transparent);
}

/* ══════════════════════════════════════════
   LIST BUTTON
   ══════════════════════════════════════════ */
.listbtn {
  width: 100%;
  text-align: left;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 15px;
  box-shadow: var(--shadow-sm);
  display: block;
  transition: transform .14s ease, box-shadow .14s ease;
}

.listbtn:hover { transform: none; box-shadow: var(--shadow); }

.listbtn * {
  white-space: normal !important;
  overflow-wrap: anywhere;
  word-break: break-word;
}

/* ══════════════════════════════════════════
   FORM CONTROLS
   ══════════════════════════════════════════ */
input, select, textarea {
  width: 100%;
  min-height: 46px;
  padding: 12px 14px;
  border-radius: var(--r-control);
  border: 1px solid color-mix(in srgb, var(--border-strong) 120%, transparent);
  background: linear-gradient(180deg, rgba(255,255,255,.6), rgba(255,255,255,.16)), var(--panel-strong);
  color: var(--text);
  font-size: 14px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.58);
  transition: border-color .22s ease, box-shadow .22s ease, transform .22s ease, background .22s ease;
}

textarea { min-height: 92px; resize: vertical; }

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: color-mix(in srgb, var(--accent) 58%, transparent);
  box-shadow: 0 0 0 3px var(--accent-soft), 0 8px 18px color-mix(in srgb, var(--accent) 10%, transparent);
  background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.2)), var(--panel-strong);
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 220px;
  flex: 1;
}

label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ══════════════════════════════════════════
   TYPOGRAPHY UTILITIES
   ══════════════════════════════════════════ */
.kicker {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .20em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: .95;
}

.muted  { color: var(--muted); }
.small  { font-size: 12px; }
.subtle { font-size: 13px; color: var(--muted); }
.hidden { display: none; }

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.24rem;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.08;
  margin: .12rem 0 .12rem;
}

.section-desc, .section-subtitle, .mini-note, .acc-desc {
  color: color-mix(in srgb, var(--muted) 90%, var(--text));
  font-size: 12px;
  line-height: 1.5;
}

.section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.section-head .copy { min-width: 0; }
.section-head .title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.34rem;
  font-weight: 700;
  letter-spacing: -0.025em;
  margin: .12rem 0 .12rem;
}

/* ══════════════════════════════════════════
   PILLS, CHIPS, BADGES
   ══════════════════════════════════════════ */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 3px 7px;
  border-radius: var(--r-chip);
  background: color-mix(in srgb, var(--accent-soft) 56%, rgba(255,255,255,.22));
  color: color-mix(in srgb, var(--accent-strong) 76%, var(--muted) 24%);
  font-size: 10px;
  font-weight: 700;
  border: 1px solid color-mix(in srgb, var(--accent) 8%, transparent);
  margin: 2px 4px 2px 0;
  letter-spacing: .02em;
}

.frag-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 8px;
  border-radius: var(--r-chip);
  border: 1px solid color-mix(in srgb, var(--border) 94%, rgba(120,88,40,.03));
  background: color-mix(in srgb, var(--accent-soft) 54%, rgba(255,255,255,.16));
  color: color-mix(in srgb, var(--accent) 72%, var(--text) 28%);
  font-size: 10px;
  font-weight: 700;
}

.frag-chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: var(--r-chip);
  border: 1px solid color-mix(in srgb, var(--border) 94%, transparent);
  font-size: 10px;
  font-weight: 700;
}

.badge.good  { color: var(--good);  background: color-mix(in srgb, var(--good)  12%, transparent); border-color: color-mix(in srgb, var(--good)  22%, transparent); }
.badge.warn  { color: var(--warn);  background: color-mix(in srgb, var(--warn)  10%, transparent); border-color: color-mix(in srgb, var(--warn)  20%, transparent); }
.badge.bad   { color: var(--bad);   background: color-mix(in srgb, var(--bad)   10%, transparent); border-color: color-mix(in srgb, var(--bad)   20%, transparent); }

.badge-soft  {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 9px;
  border-radius: var(--r-chip);
  font-size: 10px;
  font-weight: 700;
  border: 1px solid color-mix(in srgb, var(--border) 92%, rgba(120,88,40,.04));
  background: color-mix(in srgb, var(--panel-inset) 88%, rgba(255,255,255,.12));
}

:root[data-theme="dark"] .badge-soft { background: var(--panel-inset); }

.ios-mini-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 22px;
  padding: 0 8px;
  border-radius: var(--r-chip);
  font-size: 11px;
  font-weight: 800;
  background: var(--accent-soft);
  color: var(--accent);
}

.good  { color: var(--good); }
.warn  { color: var(--warn); }
.bad   { color: var(--bad); }

/* ══════════════════════════════════════════
   METERS / PROGRESS BARS
   ══════════════════════════════════════════ */
.meter, .score-meter {
  height: 8px;
  border-radius: var(--r-chip);
  background: rgba(128,100,60,.1);
  border: 1px solid var(--border);
  overflow: hidden;
}

.meter > span, .score-meter > span {
  display: block;
  height: 100%;
  border-radius: var(--r-chip);
  background: linear-gradient(90deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 72%, #fff8e8) 100%);
}

.meter.good  > span { background: linear-gradient(90deg, var(--good), color-mix(in srgb, var(--good) 68%, #e8f8ee)); }
.meter.warn  > span { background: linear-gradient(90deg, var(--warn), color-mix(in srgb, var(--warn) 68%, #fff4e0)); }
.meter.bad   > span { background: linear-gradient(90deg, var(--bad),  color-mix(in srgb, var(--bad)  68%, #fee8e8)); }

/* ══════════════════════════════════════════
   BAR CHART
   ══════════════════════════════════════════ */
.bar-list   { display: grid; gap: 10px; }
.bar-row    { display: grid; grid-template-columns: minmax(90px, 130px) 1fr 34px; align-items: center; gap: 10px; }
.bar-label  { font-size: 12px; color: var(--muted); }
.bar-track  { height: 8px; border-radius: var(--r-chip); background: rgba(128,100,60,.1); overflow: hidden; }
.bar-fill   { height: 100%; border-radius: var(--r-chip); background: linear-gradient(90deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 70%, #fff8e8) 100%); }

/* ══════════════════════════════════════════
   TABS / SUBNAV (top, not bottom bar)
   ══════════════════════════════════════════ */
.subnav { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

.ios-segment {
  display: flex;
  gap: 6px;
  padding: 5px;
  border-radius: 16px;
  background: var(--panel-inset);
  border: 1px solid var(--border);
  width: 100%;
  overflow: auto;
}

:root[data-theme="dark"] .ios-segment { background: var(--panel-inset); }
.ios-segment::-webkit-scrollbar { display: none; }

.subnav button, .ios-segment button {
  min-height: 36px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  padding: 0 14px;
  box-shadow: none;
  background: transparent;
  border-color: transparent;
}

.subnav button.active, .ios-segment button.active {
  background: var(--panel-strong);
  color: var(--accent);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}

/* ══════════════════════════════════════════
   IOS LIST ROWS
   ══════════════════════════════════════════ */
.ios-list  { display: grid; gap: 10px; }

.ios-row {
  cursor: pointer;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  width: 100%;
  text-align: left;
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid color-mix(in srgb, var(--border) 92%, rgba(120,88,40,.05));
  background: color-mix(in srgb, var(--panel) 95%, rgba(255,255,255,.12));
  box-shadow: 0 2px 6px rgba(48,30,8,.035), 0 10px 24px rgba(48,30,8,.055);
  transition: box-shadow .18s ease, transform .16s ease;
}

.ios-row:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

.ios-row-main    { min-width: 0; display: grid; gap: 5px; }
.ios-row-title   { font-size: 15px; font-weight: 800; line-height: 1.17; letter-spacing: -.015em; color: var(--text); }
.ios-row-subtitle{ font-size: 12px; color: color-mix(in srgb, var(--muted) 90%, var(--text) 10%); line-height: 1.42; }
.ios-row-meta    { display: flex; flex-wrap: wrap; gap: 6px; }
.ios-row-trailing{ display: grid; justify-items: end; gap: 6px; min-width: 74px; }
.ios-chevron     { color: var(--muted); font-size: 18px; line-height: 1; opacity: .6; }

/* ══════════════════════════════════════════
   SHEETS & OVERLAY
   ══════════════════════════════════════════ */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(20,14,8,.25);
  z-index: 1290;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  z-index: 1300;
  max-height: 86vh;
  overflow: auto;
  border-top-left-radius: 30px;
  border-top-right-radius: 30px;
  background: var(--panel-strong);
  border: 1px solid var(--border-strong);
  border-bottom: none;
  box-shadow: 0 -4px 16px rgba(0,0,0,.08), 0 -16px 48px rgba(0,0,0,.14);
  padding: 20px 18px calc(22px + env(safe-area-inset-bottom));
  touch-action: pan-y;
  will-change: transform;
  transition: transform .28s cubic-bezier(.32,0,.67,0);
}

/* drag handle */
.sheet::before {
  content: "";
  display: block;
  width: 40px; height: 4px;
  border-radius: var(--r-chip);
  background: color-mix(in srgb, var(--border) 300%, transparent);
  margin: 0 auto 16px;
}

.action-row-sticky {
  position: sticky;
  bottom: 0;
  padding-top: 10px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: linear-gradient(180deg, transparent, var(--panel) 38%);
}

/* ══════════════════════════════════════════
   TOASTS
   ══════════════════════════════════════════ */
.toast-wrap {
  position: fixed; left: 50%; bottom: 90px;
  transform: translateX(-50%);
  z-index: 200;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: none;
}

.toast {
  min-width: 220px; max-width: min(92vw, 400px);
  background: var(--panel);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 16px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
}

.toast.success { border-color: color-mix(in srgb, var(--good) 30%, transparent); }
.toast.warn    { border-color: color-mix(in srgb, var(--warn) 30%, transparent); }
.toast.error   { border-color: color-mix(in srgb, var(--bad)  30%, transparent); }

/* ══════════════════════════════════════════
   EMPTY STATES
   ══════════════════════════════════════════ */
.empty-state, .empty-card {
  text-align: center;
  padding: 24px 18px;
  border: 1px dashed var(--border-strong);
  border-radius: 18px;
  background: var(--panel-inset);
  color: var(--muted);
  font-size: 14px;
}

:root[data-theme="dark"] .empty-state,
:root[data-theme="dark"] .empty-card {
  background: var(--panel-inset);
}

/* ══════════════════════════════════════════
   ACCORDIONS
   ══════════════════════════════════════════ */
.acc-card   { overflow: hidden; }

.acc-head {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  width: 100%; background: transparent; border: none; box-shadow: none; padding: 0;
  text-align: left; min-height: auto;
}

.acc-head:hover { transform: none; box-shadow: none; }
.acc-copy  { min-width: 0; }
.acc-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.08rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: .15rem 0 .1rem;
}

.acc-toggle {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent;
  border: 1.5px solid var(--border-strong);
  color: var(--accent);
  font-size: 16px;
  font-weight: 700;
  flex: 0 0 auto;
  box-shadow: none;
  min-height: auto;
  padding: 0;
  transition: background .14s ease, border-color .14s ease;
}

.acc-head:hover .acc-toggle {
  background: var(--accent-soft);
  border-color: color-mix(in srgb, var(--accent) 30%, transparent);
}

.acc-body { margin-top: 14px; animation: fadeUp .18s ease both; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

.skeleton {
  border-radius: 8px;
  background: linear-gradient(90deg,
    var(--accent-soft) 25%,
    var(--accent-glow) 50%,
    var(--accent-soft) 75%
  );
  background-size: 800px 100%;
  animation: shimmer 1.6s infinite linear;
}

/* Favorite star highlight in ios-rows */
.ios-row-title .fav-star {
  color: var(--accent);
  font-size: 11px;
  vertical-align: middle;
  opacity: .85;
}

/* Collection story — structured list items */
.story-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

.story-row:last-child { border-bottom: none; }
.story-row .story-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.story-row .story-val   { font-weight: 600; text-align: right; min-width: 0; }

/* Wear log date badge */
.wear-date-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: var(--r-chip);
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
}

/* Chart card h spacing */
.chart-card .kicker { margin-bottom: 10px; display: block; }

/* Hero stat label → use kicker sizing */
.hero-stat .label {
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 700;
}

/* Tight section spacing inside cards */
.card > .kicker:first-child { margin-bottom: 4px; }

/* Feedback inline text */
.feedback-inline {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.46;
  margin-top: 4px;
}

/* Layering ratio display */
.layer-ratio-display {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-top: 6px;
}

/* Section card (plain surface no extra padding) */
.section-card {
  border-radius: 18px;
  padding: 14px;
}

/* ══════════════════════════════════════════
   SECTION LIST SHELL
   ══════════════════════════════════════════ */
.section-list-shell { display: grid; gap: 12px; }
/* ══════════════════════════════════════════
   COLLECTION FRAGRANCE CARD
   ══════════════════════════════════════════ */
.collection-fragrance-card {
  display: grid;
  grid-template-columns: minmax(0,1.2fr) minmax(0,0.9fr) minmax(0,1.1fr) minmax(0,1.6fr);
  gap: 12px;
  align-items: start;
}

.collection-fragrance-card .cf-block   { min-width: 0; }
.collection-fragrance-card .cf-label   {
  font-size: 10px; color: var(--accent); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: .08em; font-weight: 700;
}
.collection-fragrance-card .cf-name   { font-weight: 700; font-size: .98rem; line-height: 1.15; }
.collection-fragrance-card .cf-house,
.collection-fragrance-card .cf-meta   { color: var(--muted); }
.collection-fragrance-card .cf-value  { white-space: normal; overflow-wrap: anywhere; word-break: break-word; }

/* ══════════════════════════════════════════
   HERO SUMMARY GRID
   ══════════════════════════════════════════ */
.frag-hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 2.5vw, 1.9rem);
  line-height: 1.04;
  letter-spacing: -0.04em;
  font-weight: 700;
  margin: 0;
}

.frag-hero-house { color: var(--muted); margin-top: 6px; font-size: 15px; }

.frag-hero-grid  {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.hero-summary    {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.hero-stat {
  padding: 14px;
  border-radius: 18px;
  border: 1px solid color-mix(in srgb, var(--accent) 10%, var(--border));
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 28%, transparent), transparent 48%), var(--panel-inset);
}

:root[data-theme="dark"] .hero-stat { background: var(--panel-inset); }
.hero-stat .label { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
.hero-stat .value { margin-top: 8px; font-weight: 700; }

.detail-mini {
  padding: 12px;
  border-radius: 16px;
  background: var(--panel-inset);
  border: 1px solid var(--border);
}
:root[data-theme="dark"] .detail-mini { background: var(--panel-inset); }
.detail-mini .kicker { font-size: 10px; }
.detail-mini .val    { margin-top: 8px; font-weight: 700; }

/* ══════════════════════════════════════════
   LAYERING UI
   ══════════════════════════════════════════ */
.layer-compact-card   { padding: 18px; border-radius: var(--r-card); }

.layer-select-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 16px;
}

.layer-controls-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.layer-weather-strip {
  padding: 12px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--panel-inset);
  box-shadow: var(--shadow-sm);
  margin-top: 14px;
}

:root[data-theme="dark"] .layer-weather-strip {
  background: var(--panel-inset);
}

.layer-weather-line {
  margin-top: 4px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.layer-weather-note { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.42; }

.layer-weather-chiprow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

.layer-weather-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px;
  border-radius: 11px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 16px;
  font-weight: 800;
}

.layer-mini-stat { padding: 12px; border-radius: 14px; }

/* ══════════════════════════════════════════
   VAULT ADVISOR
   ══════════════════════════════════════════ */
.vault-advisor-card {
  margin-top: 14px;
  border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--border)) !important;
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 50%, transparent) 0%, transparent 48%),
    var(--panel) !important;
}

.vault-advisor-head  { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 2px; }
.vault-advisor-mark  {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 10px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 14px; font-weight: 800;
}

.vault-advisor-grid  {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 10px;
  margin-top: 12px;
}

.vault-advisor-result {
  padding: 13px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--panel-inset);
}

:root[data-theme="dark"] .vault-advisor-result { background: var(--panel-inset); }

.vault-advisor-title { font-size: 12.5px; font-weight: 700; letter-spacing: -0.01em; }
.vault-advisor-copy  { margin-top: 5px; font-size: 13px; line-height: 1.42; color: var(--muted); }

.vault-divider {
  height: 1px;
  margin: 10px 0;
  background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--border) 80%, transparent), transparent);
}

/* ══════════════════════════════════════════
   ANALYZER
   ══════════════════════════════════════════ */
.analyzer-grid {
  display: grid;
  grid-template-columns: 1.15fr .85fr;
  gap: 12px;
}

.analyzer-box {
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  background: var(--panel-inset);
}

:root[data-theme="dark"] .analyzer-box { background: var(--panel-inset); }

.analyzer-note  { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.45; }
.analyzer-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.analyzer-primary { font-weight: 700; }

.confidence-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  border-radius: var(--r-chip);
  font-size: 11px; font-weight: 700;
  border: 1px solid var(--border);
  background: var(--panel-inset);
  margin-right: 6px; margin-top: 4px;
}

:root[data-theme="dark"] .confidence-chip { background: var(--panel-inset); }

.source-list { display: grid; gap: 8px; margin-top: 10px; }

.source-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel-inset);
  color: inherit;
  text-decoration: none;
  font-size: 13px;
  transition: box-shadow .14s ease;
}

:root[data-theme="dark"] .source-link { background: var(--panel-inset); }
.source-link:hover { box-shadow: var(--shadow-sm); }

/* ══════════════════════════════════════════
   ONBOARDING
   ══════════════════════════════════════════ */
.onboard-grid  { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
.onboard-step  {
  border-radius: 18px;
  padding: 14px;
  border: 1px solid var(--border);
  background: var(--panel-inset);
}

:root[data-theme="dark"] .onboard-step { background: var(--panel-inset); }
.onboard-step .num { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; line-height: 1; }

/* ══════════════════════════════════════════
   EXPLAIN LIST (Buy / Skip)
   ══════════════════════════════════════════ */
.explain-list { display: grid; gap: 10px; margin-top: 12px; }
.explain-row  {
  padding: 11px 14px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--panel-inset);
  font-size: 13px;
}
:root[data-theme="dark"] .explain-row { background: var(--panel-inset); }


/* ══════════════════════════════════════════
   EXPLAINABILITY POLISH
   ══════════════════════════════════════════ */
.score-chip-row {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}
.score-chip {
  display:inline-flex;
  align-items:center;
  gap:6px;
  min-height:28px;
  padding:0 10px;
  border-radius:999px;
  border:1px solid color-mix(in srgb, var(--border-strong) 110%, transparent);
  background:linear-gradient(180deg, rgba(255,255,255,.22), transparent 55%), var(--panel-inset);
  box-shadow:0 2px 6px rgba(48,30,8,.05);
  font-size:11px;
  font-weight:800;
  letter-spacing:.01em;
}
.score-chip .score-chip-label { color:var(--muted); font-weight:700; }
.score-chip .score-chip-value { color:var(--text); }
.score-chip.good {
  color:var(--good);
  background:linear-gradient(180deg, rgba(255,255,255,.22), transparent 55%), color-mix(in srgb, var(--good) 12%, var(--panel-inset));
  border-color:color-mix(in srgb, var(--good) 26%, transparent);
}
.score-chip.warn {
  color:var(--warn);
  background:linear-gradient(180deg, rgba(255,255,255,.22), transparent 55%), color-mix(in srgb, var(--warn) 10%, var(--panel-inset));
  border-color:color-mix(in srgb, var(--warn) 24%, transparent);
}
.score-chip.bad {
  color:var(--bad);
  background:linear-gradient(180deg, rgba(255,255,255,.18), transparent 55%), color-mix(in srgb, var(--bad) 10%, var(--panel-inset));
  border-color:color-mix(in srgb, var(--bad) 22%, transparent);
}
.score-badge {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:64px;
  min-height:34px;
  padding:0 12px;
  border-radius:999px;
  border:1px solid color-mix(in srgb, var(--border-strong) 110%, transparent);
  background:linear-gradient(135deg, rgba(255,255,255,.40), rgba(255,255,255,.08)), var(--panel-strong);
  box-shadow:0 8px 18px rgba(48,30,8,.10), inset 0 1px 0 rgba(255,255,255,.72);
  font-size:13px;
  font-weight:900;
  letter-spacing:-.01em;
}
.score-badge.good {
  color:var(--good);
  border-color:color-mix(in srgb, var(--good) 28%, transparent);
}
.score-badge.warn {
  color:var(--warn);
  border-color:color-mix(in srgb, var(--warn) 28%, transparent);
}
.score-badge.bad {
  color:var(--bad);
  border-color:color-mix(in srgb, var(--bad) 26%, transparent);
}
.explain-note {
  margin-top:8px;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid color-mix(in srgb, var(--border) 92%, transparent);
  background:linear-gradient(180deg, rgba(255,255,255,.18), transparent 65%), var(--panel-inset);
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
}
.explain-note strong {
  color:var(--text);
  font-weight:800;
}
.explain-card-soft {
  border:1px solid color-mix(in srgb, var(--accent) 14%, var(--border));
  background:linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 40%, transparent), transparent 44%), var(--panel);
  border-radius:20px;
}
:root[data-theme="dark"] .score-chip,
:root[data-theme="dark"] .score-badge,
:root[data-theme="dark"] .explain-note {
  box-shadow:none;
}

/* ══════════════════════════════════════════
   SURFACE CARD / INLINE ICON
   ══════════════════════════════════════════ */
.surface-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  box-shadow: var(--shadow);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
}

/* ══════════════════════════════════════════
   LUXURY SIMPLIFICATION PASS
   ══════════════════════════════════════════ */
.brand {
  padding: 22px 24px 18px;
}

.tab:not(.active) {
  opacity: .8;
}

.tab:not(.active) .tab-ico {
  opacity: .82;
}

.stat,
.iconstat,
.shelf-card,
.chart-card,
.section-card,
.explain-row,
.onboard-step,
.analyzer-box,
.vault-advisor-result,
.detail-mini,
.layer-weather-strip {
  box-shadow: none;
  border-color: color-mix(in srgb, var(--border) 94%, transparent);
}

.frag-chip-row > .frag-chip:nth-child(n+4),
.row > .pill:nth-child(n+4) {
  opacity: .78;
}

.story-row {
  padding: 10px 0;
}

button:hover {
  border-color: color-mix(in srgb, var(--accent) 14%, var(--border));
}

@media (max-width: 760px) {
  .card { padding: 18px; }
  .frag-hero { padding: 20px; }
  .brand { padding: 18px 18px 14px; }
}

.inline-icon {
  display: inline-flex; width: 28px; height: 28px;
  align-items: center; justify-content: center;
  border-radius: 9px;
  background: var(--accent-soft);
  color: var(--accent);
}


/* ══════════════════════════════════════════
   POLISH PASS — hierarchy, forms, actions
   ══════════════════════════════════════════ */
.chart-card,
.section-card,
.analyzer-box,
.detail-mini,
.hero-stat,
.layer-weather-strip,
.vault-advisor-result,
.onboard-step,
.explain-row {
  background: linear-gradient(180deg, rgba(255,255,255,.12), transparent 40%), var(--panel-inset);
  border-color: color-mix(in srgb, var(--border-strong) 105%, transparent);
  box-shadow: var(--shadow-sm);
}

.kicker,
label,
.hero-stat .label,
.ai-fit-label,
.ai-meta-label,
.story-row .story-label {
  color: color-mix(in srgb, var(--accent-strong) 68%, var(--muted));
}

.section-title,
.section-head .title,
.acc-title,
.ios-row-title,
.collection-fragrance-card .cf-name,
.vault-advisor-title {
  letter-spacing: -.025em;
}

.subtle,
.section-desc,
.section-subtitle,
.muted,
.small,
.brand p,
.ai-fit-val,
.ai-meta-val,
.collection-fragrance-card .cf-house,
.collection-fragrance-card .cf-meta {
  color: var(--muted);
}

.frag-chip-row .pill:nth-child(n+5),
.frag-chip-row .frag-chip:nth-child(n+5) {
  display: none;
}

button.primary,
#saveWear,
#quickLogWear,
.ai-run-btn {
  background: linear-gradient(135deg, #ddb56d 0%, var(--accent) 56%, var(--accent-strong) 100%) !important;
  color: #fff !important;
  border-color: transparent !important;
  font-weight: 800 !important;
  letter-spacing: .01em;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 24px color-mix(in srgb, var(--accent) 38%, transparent), inset 0 1px 0 rgba(255,255,255,.26) !important;
}

button.primary::after,
#saveWear::after,
#quickLogWear::after,
.ai-run-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.18), transparent 42%);
  pointer-events: none;
}

button.primary:hover,
#saveWear:hover,
#quickLogWear:hover,
.ai-run-btn:hover {
  box-shadow: 0 14px 28px color-mix(in srgb, var(--accent) 46%, transparent), inset 0 1px 0 rgba(255,255,255,.30) !important;
}

.manual-log-card {
  border-color: color-mix(in srgb, var(--accent) 20%, var(--border));
  box-shadow: var(--shadow-lg);
}

.manual-log-grid {
  display: grid;
  grid-template-columns: 1.05fr .95fr;
  gap: 14px;
  margin-top: 14px;
}

.manual-log-group {
  padding: 14px;
  border-radius: 18px;
  border: 1px solid color-mix(in srgb, var(--border-strong) 110%, transparent);
  background: linear-gradient(180deg, rgba(255,255,255,.12), transparent 45%), var(--panel-inset);
}

.manual-log-summary {
  display: grid;
  gap: 10px;
  align-content: start;
}

.manual-log-meta {
  display: grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap: 10px;
}

.manual-log-stat {
  padding: 12px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.16);
}

.manual-log-stat .stat-label {
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--muted);
}

.manual-log-stat .stat-value {
  margin-top: 6px;
  font-weight: 700;
  line-height: 1.25;
}

.manual-log-actions {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  margin-top: 14px;
}

.page-shell-tight > .card + .card,
.section-list-shell > .card + .card {
  margin-top: 2px;
}

@media (max-width: 760px) {
  .manual-log-grid,
  .manual-log-meta,
  .manual-log-actions {
    grid-template-columns: 1fr;
  }
}


/* ══════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════ */
@media (max-width: 760px) {
  .app { padding: 12px 12px 124px; }
  .brand { padding: 16px 16px 12px; }
  .brand h1 { font-size: clamp(20px, 7vw, 26px); }
  .brand p  { font-size: 12px; }

  .tabs { width: calc(100vw - 14px); bottom: max(6px, calc(env(safe-area-inset-bottom) + 2px)); border-radius: 20px; padding: 5px; }
  .tab  { min-height: 50px; font-size: 9.5px; }
  .tab .tab-ico { font-size: 16px; }

  .card  { border-radius: 20px; padding: 16px; }
  .frag-hero { border-radius: 20px; padding: 16px; }
  .stat, .iconstat { border-radius: 16px; }
  .listbtn { border-radius: 18px; }

  .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; }
  .field { min-width: 100%; }
  .num   { font-size: 22px !important; }
  h3 { font-size: 1.18rem; }

  .collection-fragrance-card { grid-template-columns: 1fr; gap: 10px; }
  .collection-fragrance-card .cf-name { font-size: 1.06rem; }

  .hero-summary, .frag-hero-grid { grid-template-columns: 1fr 1fr; }

  .onboard-grid    { grid-template-columns: 1fr 1fr; }
  .analyzer-grid   { grid-template-columns: 1fr; }
  .layer-select-grid   { grid-template-columns: 1fr; }
  .layer-controls-grid { grid-template-columns: 1fr 1fr; }

  .ios-row { padding: 12px 14px; border-radius: 16px; }
  .ios-row-title    { font-size: 14px; }
  .ios-row-subtitle { font-size: 12.5px; }
  .sheet { border-top-left-radius: 26px; border-top-right-radius: 26px; }
}

/* ══════════════════════════════════════════
   AI ANALYZER
   ══════════════════════════════════════════ */
.ai-analyzer-hero {
  background:
    radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 18%, transparent), transparent 40%),
    var(--panel);
  border-color: color-mix(in srgb, var(--accent) 22%, var(--border));
}

.ai-mark {
  width: 36px; height: 36px;
  border-radius: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #d4a85a 0%, #b8924a 55%, #9a7838 100%);
  color: #fff;
  font-size: 16px;
  font-weight: 800;
  flex: 0 0 auto;
  box-shadow: 0 2px 6px rgba(60,38,10,.20), 0 4px 12px color-mix(in srgb, var(--accent) 32%, transparent);
}

.ai-run-btn { min-width: 180px; }
.ai-run-btn:disabled { opacity: .72; cursor: not-allowed; }

@keyframes spin { to { transform: rotate(360deg); } }
.ai-spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  display: inline-block;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

@keyframes pulse-ring {
  0%   { transform: scale(.85); opacity: .6; }
  50%  { transform: scale(1.12); opacity: .18; }
  100% { transform: scale(.85); opacity: .6; }
}
.ai-pulse-wrap { display: flex; align-items: center; justify-content: center; height: 56px; }
.ai-pulse {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--accent-soft);
  border: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
  animation: pulse-ring 1.4s ease-in-out infinite;
  position: relative;
}
.ai-pulse::after {
  content: "✦";
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--accent);
}

.ai-error {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid color-mix(in srgb, var(--bad) 28%, transparent);
  background: color-mix(in srgb, var(--bad) 8%, transparent);
  color: var(--bad);
  font-size: 13px;
  font-weight: 600;
}

.ai-result-grid {
  display: grid;
  grid-template-columns: 1.1fr .9fr;
  gap: 14px;
}
@media (max-width: 760px) { .ai-result-grid { grid-template-columns: 1fr; } }

.ai-verdict-card { border-color: color-mix(in srgb, var(--accent) 20%, var(--border)); }
.ai-verdict-main { margin-top: 10px; }

.ai-fit-rows { display: grid; gap: 0; margin-top: 10px; }
.ai-fit-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.ai-fit-row:last-child { border-bottom: none; }
.ai-fit-row--stacked { flex-direction: column; align-items: flex-start; }

.ai-fit-label, .ai-meta-label {
  font-size: 10px; font-weight: 700; letter-spacing: .10em;
  text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}

.ai-fit-val { font-size: 13px; color: var(--text); line-height: 1.42; }

.ai-meta-row {
  display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.ai-meta-row:last-child { border-bottom: none; }
.ai-meta-row--stacked { flex-direction: column; align-items: flex-start; }

.ai-meta-label { white-space: nowrap; }
.ai-meta-val {
  font-size: 13px; font-weight: 600; color: var(--text);
  text-align: right; line-height: 1.42;
}
.ai-meta-row--stacked .ai-meta-val { text-align: left; font-weight: 400; margin-top: 4px; }
/* ══════════════════════════════════════════
   VIEW TRANSITION (crossfade between tabs)
   ══════════════════════════════════════════ */
@keyframes viewIn {
  from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
  to   { opacity: 1; transform: translateY(0);   filter: blur(0);   }
}

.view-content {
  animation: viewIn .34s cubic-bezier(.22,1,.36,1) both;
}

/* ══════════════════════════════════════════
   PRESSED STATES (stronger, more physical)
   ══════════════════════════════════════════ */
button:active, .tab:active, .listbtn:active, .ios-row:active {
  transform: scale(.985) !important;
  opacity: .94;
  transition: transform .12s ease, opacity .12s ease !important;
}

/* ══════════════════════════════════════════
   DARK MODE DEPTH
   ══════════════════════════════════════════ */
:root[data-theme="dark"] html,
:root[data-theme="dark"] body {
  background:
    radial-gradient(650px 240px at 50% -5%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 55%),
    radial-gradient(500px 380px at 85% 70%, color-mix(in srgb, var(--accent) 5%, transparent), transparent 65%),
    radial-gradient(400px 300px at 15% 80%, rgba(40,28,12,.6), transparent 70%),
    linear-gradient(160deg, #110f0c 0%, #141008 50%, #0e0c08 100%) !important;
}

:root[data-theme="dark"] .card,
:root[data-theme="dark"] .stat,
:root[data-theme="dark"] .iconstat,
:root[data-theme="dark"] .listbtn,
:root[data-theme="dark"] .shelf-card {
  background: linear-gradient(160deg,
    rgba(255,235,175,.045),
    rgba(255,220,140,.022)
  ) !important;
  border-color: rgba(220,185,120,.08) !important;
}

:root[data-theme="dark"] .card::after {
  background: linear-gradient(90deg, transparent 5%, rgba(255,220,140,.07) 50%, transparent 95%);
}

:root[data-theme="dark"] .sheety {
  background: rgba(10,8,5,.50);
  border-color: rgba(220,185,120,.07);
}

/* ══════════════════════════════════════════
   ANIMATED BAR CHART FILLS
   ══════════════════════════════════════════ */
@keyframes barGrow {
  from { width: 0 !important; }
}

.bar-fill {
  animation: barGrow .55s cubic-bezier(.22,1,.36,1) both;
}

/* Stagger each bar */
.bar-row:nth-child(1) .bar-fill { animation-delay: .05s; }
.bar-row:nth-child(2) .bar-fill { animation-delay: .10s; }
.bar-row:nth-child(3) .bar-fill { animation-delay: .15s; }
.bar-row:nth-child(4) .bar-fill { animation-delay: .20s; }
.bar-row:nth-child(5) .bar-fill { animation-delay: .25s; }
.bar-row:nth-child(6) .bar-fill { animation-delay: .30s; }

/* ══════════════════════════════════════════
   SVG BRANDMARK
   ══════════════════════════════════════════ */
.brandmark svg {
  width: 28px;
  height: 28px;
  display: block;
}

/* ══════════════════════════════════════════
   HOME HERO CTA
   ══════════════════════════════════════════ */
.home-hero-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  border-radius: 22px;
  background: linear-gradient(135deg, #ddb56d 0%, var(--accent) 54%, var(--accent-strong) 100%);
  color: #fff;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: .01em;
  border: 1px solid rgba(255,255,255,.14);
  box-shadow: 0 12px 26px color-mix(in srgb, var(--accent) 40%, transparent), inset 0 1px 0 rgba(255,255,255,.26);
  width: 100%;
  justify-content: center;
  transition: transform .18s ease, box-shadow .18s ease;
}

.home-hero-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 14px 30px color-mix(in srgb, var(--accent) 46%, transparent), inset 0 1px 0 rgba(255,255,255,.30);
}

.home-hero-cta-ico { font-size: 18px; filter: drop-shadow(0 2px 6px rgba(0,0,0,.14)); }


.frag-hero::before,
.brand::after {
  content: "";
  position: absolute;
  left: 18px;
  right: 18px;
  top: 0;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 72%, #f2dfb3), transparent);
  opacity: .92;
  pointer-events: none;
}

input, select, textarea {
  border: 1px solid color-mix(in srgb, var(--border-strong) 88%, rgba(120,88,40,.08));
  background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.60));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.52), 0 1px 2px rgba(48,30,8,.03);
}

:root[data-theme="dark"] input,
:root[data-theme="dark"] select,
:root[data-theme="dark"] textarea {
  background: linear-gradient(180deg, rgba(42,34,24,.92), rgba(31,25,18,.92));
}

.home-hero-cta {
  position: relative;
  overflow: hidden;
}

.home-hero-cta::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.18), transparent 42%);
  pointer-events: none;
}

.frag-chip-row,
.ios-row-meta {
  row-gap: 4px;
}

.frag-chip-row .frag-chip:nth-child(n+5),
.ios-row-meta .pill:nth-child(n+5) {
  opacity: .72;
}

.kicker {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .24em;
}

.section-desc, .section-subtitle, .mini-note, .acc-desc, .muted, .subtle {
  color: color-mix(in srgb, var(--muted) 90%, #6e5f50 10%);
}

/* Journal score dot press animation */
.journal-dot:active {
  transform: scale(0.82) !important;
  opacity: .85;
  transition: transform .08s ease, opacity .08s ease !important;
}
.journal-dot.active {
  transform: scale(1.08);
}

/* ══════════════════════════════════════════
   SOTD CARD
   ══════════════════════════════════════════ */
.sotd-canvas-wrap {
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  background: var(--panel);
}

.sotd-preview {
  width: 100%;
  max-width: 380px;
  display: block;
  border-radius: 18px;
}

.sotd-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

/* ══════════════════════════════════════════
   COST PER WEAR
   ══════════════════════════════════════════ */
.cpw-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) 52px 64px;
  gap: 10px;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}

.cpw-row:last-child { border-bottom: none; }
.cpw-name { font-size: 13px; font-weight: 600; line-height: 1.2; }
.cpw-wears { font-size: 12px; color: var(--muted); text-align: right; }
.cpw-cost {
  font-size: 13px;
  font-weight: 700;
  text-align: right;
  color: var(--accent);
}
.cpw-cost.no-price { color: var(--muted); font-weight: 400; font-size: 12px; }

/* Price input grid */
.price-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.price-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--panel2);
}

.price-row label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0;
  text-transform: none;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.price-row input {
  width: 72px;
  min-height: 34px;
  padding: 6px 8px;
  font-size: 13px;
  flex-shrink: 0;
  border-radius: 10px;
}

/* ══════════════════════════════════════════
   JOURNAL TAB (replaces "More" label)
   ══════════════════════════════════════════ */
.journal-subnav {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 5px;
  border-radius: 16px;
  background: var(--panel-inset);
  border: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  margin-top: 8px;
}

:root[data-theme="dark"] .journal-subnav {
  background: var(--panel-inset);
}

.journal-subnav::-webkit-scrollbar { display: none; }

.journal-subnav button {
  flex: 0 0 auto;
  min-height: 36px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  padding: 0 14px;
  box-shadow: none;
  background: transparent;
  border-color: transparent;
  white-space: nowrap;
}

.journal-subnav button.active {
  background: var(--panel-strong);
  color: var(--accent);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}

/* === Collection approval pass === */
.collection-summary-strip{
  display:grid;
  grid-template-columns:repeat(5, minmax(0,1fr));
  gap:10px;
  margin-top:14px;
}
.collection-summary-chip{
  padding:12px 12px 10px;
  border-radius:18px;
  border:1px solid color-mix(in srgb, var(--accent) 10%, var(--border));
  background:linear-gradient(180deg, rgba(255,255,255,.22), transparent 62%), var(--panel-inset);
  box-shadow: var(--shadow-sm);
}
.collection-summary-chip .label{
  font-size:10px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--muted);
  font-weight:800;
}
.collection-summary-chip .value{
  margin-top:6px;
  font-family:'Cormorant Garamond', serif;
  font-size:24px;
  font-weight:700;
  line-height:1;
}

.collection-mode-intro{
  margin-top:14px;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid color-mix(in srgb, var(--accent) 10%, var(--border));
  background:linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 36%, transparent), transparent 56%), var(--panel);
}
.collection-mode-intro .title{

<script>
const OCCASIONS=["Plane","Office","Date","Casual","Gym","Evening"];
const ENVIRONMENTS=["Indoors","Mixed","Outdoors"];
const VIEWS=["Home","Collection","Wear","Layer","More"];
const WEATHER_KEY="vault_weather_pref";
const THEME_KEY="vault_theme";
const WEAR_KEY="vault_wear_log";
const JOURNAL_KEY="vault_journal";
const JOURNAL_BY_KEY_KEY="vault_journal_by_key";
const RECOMMENDATION_MEMORY_KEY="vault_recommendation_memory";
const WISHLIST_KEY="vault_wishlist";
const DELETED_FRAGRANCES_KEY="vault_deleted_fragrances";
const PRICES_KEY="vault_prices";
const API_KEY_KEY="vault_api_key";

function makeUserFragranceObject(item){
  return {
    id: item.id || ("uf_" + Date.now()),
    h: item.house || "Custom",
    n: item.name || "Unnamed Fragrance",
    i: item.inspiration || "Original",
    d: (item.dna || "").split(",").map(x=>x.trim()).filter(Boolean),
    o: (item.occasions || "").split(",").map(x=>x.trim()).filter(Boolean),
    s: item.season || "All Season",
    r: Number(item.rating || 4),
    _userAdded: true
  };
}

function getAllCollection(){
  const base = Array.isArray(COLLECTION) ? COLLECTION.slice() : [];
  const added = (state.userFragrances||[])
    .map(makeUserFragranceObject)
    .filter(item=>{
      const name = String(item.n||"").trim().toLowerCase();
      return name && name !== "unnamed fragrance";
    });

  const merged = [...base, ...added];
  const seenHouseName = new Set();

  return merged.filter(item=>{
    const name = String(item.n||"").trim().toLowerCase();
    const house = String(item.h||"").trim().toLowerCase();
    const houseNameKey = `${house}__${name}`;
    if (!name) return false;
    if (seenHouseName.has(houseNameKey)) return false;
    seenHouseName.add(houseNameKey);
    return true;
  });
}


function getFragranceKey(f){
  if (!f) return "";
  const house = String(f.h || f.house || "").trim().toLowerCase();
  const name = String(f.n || f.name || "").trim().toLowerCase();
  return name ? `${house}__${name}` : "";
}

function isFragranceKey(value){
  return typeof value === "string" && value.includes("__");
}

function getFragranceByKey(value, fallbackHouse = ""){
  const all = getAllCollection();
  if (!value) return null;
  if (isFragranceKey(value)) return all.find(f=>getFragranceKey(f)===value) || null;
  const name = String(value || "").trim().toLowerCase();
  const house = String(fallbackHouse || "").trim().toLowerCase();
  return all.find(f=>String(f.n||"").trim().toLowerCase()===name && (!house || String(f.h||"").trim().toLowerCase()===house))
    || all.find(f=>String(f.n||"").trim().toLowerCase()===name)
    || null;
}

function normalizeFragranceKey(value, fallbackHouse = ""){
  if (!value) return "";
  if (isFragranceKey(value)) return value;
  const match = getFragranceByKey(value, fallbackHouse);
  return match ? getFragranceKey(match) : "";
}

function getFragranceNameByKey(value, fallbackHouse = ""){
  const match = getFragranceByKey(value, fallbackHouse);
  return match ? match.n : String(value || "");
}

function getFragranceHouseByKey(value, fallbackHouse = ""){
  const match = getFragranceByKey(value, fallbackHouse);
  return match ? match.h : String(fallbackHouse || "");
}

function sameFragranceSelection(fragrance, value){
  return !!fragrance && getFragranceKey(fragrance) === normalizeFragranceKey(value, fragrance.h || "");
}

function getWearEntryKey(entry){
  if (!entry) return "";
  return normalizeFragranceKey(entry.fragranceKey || entry.fragrance || "", entry.house || "");
}

function getWearLogForFragrance(fragranceOrKey){
  const key = typeof fragranceOrKey === "string"
    ? normalizeFragranceKey(fragranceOrKey)
    : getFragranceKey(fragranceOrKey);
  return (state.wearLog || []).filter(entry => getWearEntryKey(entry) === key);
}

function getWearCountForFragrance(fragranceOrKey){
  return getWearLogForFragrance(fragranceOrKey).length;
}

function normalizeWearLogEntries(){
  if (!Array.isArray(state.wearLog)) state.wearLog = [];
  state.wearLog = state.wearLog.map(entry=>{
    const fragranceKey = getWearEntryKey(entry);
    const match = getFragranceByKey(fragranceKey, entry.house || "");
    return {
      ...entry,
      fragranceKey,
      fragrance: match ? match.n : (entry.fragrance || ""),
      house: match ? match.h : (entry.house || "")
    };
  });
}

function normalizePricesToKeys(){
  const current = state.prices && typeof state.prices === "object" ? state.prices : {};
  const normalized = {};
  Object.entries(current).forEach(([rawKey, rawValue])=>{
    const value = Number(rawValue);
    if (!rawKey || !Number.isFinite(value)) return;
    const fragranceKey = normalizeFragranceKey(rawKey);
    const finalKey = fragranceKey || rawKey;
    normalized[finalKey] = value;
  });
  state.prices = normalized;
}

function getPriceForFragrance(fragranceOrKey){
  const key = typeof fragranceOrKey === "string"
    ? normalizeFragranceKey(fragranceOrKey)
    : getFragranceKey(fragranceOrKey);
  const prices = state.prices && typeof state.prices === "object" ? state.prices : {};
  return key && prices[key] != null ? Number(prices[key]) : null;
}

function getWearManualHouseOptions(){
  return ["All", ...Array.from(new Set(getAllCollection().map(f=>String(f.h||"").trim()).filter(Boolean))).sort((a,b)=>a.localeCompare(b))];
}

function getWearManualFilteredCollection(house = state.wearManualHouse || "All"){
  return getAllCollection()
    .filter(f=>house === "All" ? true : f.h === house)
    .slice()
    .sort((a,b)=>a.n.localeCompare(b.n));
}

function syncWearManualSelection(){
  const all = getAllCollection();
  if (!all.length){
    state.wearManualHouse = "All";
    state.wearSelected = "";
    return [];
  }

  const current = getFragranceByKey(state.wearSelected);
  const houseOptions = getWearManualHouseOptions();
  if (!houseOptions.includes(state.wearManualHouse)) {
    state.wearManualHouse = current?.h || "All";
  }

  let filtered = getWearManualFilteredCollection(state.wearManualHouse);
  if (!filtered.length && state.wearManualHouse !== "All") {
    state.wearManualHouse = "All";
    filtered = getWearManualFilteredCollection("All");
  }

  if (!filtered.some(f=>sameFragranceSelection(f, state.wearSelected))) {
    state.wearSelected = getFragranceKey(filtered[0] || all[0]) || "";
  }

  return filtered;
}

function getCompareHouseOptions(){
  return ["All", ...Array.from(new Set(getAllCollection().map(f=>f.h).filter(Boolean))).sort((a,b)=>a.localeCompare(b))];
}

function getCompareFilteredCollection(house = "All") {
  return getAllCollection()
    .filter(f=>house === "All" ? true : f.h === house)
    .slice()
    .sort((a,b)=>String(a.n||"").localeCompare(String(b.n||"")));
}

function syncCompareSelection(){
  const all = getCompareFilteredCollection("All");
  if (!all.length){
    state.compareHouseA = "All";
    state.compareHouseB = "All";
    state.compareA = "";
    state.compareB = "";
    return { listA: [], listB: [] };
  }

  const houseOptions = getCompareHouseOptions();
  if (!houseOptions.includes(state.compareHouseA)) state.compareHouseA = "All";
  if (!houseOptions.includes(state.compareHouseB)) state.compareHouseB = "All";

  let listA = getCompareFilteredCollection(state.compareHouseA);
  let listB = getCompareFilteredCollection(state.compareHouseB);

  if (!listA.length && state.compareHouseA !== "All") {
    state.compareHouseA = "All";
    listA = getCompareFilteredCollection("All");
  }
  if (!listB.length && state.compareHouseB !== "All") {
    state.compareHouseB = "All";
    listB = getCompareFilteredCollection("All");
  }

  if (!listA.some(f=>sameFragranceSelection(f, state.compareA))) state.compareA = getFragranceKey(listA[0] || all[0]) || "";
  if (!listB.some(f=>sameFragranceSelection(f, state.compareB))) state.compareB = getFragranceKey(listB[0] || all[0]) || "";

  return { listA, listB };
}

function startEditUserFragrance(id){
  const item = (state.userFragrances||[]).find(x=>x.id===id);
  if (!item) return;
  state.editingFragranceId = id;
  state.newFragrance = {
    house: item.house || "",
    name: item.name || "",
    inspiration: item.inspiration || "",
    dna: item.dna || "",
    occasions: item.occasions || "",
    season: item.season || "All Season",
    rating: String(item.rating || 4)
  };
}

function clearFragranceForm(){
  state.editingFragranceId = null;
  state.newFragrance = {house:"",name:"",inspiration:"",dna:"",occasions:"",season:"All Season",rating:"4"};
}



function pushToast(message, kind="success"){
  const id = "t_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
  state.toasts = [...(state.toasts||[]), {id, message, kind}].slice(-3);
  render();
  setTimeout(()=>{
    state.toasts = (state.toasts||[]).filter(t => t.id !== id);
    render();
  }, 2200);
}

function openSheet(name){
  state.activeSheet = name;
}

function closeSheet(){
  state.activeSheet = null;
  state.pendingDelete = null;
}

function isExpanded(key, defaultValue=false){
  if (!state.expandedSections) state.expandedSections = {};
  return typeof state.expandedSections[key] === "boolean" ? state.expandedSections[key] : defaultValue;
}

function saveOnboardingPref(){
  localStorage.setItem("vault_show_onboarding", JSON.stringify(!!state.showOnboarding));
}

function formatExplainBullets(items){
  return (items || []).map(x=>`<div class="explain-row">${esc(x)}</div>`).join("");
}

function getMoodReasoning(fragrance, mood){
  const dna = displayDNAList(fragrance).map(norm);
  const occ = simplifyOccasionList(fragrance);
  const season = norm(fragrance.s || "");
  const journal = typeof getJournalEntry === "function" ? (getJournalEntry(fragrance) || {}) : {};
  const noteBag = `${norm(journal.moodTags||"")} ${norm(journal.notes||"")} ${norm(journal.complimentContext||"")}`;
  const m = norm(mood || "Any");
  const why = [];

  if (m === "clean"){
    if (dna.some(x=>["fresh","citrus","aquatic","musk / powdery","blue"].includes(x))) why.push("Its DNA sits on the cleaner, fresher side of the collection.");
    if (occ.includes("Office") || occ.includes("Casual")) why.push("Its occasion fit keeps it easy and controlled.");
  } else if (m === "cozy"){
    if (dna.some(x=>["amber","sweet","gourmand","woody","spicy"].includes(x))) why.push("Its warmer structure makes it feel more comforting.");
    if (/fall|winter/.test(season)) why.push("Its season fit supports cooler-weather wear.");
  } else if (m === "seductive"){
    if (occ.includes("Date") || occ.includes("Evening")) why.push("Its occasion fit is stronger for closer or more intimate settings.");
    if (dna.some(x=>["amber","sweet","spicy","gourmand"].includes(x))) why.push("Its richer DNA gives it more pull and presence.");
  } else if (m === "classy"){
    if (dna.some(x=>["woody","fougere","vetiver / earthy","musk / powdery"].includes(x))) why.push("Its more polished DNA reads sharper and more refined.");
    if (occ.includes("Office") || occ.includes("Date")) why.push("Its occasion fit works well when you want something composed.");
  } else if (m === "loud"){
    if (dna.some(x=>["amber","sweet","gourmand","spicy"].includes(x))) why.push("Its denser DNA helps it feel more attention-grabbing.");
    if (occ.includes("Evening")) why.push("Its use case already leans toward stronger wear.");
  } else if (m === "relaxing"){
    if (dna.some(x=>["musk / powdery","green","fresh","woody","vetiver / earthy"].includes(x))) why.push("Its softer DNA makes it easier to wear without effort.");
    if (occ.includes("Casual") || occ.includes("Office")) why.push("It fits quieter, lower-pressure situations.");
  }

  if (m !== "any" && noteBag.includes(m)) why.push("Your own notes or mood tags already connect it to this mood.");
  if (typeof isFavorite === "function" && isFavorite(fragrance)) why.push("It gets a small boost because you already flagged it as a favorite.");
  if (typeof getLastWornDate === "function" && !getLastWornDate(fragrance)) why.push("It gets a small boost because it has not been worn recently.");

  return why.slice(0,3);
}

function getBuySkipReasonRows(analysis){
  const rows = [];
  rows.push(analysis.reason || "No verdict reason available.");
  if (analysis.overlaps && analysis.overlaps.length){
    const top = analysis.overlaps[0];
    rows.push(`Closest overlap: ${top.item.n}.`);
    if (top.overlap.sharedDNA && top.overlap.sharedDNA.length) rows.push(`Shared DNA: ${top.overlap.sharedDNA.join(", ")}.`);
    if (top.overlap.sharedOccasion && top.overlap.sharedOccasion.length) rows.push(`Shared occasions: ${top.overlap.sharedOccasion.join(", ")}.`);
  } else {
    rows.push("There is no close overlap in the current collection, which helps it fill a clearer lane.");
  }
  return rows.slice(0,4);
}

function sortCollectionItems(items, mode){
  const arr = items.slice();
  if (mode === "House") return arr.sort((a,b)=>(a.h||"").localeCompare(b.h||"") || (a.n||"").localeCompare(b.n||""));
  if (mode === "Season") return arr.sort((a,b)=>(a.s||"").localeCompare(b.s||"") || (a.n||"").localeCompare(b.n||""));
  if (mode === "Favorites") return arr.sort((a,b)=>(isFavorite(b)?1:0)-(isFavorite(a)?1:0) || (a.n||"").localeCompare(b.n||""));
  return arr.sort((a,b)=>(a.n||"").localeCompare(b.n||""));
}

function safeJSONParse(raw, fallback){
  if (raw == null || raw === "") return fallback;
  try {
    const parsed = JSON.parse(raw);
    return parsed == null ? fallback : parsed;
  } catch (e) {
    return fallback;
  }
}

function safeLocalStorageJSON(key, fallback){
  try {
    return safeJSONParse(localStorage.getItem(key), fallback);
  } catch (e) {
    return fallback;
  }
}

function exportAllAppData(){
  const payload = {
    exportedAt: new Date().toISOString(),
    userFragrances: state.userFragrances || [],
    wearLog: state.wearLog || [],
    savedLayerCombos: state.savedLayerCombos || [],
    favorites: state.favoriteFragrances || [],
    displaySnapshots: state.displaySnapshots || [],

    journalByKey: safeLocalStorageJSON(JOURNAL_BY_KEY_KEY, {}),
    recommendationMemory: safeLocalStorageJSON(RECOMMENDATION_MEMORY_KEY, {wear:{},signature:{},mood:{},buy:{}}),
    wishlist: safeLocalStorageJSON(WISHLIST_KEY, []),
    prices: safeLocalStorageJSON(PRICES_KEY, {}),

function importAllAppDataFromText(textValue){
  try{
    const payload = JSON.parse(textValue);
    if (!payload || typeof payload !== "object") return {ok:false, message:"Backup file is not valid."};

    if (Array.isArray(payload.userFragrances)) state.userFragrances = payload.userFragrances;
    if (Array.isArray(payload.wearLog)) state.wearLog = payload.wearLog;
    if (Array.isArray(payload.savedLayerCombos)) state.savedLayerCombos = payload.savedLayerCombos;

    if (Array.isArray(payload.favorites)){
      state.favoriteFragrances = payload.favorites;
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(state.favoriteFragrances));
    }

    const importedDisplays = Array.isArray(payload.displaySnapshots)
      ? payload.displaySnapshots
      : (Array.isArray(payload.savedDisplays) ? payload.savedDisplays : null);
    if (importedDisplays){
      state.displaySnapshots = importedDisplays;
      localStorage.setItem(DISPLAY_KEY, JSON.stringify(state.displaySnapshots));
    }

    if (payload.journalData && typeof payload.journalData === "object") state.journalData = payload.journalData;
    if (payload.journalByKey && typeof payload.journalByKey === "object") state.journalByKey = payload.journalByKey;
    if (payload.recommendationMemory && typeof payload.recommendationMemory === "object") state.recommendationMemory = payload.recommendationMemory;

    migrateJournalDataToKeys();
    saveJournalData();
    saveRecommendationMemory();

    if (Array.isArray(payload.wishlist)){ state.wishlist = payload.wishlist; saveWishlist(); }
    if (payload.prices && typeof payload.prices === "object"){ state.prices = payload.prices; normalizePricesToKeys(); savePrices(); }
    if (Array.isArray(payload.deletedFragrances)){ state.deletedFragrances = payload.deletedFragrances; saveDeletedFragrances(); }

    if (payload.settings && typeof payload.settings === "object"){
      if (payload.settings.theme) state.theme = payload.settings.theme;
      if (payload.settings.weatherPref) state.weatherPref = payload.settings.weatherPref;
      if (payload.settings.collectionSort) state.collectionSort = payload.settings.collectionSort;
    }

    saveUserFragrances();
    saveWearLog();
    saveLayerCombos();
    saveTheme();
    saveWeatherPref();
    render();
    return {ok:true};
  }catch(e){
    return {ok:false, message:"Import file is not valid JSON."};
  }
}

  };
  if (!payload.name) return {ok:false, message:"Name is required."};

  state.userFragrances = state.userFragrances || [];
  const idx = state.userFragrances.findIndex(x=>x.id===payload.id);
  if (idx >= 0) state.userFragrances[idx] = payload;

  clearFragranceForm();
  return {ok:true};
}

function resolveFragranceIdentity(input, house=""){
  if (!input) return { key:"", name:"", house:"", fragrance:null };
  if (typeof input === "object") {
    const fragrance = input.n ? input : getFragranceByKey(input.fragranceKey || input.key || "", input.house || house);
    if (fragrance) return { key:getFragranceKey(fragrance), name:fragrance.n, house:fragrance.h, fragrance };
    const keyFromObject = normalizeFragranceKey(input.fragranceKey || input.key || "", input.house || house);
    return { key:keyFromObject, name:input.n || input.name || getFragranceNameByKey(keyFromObject), house:input.h || input.house || house || getFragranceHouseByKey(keyFromObject), fragrance:getFragranceByKey(keyFromObject, input.house || house) };
  }
  const raw = String(input || "").trim();
  const keyed = normalizeFragranceKey(raw, house);
  const byKey = getFragranceByKey(keyed, house);
  if (byKey) return { key:getFragranceKey(byKey), name:byKey.n, house:byKey.h, fragrance:byKey };
  const byName = getAllCollection().find(f => norm(f.n) === norm(raw) && (!house || norm(f.h) === norm(house)));
  if (byName) return { key:getFragranceKey(byName), name:byName.n, house:byName.h, fragrance:byName };
  return { key:keyed, name:raw, house:house || getFragranceHouseByKey(keyed), fragrance:getFragranceByKey(keyed, house) };
}

function getRecommendationMemoryScore(bucket, fragrance){
  const key = resolveFragranceIdentity(fragrance).key;
  if (!key) return 0;
  const hit = getRecommendationMemoryBucket(bucket)[key];
  if (!hit || !hit.lastShownAt) return 0;
  const days = (Date.now() - new Date(hit.lastShownAt).getTime()) / 86400000;
  if (!Number.isFinite(days)) return 0;
  if (days < 1) return -1.8;
  if (days < 3) return -1.0;
  if (days < 7) return -0.45;
  return 0;
}
function rememberRecommendations(bucket, fragrances){
  const store = getRecommendationMemoryBucket(bucket);
  const now = new Date().toISOString();
  (fragrances || []).forEach((fragrance, index)=>{
    const ident = resolveFragranceIdentity(fragrance);
    if (!ident.key) return;
    const current = store[ident.key] || {timesShown:0};
    store[ident.key] = {...current, key:ident.key, name:ident.name, house:ident.house, lastShownAt:now, timesShown:(current.timesShown||0)+1, lastRank:index+1};
  });
  saveRecommendationMemory();
}

function normalizeJournalByKeyStore(){
  try{
    const existing = state.journalByKey && typeof state.journalByKey === 'object' ? state.journalByKey : {};
    const merged = {...existing};
    const legacy = state.journalData || {};
    if(legacy && typeof legacy === 'object'){
      Object.entries(legacy).forEach(([legacyName, entry])=>{
        const frag = getAllCollection().find(f=>normalizeStr(f.n)===normalizeStr(legacyName));
        if(frag){
          const key = getFragranceKey(frag);
          if(key && !merged[key] && entry && typeof entry === 'object') merged[key] = entry;
        }
      });
    }
    state.journalByKey = merged;
    return merged;
  }catch(_){
    state.journalByKey = state.journalByKey && typeof state.journalByKey === 'object' ? state.journalByKey : {};
    return state.journalByKey;
  }
}

function clampScore(value, min=0, max=10){
  return Math.min(max, Math.max(min, Number.isFinite(Number(value)) ? Number(value) : min));
}
function roundScore(value, digits=1){
  const n = Number(value);
  if (!Number.isFinite(n)) return 0;
  const pow = Math.pow(10, digits);
  return Math.round(n * pow) / pow;
}
function composeScore(parts, scale=100){
  const list = Object.values(parts || {}).filter(Boolean);
  const totalWeight = list.reduce((sum, part)=>sum + Math.max(0, Number(part.weight || 0)), 0);
  if (!totalWeight) return 0;
  const weighted = list.reduce((sum, part)=>sum + clampScore(part.score) * Math.max(0, Number(part.weight || 0)), 0) / totalWeight;
  return roundScore((weighted / 10) * scale, 1);
}
function scoreRatio(value, maxValue, scale=10){
  if (!maxValue || maxValue <= 0) return scale * 0.5;
  return clampScore((Number(value || 0) / maxValue) * scale);
}
function getScoringJournalMetrics(fragrance){
  const key = getFragranceKey(fragrance);
  const rawEntry = getJournalEntry(fragrance) || {};
  const entry = rawEntry && typeof rawEntry === "object" ? rawEntry : {};
  const clean = value => {
    const n = Number(value || 0);
    return Number.isFinite(n) && n > 0 ? clampScore(n, 0, 5) : 0;
  };
  const metrics = {
    scent: clean(entry.scent),
    performance: clean(entry.performance),
    compliments: clean(entry.compliments),
    uniqueness: clean(entry.uniqueness),
    comfort: clean(entry.comfort)
  };
  const values = Object.values(metrics).filter(v => v > 0);
  const average5 = values.length ? values.reduce((a,b)=>a+b,0) / values.length : 0;
  return {
    entry: rawEntry,
    key,
    ...metrics,
    count: values.length,
    average5,
    average10: clampScore(average5 * 2),
    confidence: values.length ? clampScore(2.8 + values.length * 1.2) : 2.2
  };
}


function getPositiveNegativeWeightTotals(weights){
  let positive = 0, negative = 0;
  Object.entries(weights || {}).forEach(([_, value])=>{
    const n = Number(value || 0);
    if (n > 0) positive += n;
    if (n < 0) negative += Math.abs(n);
  });
  return {positive, negative};
}
function getWeightedTagFit(dna, weights){
  const tags = Array.isArray(dna) ? dna : [];
  const {positive, negative} = getPositiveNegativeWeightTotals(weights || {});
  let matchedPositive = 0, matchedNegative = 0;
  tags.forEach(tag=>{
    const value = Number((weights || {})[tag] || 0);
    if (value > 0) matchedPositive += value;
    if (value < 0) matchedNegative += Math.abs(value);
  });
  const positiveScore = positive ? (matchedPositive / positive) * 10 : 5.8;
  const negativePenalty = negative ? (matchedNegative / negative) * 6.8 : 0;
  return clampScore(positiveScore - negativePenalty + 3.6);
}
