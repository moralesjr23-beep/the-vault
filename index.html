function renderSOTDCanvas(){
  const canvas = document.getElementById("sotdCanvas");
  if (!canvas) return;
  const doRender = () => {
    const W = 380, H = 480;
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + "px";
    canvas.style.height = H + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    const all = getAllCollection();
    const sel = getFragranceByKey(state.sotdFrag) || all[0];
    if (!sel) return;
    _drawSOTDCanvas(ctx, W, H, sel);
  };
  if (document.fonts && document.fonts.ready){
    document.fonts.ready.then(doRender);
  } else {
    doRender();
  }
}
function _drawSOTDCanvas(ctx, W, H, sel){
  const isDark = state.theme === "dark";
  const accent = isDark ? "#d4a85a" : "#b8924a";
  const bg1    = isDark ? "#14120e" : "#f8f4ee";
  const bg2    = isDark ? "#1e1a14" : "#ede8df";
  const text   = isDark ? "#f2ece2" : "#1c1610";
  const muted  = isDark ? "#a89e90" : "#7a6e61";

  // Background
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, bg1);
  grad.addColorStop(1, bg2);
  ctx.fillStyle = grad;
  roundRect(ctx, 0, 0, W, H, 18);
  ctx.fill();

  // Accent glow top-right
  const glow = ctx.createRadialGradient(W*.85, H*.08, 0, W*.85, H*.08, 160);
  glow.addColorStop(0, isDark?"rgba(212,168,90,.18)":"rgba(184,146,74,.13)");
  glow.addColorStop(1, "transparent");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Top kicker
  ctx.font = "700 10px 'DM Sans', sans-serif";
  ctx.letterSpacing = "3px";
  ctx.fillStyle = accent;
  ctx.fillText("SCENT OF THE DAY", 28, 44);
  ctx.letterSpacing = "0px";

  // Date + weather
  const today = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const weatherLine = state.weather.temp!=null ? `${Math.round(state.weather.temp)}°F · ${getWeatherLabel(state.weather.code)} · Arlington, VA` : "Arlington, VA";
  ctx.font = "400 12px 'DM Sans', sans-serif";
  ctx.fillStyle = muted;
  ctx.fillText(today, 28, 68);
  ctx.fillText(weatherLine, 28, 86);

  // Divider
  ctx.strokeStyle = isDark ? "rgba(255,255,255,.08)" : "rgba(0,0,0,.07)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(28, 102); ctx.lineTo(W-28, 102); ctx.stroke();

  // Fragrance name
  ctx.font = `700 ${sel.n.length > 22 ? "22" : "28"}px 'Cormorant Garamond', serif`;
  ctx.fillStyle = text;
  wrapText(ctx, sel.n, 28, 142, W-56, 36);

  // House
  ctx.font = "400 14px 'DM Sans', sans-serif";
  ctx.fillStyle = muted;
  ctx.fillText(sel.h, 28, 178);

  // Inspired by
  if (sel.i && sel.i !== "Original"){
    ctx.font = "400 13px 'DM Sans', sans-serif";
    ctx.fillStyle = isDark ? "rgba(212,168,90,.72)" : "rgba(184,146,74,.82)";
    ctx.fillText("✦ " + sel.i, 28, 200);
  }

  // DNA pills
  const dna = displayDNAList(sel).slice(0, 5);
  let px = 28, py = 228;
  ctx.font = "600 11px 'DM Sans', sans-serif";
  dna.forEach(tag => {
    const tw = ctx.measureText(tag).width + 20;
    if (px + tw > W - 28) { px = 28; py += 26; }
    // pill bg
    ctx.fillStyle = isDark ? "rgba(212,168,90,.14)" : "rgba(184,146,74,.12)";
    roundRect(ctx, px, py-14, tw, 22, 11);
    ctx.fill();
    ctx.fillStyle = accent;
    ctx.fillText(tag, px+10, py+2);
    px += tw + 8;
  });

  py = Math.max(py + 32, 290);

  // Occasion + mood + sprays
  const occ = state.sotdOccasion || "Casual";
  const mood = state.sotdMood || "";
  const sprays = state.sotdSprays || "";
  const note = state.sotdNote || "";

  ctx.font = "600 13px 'DM Sans', sans-serif";
  ctx.fillStyle = text;
  ctx.fillText(occ, 28, py);
  if (mood){ ctx.fillStyle = muted; ctx.fillText("· " + mood, 28 + ctx.measureText(occ).width + 8, py); }

  if (sprays){
    ctx.font = "400 12px 'DM Sans', sans-serif";
    ctx.fillStyle = muted;
    ctx.fillText(sprays, 28, py + 20);
  }

  if (note){
    ctx.font = "400 13px 'DM Sans', sans-serif";
    ctx.fillStyle = isDark ? "rgba(242,236,226,.7)" : "rgba(28,22,16,.65)";
    wrapText(ctx, `"${note}"`, 28, py + 50, W-56, 18);
  }

  // Bottom bar
  ctx.fillStyle = isDark ? "rgba(212,168,90,.12)" : "rgba(184,146,74,.10)";
  ctx.fillRect(0, H-52, W, 52);
  ctx.font = "700 11px 'DM Sans', sans-serif";
  ctx.fillStyle = accent;
  ctx.letterSpacing = "2px";
  ctx.fillText("THE VAULT", 28, H-24);
  ctx.letterSpacing = "0px";
  ctx.font = "400 11px 'DM Sans', sans-serif";
  ctx.fillStyle = muted;
  ctx.fillText(`${getAllCollection().length} bottles · ${getFavoriteCount()} favorites`, W-28-ctx.measureText(`${getAllCollection().length} bottles · ${getFavoriteCount()} favorites`).width, H-24);
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH){
  const words = text.split(" ");
  let line = "";
  for (const word of words){
    const test = line ? line + " " + word : word;
    if (ctx.measureText(test).width > maxW && line){
      ctx.fillText(line, x, y);
      line = word;
      y += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, y);
}

function costPerWearView(){
  const all = getAllCollection();
  const wearCounts = {};
  (state.wearLog||[]).forEach(e => { const key = getWearEntryKey(e); wearCounts[key] = (wearCounts[key]||0)+1; });
  const prices = state.prices || {};
  const cpwSort = state.cpwSort || "cpw-asc";

  const rows = all
    .map(f => ({
      f,
      wears: wearCounts[getFragranceKey(f)] || 0,
      price: getPriceForFragrance(f)
    }))
    .filter(r => r.wears > 0 || r.price != null)
    .sort((a,b) => {
      const cpwA = (a.price && a.wears) ? a.price/a.wears : null;
      const cpwB = (b.price && b.wears) ? b.price/b.wears : null;
      if (cpwSort === "cpw-asc"){
        if (cpwA==null && cpwB==null) return 0;
        if (cpwA==null) return 1; if (cpwB==null) return -1;
        return cpwA - cpwB;
      }
      if (cpwSort === "cpw-desc"){
        if (cpwA==null && cpwB==null) return 0;
        if (cpwA==null) return 1; if (cpwB==null) return -1;
        return cpwB - cpwA;
      }
      if (cpwSort === "wears-desc") return b.wears - a.wears;
      if (cpwSort === "wears-asc")  return a.wears - b.wears;
      if (cpwSort === "name")       return a.f.n.localeCompare(b.f.n);
      return 0;
    });

  const totalWears = (state.wearLog||[]).length;
  const priced = rows.filter(r=>r.price && r.wears);
  const avgCPW = priced.length ? priced.reduce((s,r)=>s+r.price/r.wears,0)/priced.length : null;
  const totalSpend = Object.values(prices).reduce((s,p)=>s+Number(p||0),0);

  return `<div class="grid">
    <div class="grid cols-3">
      <div class="iconstat"><div class="iconbubble">📋</div><div><div class="kicker">Total wears</div><div class="num">${totalWears}</div></div></div>
      <div class="iconstat"><div class="iconbubble">💰</div><div><div class="kicker">Avg cost/wear</div><div class="num" style="font-size:20px">${avgCPW!=null?"$"+avgCPW.toFixed(2):"—"}</div></div></div>
      <div class="iconstat"><div class="iconbubble">🧴</div><div><div class="kicker">Total invested</div><div class="num" style="font-size:20px">${totalSpend?"$"+totalSpend.toFixed(0):"—"}</div></div></div>
    </div>

    <div class="card">
      <div class="kicker">Set bottle prices</div>
      <h3 style="margin-top:4px">Price your collection</h3>
      <div class="section-desc">Enter what you paid. Cost per wear calculates automatically from your wear log.</div>
      <div class="price-grid" style="margin-top:14px">
        ${all.slice(0,30).map(f=>`
          <div class="price-row">
            <label title="${esc(f.n)}">${esc(f.n)}</label>
            <input type="number" class="price-input" data-frag="${esc(getFragranceKey(f))}" value="${esc(getPriceForFragrance(f) ?? "")}" placeholder="$" min="0" step="1">
          </div>
        `).join("")}
      </div>
    </div>

    ${rows.length ? `
    <div class="card">
      <div class="section-head" style="margin-bottom:14px">
        <div><div class="kicker">Cost per wear ranking</div><h3 style="margin-top:4px">Best and worst value</h3></div>
        <div class="field" style="max-width:170px">
          <label>Sort by</label>
          <select id="cpwSort">
            <option value="cpw-asc"   ${cpwSort==="cpw-asc"   ?"selected":""}>CPW: best first</option>
            <option value="cpw-desc"  ${cpwSort==="cpw-desc"  ?"selected":""}>CPW: worst first</option>
            <option value="wears-desc"${cpwSort==="wears-desc"?"selected":""}>Most worn</option>
            <option value="wears-asc" ${cpwSort==="wears-asc" ?"selected":""}>Least worn</option>
            <option value="name"      ${cpwSort==="name"      ?"selected":""}>Name A–Z</option>
          </select>
        </div>
      </div>
      <div>
        ${rows.map(r=>{
          const cpw = (r.price && r.wears) ? (r.price/r.wears) : null;
          const cls = cpw!=null ? (cpw<=5?"good":cpw<=15?"warn":"bad") : "";
          return `<div class="cpw-row">
            <div>
              <div class="cpw-name">${esc(r.f.n)}</div>
              <div style="font-size:11px;color:var(--muted)">${esc(r.f.h)}</div>
            </div>
            <div class="cpw-wears">${r.wears} wear${r.wears===1?"":"s"}</div>
            <div class="cpw-cost ${cpw==null?"no-price":cls}">${cpw!=null?"$"+cpw.toFixed(2):"no price"}</div>
          </div>`;
        }).join("")}
      </div>
    </div>
    ` : `<div class="empty-card" style="padding:28px;text-align:center"><div style="font-size:28px;margin-bottom:10px">💰</div><strong>Add prices above and log wears to see your ranking.</strong></div>`}
  </div>`;
}

function updateJournalPhotoPreview(value){
  const wrap = document.getElementById("journalPhotoPreviewWrap");
  const img = document.getElementById("journalPhotoPreview");
  const err = document.getElementById("journalPhotoPreviewError");
  if (!wrap || !img || !err) return;

  const url = String(value || "").trim();
  if (!url){
    wrap.classList.add("hidden");
    img.removeAttribute("src");
    err.classList.add("hidden");
    return;
  }

  wrap.classList.remove("hidden");
  err.classList.add("hidden");
  img.src = url;

  img.onload = () => {
    wrap.classList.remove("hidden");
    err.classList.add("hidden");
  };
  img.onerror = () => {
    wrap.classList.remove("hidden");
    err.classList.remove("hidden");
  };
}

      fragrance: f.n,
      house: f.h,
      amount: state.sotdSprays || getSprayAdvice(f, state.sotdOccasion||"Casual"),
      occasion: state.sotdOccasion || "Casual",
      notes: [state.sotdMood, state.sotdNote].filter(Boolean).join(" · ")
    });
    saveWearLog();
    haptic("medium");
    pushToast("Wear logged ✦", "success");
    render();
  };

  const sotdDownload = document.getElementById("sotdDownload");
  if (sotdDownload) sotdDownload.onclick = ()=>{
    renderSOTDCanvas();
    setTimeout(()=>{
      const canvas = document.getElementById("sotdCanvas");
      if (!canvas) return;
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `SOTD-${getFragranceNameByKey(state.sotdFrag||"vault").replace(/\s+/g,"-")}-${new Date().toISOString().slice(0,10)}.png`;
      a.click();
      haptic("light");
      pushToast("Card saved", "success");
    }, 80);
  };

  const sotdCopyCard = document.getElementById("sotdCopyCard");
  if (sotdCopyCard) sotdCopyCard.onclick = ()=>{
    const f = getFragranceByKey(state.sotdFrag);
    if (!f) return;
    const dna = displayDNAList(f).slice(0,4).join(", ");
    const txt = [
      `✦ SOTD: ${f.n}`,
      `House: ${f.h}`,
      `DNA: ${dna}`,
      `Occasion: ${state.sotdOccasion||"Casual"}`,
      state.sotdSprays ? `Sprays: ${state.sotdSprays}` : "",
      state.sotdMood ? `Mood: ${state.sotdMood}` : "",
      state.sotdNote ? `"${state.sotdNote}"` : "",
      `Date: ${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}`
    ].filter(Boolean).join("\n");
    navigator.clipboard && navigator.clipboard.writeText(txt).then(()=>{ haptic("light"); pushToast("Copied to clipboard","success"); });
  };

  // Cost Per Wear sort
  bindValue("cpwSort", v=>{ state.cpwSort=v; render(); });

  // Cost Per Wear — price input bindings (delegated)
  document.querySelectorAll(".price-input").forEach(inp => {
    inp.onchange = ()=>{
      const fragKey = normalizeFragranceKey(inp.dataset.frag);
      const val = inp.value.trim();
      state.prices = state.prices || {};
      if (fragKey && val && !isNaN(Number(val))) state.prices[fragKey] = Number(val);
      else if (fragKey) delete state.prices[fragKey];
      savePrices();
      render();
    };
  });

  // ── Swipe-to-dismiss sheet ─────────────────────────────────────────────────
  (()=>{
    const sheet = document.querySelector(".sheet");
    if (!sheet || window.__vaultSwipeBound === sheet) return;
    window.__vaultSwipeBound = sheet;
    let startY = 0, currentY = 0, dragging = false;
    const onStart = (e)=>{
      if (sheet.scrollTop > 0) return; // only trigger when scrolled to top
      startY = e.touches ? e.touches[0].clientY : e.clientY;
      currentY = startY;
      dragging = true;
      sheet.style.transition = "none";
    };
    const onMove = (e)=>{
      if (!dragging) return;
      currentY = e.touches ? e.touches[0].clientY : e.clientY;
      const dy = Math.max(0, currentY - startY);
      sheet.style.transform = `translateY(${dy}px)`;
    };
    const onEnd = ()=>{
      if (!dragging) return;
      dragging = false;
      const dy = currentY - startY;
      sheet.style.transition = "";
      if (dy > 100){
        sheet.style.transform = `translateY(100%)`;
        setTimeout(()=>{ closeSheet(); render(); }, 280);
      } else {
        sheet.style.transform = "";
      }
    };
    sheet.addEventListener("touchstart", onStart, {passive:true});
    sheet.addEventListener("touchmove", onMove, {passive:true});
    sheet.addEventListener("touchend", onEnd, {passive:true});
  })();
}

window.__vaultNav = function(v){
  syncBuyDraftFromDOM();
  if (v === "Wear") state.view = "Wear Today";
  else if (v === "Layer") state.view = "Layering";
  else if (v === "More") state.view = getCurrentMoreSection();
  else if (v === "Collection") state.view = "Collection";
  else if (v === "Home") state.view = "Home";
  else state.view = v;
  if (getMoreSections().includes(state.view)) state.lastMoreSection = state.view;
  render();
};

async function loadWeather(){
  state.weather={loading:true,error:"",temp:null,code:null,wind:null,humidity:null,city:state.weatherPref.mode==="manual"?(state.weatherPref.city||"Manual city"):"Your area"};
  render();
  state.weather=await fetchWeather(state.weatherPref);
  render();
}
if (!state.sotdFrag && COLLECTION.length) state.sotdFrag = getFragranceKey(COLLECTION[0]);
function bootVault(){
  try{
    render();
    setTimeout(function(){
      try { loadWeather(); } catch(inner){ if(window.__vaultShowBootError) window.__vaultShowBootError(inner && (inner.stack || inner.message) ? (inner.stack || inner.message) : String(inner)); }
    }, 0);
  }catch(e){
    if(window.__vaultShowBootError) window.__vaultShowBootError(e && (e.stack || e.message) ? (e.stack || e.message) : String(e));
    throw e;
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootVault, { once:true });
} else {
  bootVault();
}
</script>
</body>
