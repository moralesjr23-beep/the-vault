function id(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}

    let s=JSON.parse(localStorage.getItem(STORE));

function compatible(a,b){if(!a||!b||a.id===b.id)return null;let score=50,parts=[],bad=[];const shared=a.dna.filter(x=>b.dna.includes(x));if(shared.length){let p=Math.min(25,shared.length*7);score+=p;parts.push(`+${p} shared DNA`)}
let comp=0;for(const [x,y] of COMPLEMENTS){if((a.dna.includes(x)&&b.dna.includes(y))||(a.dna.includes(y)&&b.dna.includes(x)))comp+=10} if(comp){comp=Math.min(25,comp);score+=comp;parts.push(`+${comp} complementary lanes`)}

function seasonMatch(sa,sb){return sa==='Year-round'||sb==='Year-round'||sa===sb||sa.includes('Spring')&&sb.includes('Spring')||sa.includes('Fall')&&sb.includes('Fall')}
function redundant(a,b){const flags=['ANCHOR','NEAR DUP','EXACT DUP'];if(flags.includes(a.flag)&&flags.includes(b.flag))return 'Both are marked as reference/duplicate profiles — redundant, you’re wasting sprays.';const ia=(a.inspiration||'').toLowerCase(), ib=(b.inspiration||'').toLowerCase();for(const n of ANCHORS){let k=n.toLowerCase(); if(ia.includes(k)&&ib.includes(k))return `Both anchor ${n} DNA — redundant, you’re wasting sprays.`}return ''}
function ratioFor(score,a,b){if(score<40)return 'Don’t layer'; if(a.rating>b.rating+1)return '2+1 sprays'; if(b.rating>a.rating+1)return '1+2 sprays'; if(score>82)return '2+2 sprays'; if(a.dna.some(x=>DENSE.includes(x))||b.dna.some(x=>DENSE.includes(x)))return '3+1 sprays'; return '1+1 sprays'}
function comboTag(a,b){const all=[...a.dna,...b.dna];if(all.includes('Tobacco')||all.includes('Vanilla')||all.includes('Gourmand'))return 'Cozy Evening';if(all.includes('Oud')||all.includes('Leather')||all.includes('Spicy'))return 'Bold Statement';if(all.includes('Amber')||all.includes('Sweet'))return 'Date';return 'Daily Driver'}
function whyWorks(a,b,shared){let add=b.dna.find(x=>!a.dna.includes(x))||primary(b);let sh=shared[0]?`shared ${shared[0].toLowerCase()} keeps it coherent`:'different lanes create contrast';return `${a.name} brings ${primary(a).toLowerCase()}; ${b.name} adds ${add.toLowerCase()}. The ${sh}.`}
function bestAlt(a,badB){let best=null,res=null;for(const x of state.collection){if(x.id===a.id||x.id===badB.id)continue;const r=compatibleNoAlt(a,x);if(r&&!r.clash&&a.dna.some(t=>x.dna.includes(t))&&r.score>(res?.score||0)){best=x;res=r}}return best?`${a.name} + ${best.name} (${res.score}/100)`:''}
function compatibleNoAlt(a,b){let old=bestAlt;try{return compatibleCore(a,b)}catch(e){return null}}
function compatibleCore(a,b){let saveBest=window.bestAlt;return (function(){let score=50,parts=[],bad=[];const shared=a.dna.filter(x=>b.dna.includes(x));if(shared.length)score+=Math.min(25,shared.length*7);for(const [x,y] of COMPLEMENTS){if((a.dna.includes(x)&&b.dna.includes(y))||(a.dna.includes(y)&&b.dna.includes(x)))score+=10}if(seasonMatch(a.season,b.season))score+=10;else score-=15;const lane=LANE_WARS.find(([x,y])=>(a.dna.includes(x)&&b.dna.includes(y))||(a.dna.includes(y)&&b.dna.includes(x)));if(lane)score-=20;if(redundant(a,b))score-=25;if(a.rating>=4&&b.rating>=4&&a.dna.some(x=>DENSE.includes(x))&&b.dna.some(x=>DENSE.includes(x)))score-=18;if(a.flag==='ANCHOR'&&shared.length>=3)score-=15;score=Math.max(0,Math.min(100,Math.round(score)));return {score,clash:score<40}})()}
const A={setView({view}){state.view=view;state.selected=null;save();render()},setTheme({theme}){state.theme=theme;save();applyTheme();render()},search({value}){state.search=value;save();renderCollectionOnly()},filterDNA({dna}){state.filterDNA=dna;save();render()},filterSeason({season}){state.filterSeason=season;save();render()},openBottle({id}){state.selected=id;save();render()},back(){state.selected=null;save();render()},deleteBottle({id}){state.collection=state.collection.filter(f=>f.id!==id);state.selected=null;save();render();toast('Deleted')},selectLab({side,value}){state[side]=value;save();render()},calc(){haptic();lastResult=null;render();setTimeout(()=>{document.querySelector('.labHero')?.classList.add('animating');},20);setTimeout(()=>document.querySelector('.labHero')?.classList.add('merge'),360);setTimeout(()=>{const a=getF(state.labA),b=getF(state.labB);lastResult=compatible(a,b);render();document.querySelector('.labHero')?.classList.add('result');animateScore(lastResult?.score||0);},980)},saveCombo(){const a=getF(state.labA),b=getF(state.labB),r=compatible(a,b);if(!a||!b||r.clash)return toast('Not saved. Bad pairing.');state.combos.unshift({id:id(),a:a.id,b:b.id,score:r.score,ratio:r.ratio,tag:r.tag,notes:'',date:new Date().toISOString()});save();render();toast('Combo saved')},comboNote({id,value}){let c=state.combos.find(x=>x.id===id);if(c)c.notes=value;save()},deleteCombo({id}){state.combos=state.combos.filter(x=>x.id!==id);save();render()},getWeather(){getWeather()},city({value}){state.city=value;save()},logWear({id,combo}){state.wearHistory.unshift({id:id||null,combo:combo||null,date:new Date().toISOString(),weather:state.weather});save();toast('Logged')},wheel({tag}){state.wheelTag=tag;save();render()},export(){download('aj-fragrance-data.json',JSON.stringify(state,null,2))},import({}){document.getElementById('importFile').click()},clear(){if(confirm('Clear all local data?')){localStorage.removeItem(STORE);state=load();applyTheme();render()}},fileImport({files}){let f=files[0];if(!f)return;let rd=new FileReader();rd.onload=()=>{try{state=JSON.parse(rd.result);save();applyTheme();render();toast('Imported')}catch(e){toast('Invalid JSON')}};rd.readAsText(f)}};
function getF(id){return state.collection.find(f=>f.id===id)}
function render(){applyTheme();renderHeader();renderNav();const app=document.getElementById('app');app.innerHTML=headerHTML()+viewsHTML();wireInputs();}
function renderHeader(){}
function headerHTML(){return `<header><div class="top"><div class="brand"><h1>AJ Layering Lab</h1><p>Collection-first fragrance pairing. Offline. Local.</p></div><div class="themeToggle">${['auto','light','dark'].map(t=>`<button class="${state.theme===t?'active':''}" data-action="setTheme" data-theme="${t}">${t}</button>`).join('')}</div></div></header>`}
function renderNav(){const navs=[['collection','Collection'],['lab','Layer'],['wear','Wear'],['wheel','DNA'],['settings','Settings']];document.getElementById('nav').innerHTML=navs.map(([v,l])=>`<button class="navBtn ${state.view===v?'active':''}" data-action="setView" data-view="${v}">${l}</button>`).join('')}
function viewsHTML(){return `<main>${collectionView()}${labView()}${wearView()}${wheelView()}${settingsView()}</main>`}
function filtered(){let q=state.search.toLowerCase();return state.collection.filter(f=>(!q||[f.house,f.name,f.inspiration,(f.dna||[]).join(' ')].join(' ').toLowerCase().includes(q))&&(state.filterDNA==='All'||f.dna.includes(state.filterDNA))&&(state.filterSeason==='All'||f.season===state.filterSeason))}
function collectionView(){if(state.selected)return detailView(getF(state.selected));let fs=filtered();let groups=Object.groupBy?Object.groupBy(fs,f=>f.house):fs.reduce((a,f)=>(a[f.house]=[...(a[f.house]||[]),f],a),{});return `<section class="view ${state.view==='collection'?'active':''}" id="collectionView"><div class="card"><h2>Collection</h2><input class="input" data-input="search" placeholder="Search house, bottle, inspiration, DNA" value="${esc(state.search)}"><div class="chips"><button class="chip ${state.filterDNA==='All'?'active':''}" data-action="filterDNA" data-dna="All">All DNA</button>${DNA.map(d=>`<button class="chip ${state.filterDNA===d?'active':''}" data-action="filterDNA" data-dna="${esc(d)}">${esc(d)}</button>`).join('')}</div><div class="chips"><button class="chip ${state.filterSeason==='All'?'active':''}" data-action="filterSeason" data-season="All">All seasons</button>${SEASONS.map(s=>`<button class="chip ${state.filterSeason===s?'active':''}" data-action="filterSeason" data-season="${s}">${s}</button>`).join('')}</div></div>${Object.keys(groups).sort().map(h=>`<h2 class="sectionTitle">${esc(h)}</h2><div class="grid">${groups[h].map(bottleCard).join('')}</div>`).join('')||'<div class="empty">No bottles match.</div>'}</section>`}
function bottleCard(f){return `<article class="bottleCard" data-action="openBottle" data-id="${f.id}"><div><div class="between"><h3>${esc(f.name)}</h3><span class="flag">${esc(f.flag||'')}</span></div><div class="meta">${esc(f.inspiration)}</div></div><div><div class="row">${f.dna.slice(0,3).map(d=>`<span class="dnaChip" style="background:${DNA_COLOR[d]}">${esc(d)}</span>`).join('')}</div><p class="small">${esc(f.season)} · ${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</p></div></article>`}
function detailView(f){if(!f)return '';return `<section class="view active"><div class="card"><button class="btn secondary" data-action="back">Back</button><h2>${esc(f.name)}</h2><p class="sub">${esc(f.house)} · Inspired by / style: ${esc(f.inspiration)}</p><div class="row">${f.dna.map(d=>`<span class="dnaChip" style="background:${DNA_COLOR[d]}">${esc(d)}</span>`).join('')}</div></div><div class="card"><h3>Notes pyramid</h3><div class="list"><div class="lineItem"><b>Top</b><br>${esc(f.notes?.top||'Not set')}</div><div class="lineItem"><b>Heart</b><br>${esc(f.notes?.heart||'Not set')}</div><div class="lineItem"><b>Base</b><br>${esc(f.notes?.base||'Not set')}</div></div></div><div class="card"><h3>Use</h3><p>${esc((f.occasions||[]).join(' / '))}</p><p class="sub">Season: ${esc(f.season)} · Rating: ${f.rating}/5 · Flag: ${esc(f.flag||'None')}</p><h3>Established pairings</h3><p>${esc((f.pairings||[]).join(', ')||'None yet.')}</p><button class="btn danger full" data-action="deleteBottle" data-id="${f.id}">Delete bottle</button></div></section>`}
function labView(){const a=getF(state.labA),b=getF(state.labB),r=lastResult||compatible(a,b);return `<section class="view ${state.view==='lab'?'active':''}"><div class="card"><h2>Build a combo</h2><div class="labHero ${r?.clash?'clash':''}"><div class="bottleStage">${renderBottle(a||{name:'Bottle A',dna:['Amber']},'bottleA')}${orb(a||{dna:['Amber']},b||{dna:['Blue']},r?.clash)}${renderBottle(b||{name:'Bottle B',dna:['Blue']},'bottleB')}${renderBottle({name:'Result',dna:[primary(a||b||{dna:['Amber']})]},'resultBottle')}</div></div><div class="row" style="margin-top:12px"><select data-action="selectLab" data-side="labA"><option value="">Bottle A</option>${opts(state.labA)}</select><select data-action="selectLab" data-side="labB"><option value="">Bottle B</option>${opts(state.labB)}</select></div><div class="row" style="margin-top:10px"><button class="btn" data-action="calc">Calculate Combo</button><button class="btn secondary" data-action="saveCombo">Save Combo</button></div></div>${r?resultHTML(a,b,r):'<div class="card empty">Pick two bottles to score the pairing.</div>'}<div class="card"><h3>My Combos</h3><div class="comboSaved">${state.combos.map(comboHTML).join('')||'<div class="empty">No saved combos yet.</div>'}</div></div></section>`}
function opts(sel){return state.collection.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(f=>`<option value="${f.id}" ${sel===f.id?'selected':''}>${esc(f.name)} — ${esc(f.house)}</option>`).join('')}
function resultHTML(a,b,r){return `<div class="card"><div class="between"><div><div class="scoreNum" id="scoreNum">${r.score}</div><p class="small" style="text-align:center;margin:0">Compatibility</p></div><div><span class="verdict ${r.clash?'bad':''}">${esc(r.clash?'Don’t layer':r.ratio)}</span><p class="small">${esc(r.verdict)} · ${esc(r.tag)}</p></div></div><p class="rationale show"><b>${r.clash?'Why this clashes':'Why this works'}:</b> ${esc(r.why)}</p>${r.alt?`<div class="lineItem"><b>Better move:</b> ${esc(r.alt)}</div>`:''}<div class="tagRow">${tagRow(a,b,r)}</div><details><summary>Score breakdown</summary><p>${esc(r.parts.join(', '))} = ${r.score}/100.</p>${r.bad?.map(x=>`<p><b>${esc(x.type)}:</b> ${esc(x.text)}</p>`).join('')||''}</details></div>`}
function tagRow(a,b,r){let all=[...new Set([...a.dna,...b.dna])];return all.map(t=>`<span class="dnaChip ${r.shared.includes(t)?'shared':''}" style="background:${DNA_COLOR[t]}">${esc(t)}</span>`).join('')}
function comboHTML(c){let a=getF(c.a),b=getF(c.b);if(!a||!b)return '';return `<div class="lineItem"><b>${esc(a.name)} + ${esc(b.name)}</b><p class="small">${c.score}/100 · ${esc(c.ratio)} · ${esc(c.tag)}</p><textarea data-action="comboNote" data-id="${c.id}" placeholder="Notes">${esc(c.notes||'')}</textarea><button class="btn secondary" data-action="deleteCombo" data-id="${c.id}">Remove</button></div>`}
function wearView(){const w=state.weather;const recs=recommendWear();return `<section class="view ${state.view==='wear'?'active':''}"><div class="card"><h2>Wear Today</h2><div class="weatherBox"><div><p class="sub">${w?esc(w.reason):'Use location or city fallback for Open-Meteo.'}</p><input class="input" data-input="city" placeholder="City fallback" value="${esc(state.city)}"></div><button class="btn" data-action="getWeather">Get Weather</button></div>${w?`<div class="weatherStat">${Math.round(w.temp)}°</div><p class="small">Humidity ${w.humidity}% · ${esc(w.condition)}</p>`:''}</div><div class="grid">${recs.bottles.map(f=>`<div class="bottleCard"><h3>${esc(f.name)}</h3><p class="sub">${esc(recs.reason)}</p><div class="row">${f.dna.slice(0,3).map(d=>`<span class="dnaChip" style="background:${DNA_COLOR[d]}">${esc(d)}</span>`).join('')}</div><button class="btn secondary" data-action="logWear" data-id="${f.id}">Log wear</button></div>`).join('')}</div><div class="card"><h3>Layering combo</h3>${recs.combo?`<p><b>${esc(getF(recs.combo.a).name)} + ${esc(getF(recs.combo.b).name)}</b></p><p class="sub">${esc(recs.combo.why)}</p><button class="btn secondary" data-action="logWear" data-combo="${esc(recs.combo.a+','+recs.combo.b)}">Log combo</button>`:'<div class="empty">No clean combo found for current weather.</div>'}</div></section>`}
function recommendWear(){let w=state.weather||{temp:70,humidity:45};let target=w.temp>=78||w.humidity>=70?['Fresh','Aquatic','Citrus','Green','Musk / Powdery']:w.temp<=55?['Amber','Tobacco','Vanilla','Spicy','Woody','Gourmand']:['Blue','Aromatic','Woody','Fresh','Green'];let reason=w.temp>=78||w.humidity>=70?'warm humid → fresh aquatic':w.temp<=55?'cool dry → cozy amber':'mild weather → blue aromatic';let bottles=state.collection.map(f=>({f,score:f.dna.filter(d=>target.includes(d)).length*10+(seasonForTemp(f,w.temp)?8:0)+f.rating})).sort((a,b)=>b.score-a.score).slice(0,3).map(x=>x.f);let combo=null,best=0;for(let i=0;i<state.collection.length;i++)for(let j=i+1;j<state.collection.length;j++){let r=compatible(state.collection[i],state.collection[j]);let fit=state.collection[i].dna.concat(state.collection[j].dna).filter(d=>target.includes(d)).length;if(r&&!r.clash&&r.score+fit*5>best){best=r.score+fit*5;combo={a:state.collection[i].id,b:state.collection[j].id,why:r.why}}}return {bottles,combo,reason}}
function seasonForTemp(f,t){return t>=70?f.season.includes('Spring')||f.season==='Year-round':t<=55?f.season.includes('Fall')||f.season==='Year-round':true}
async function getWeather(){try{let pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:6000}));let {latitude,longitude}=pos.coords;let url=`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code&temperature_unit=fahrenheit`;let data=await fetch(url).then(r=>r.json());state.weather={temp:data.current.temperature_2m,humidity:data.current.relative_humidity_2m,condition:code(data.current.weather_code),reason:'Live location weather'};save();render()}catch(e){state.weather={temp:70,humidity:50,condition:'Manual fallback',reason:`Fallback: ${state.city||'city not geocoded in v1'}`};save();render();toast('Using fallback weather')}}
function code(c){if(c===0)return'Clear';if(c<4)return'Clouds';if(c>=51&&c<70)return'Rain';if(c>=71&&c<80)return'Snow';if(c>=95)return'Thunder';return'Variable'}
function wheelView(){let counts=DNA.map(d=>({d,c:state.collection.filter(f=>f.dna.includes(d)).length}));let total=counts.reduce((s,x)=>s+x.c,0)||1;let start=0,cx=210,cy=210,r=190;let paths=counts.map(x=>{let ang=x.c/total*Math.PI*2;let p=arc(cx,cy,r,start,start+ang);start+=ang;return `<path class="wedge" d="${p}" fill="${DNA_COLOR[x.d]}" data-action="wheel" data-tag="${esc(x.d)}"><title>${esc(x.d)}: ${x.c}</title></path>`}).join('');let selected=state.wheelTag;let bottles=selected?state.collection.filter(f=>f.dna.includes(selected)):[];return `<section class="view ${state.view==='wheel'?'active':''}"><div class="card"><h2>DNA Wheel</h2><div class="wheelWrap"><svg class="wheel" viewBox="0 0 420 420">${paths}<circle cx="210" cy="210" r="82" fill="var(--panel)" stroke="var(--line)"/><text x="210" y="205" text-anchor="middle" fill="var(--text)" font-size="22" font-family="Cormorant Garamond">${state.collection.length}</text><text x="210" y="228" text-anchor="middle" fill="var(--muted)" font-size="12">bottles</text></svg></div><div class="legendGrid">${counts.map(x=>`<button class="chip ${x.c===0?'gap':''}" data-action="wheel" data-tag="${esc(x.d)}"><span style="width:10px;height:10px;border-radius:50%;background:${DNA_COLOR[x.d]};display:inline-block"></span>${esc(x.d)} · ${x.c}</button>`).join('')}</div></div>${selected?`<div class="card"><h3>${esc(selected)}</h3>${bottles.map(f=>`<div class="lineItem"><b>${esc(f.name)}</b><br><span class="small">${esc(f.house)} · ${esc(f.season)}</span></div>`).join('')||'<div class="empty">Gap: you have 0 bottles in this lane.</div>'}</div>`:''}</section>`}
function arc(cx,cy,r,a0,a1){if(a1-a0<.001)return'';let x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);let large=a1-a0>Math.PI?1:0;return`M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} Z`}
function settingsView(){return `<section class="view ${state.view==='settings'?'active':''}"><div class="card"><h2>Settings</h2><div class="settingsGrid"><div><b>Theme</b><div class="row">${['auto','light','dark'].map(t=>`<button class="btn ${state.theme===t?'':'secondary'}" data-action="setTheme" data-theme="${t}">${t}</button>`).join('')}</div></div><button class="btn secondary" data-action="export">Export JSON</button><button class="btn secondary" data-action="import">Import JSON</button><input id="importFile" type="file" accept="application/json" style="display:none" data-file="fileImport"><button class="btn danger" data-action="clear">Clear data</button><p class="small">Build ${VERSION}. Single-file HTML. localStorage only.</p></div></div></section>`}
function animateScore(final){let el=document.getElementById('scoreNum');if(!el)return;let n=0;clearInterval(scoreTimer);scoreTimer=setInterval(()=>{n+=Math.max(1,Math.ceil(final/18));if(n>=final){n=final;clearInterval(scoreTimer)}el.textContent=n},28)}
function wireInputs(){document.querySelectorAll('[data-input="search"]').forEach(i=>i.oninput=e=>A.search({value:e.target.value}));document.querySelectorAll('[data-input="city"]').forEach(i=>i.oninput=e=>A.city({value:e.target.value}));document.querySelectorAll('[data-file="fileImport"]').forEach(i=>i.onchange=e=>A.fileImport({files:e.target.files}))}
function renderCollectionOnly(){render()}
function download(name,text){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'application/json'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
document.addEventListener('click',e=>{let el=e.target.closest('[data-action]');if(!el)return;let fn=A[el.dataset.action];if(!fn)return;haptic();fn({...el.dataset,value:el.value,files:el.files})});
document.addEventListener('change',e=>{let el=e.target.closest('[data-action]');if(!el)return;let fn=A[el.dataset.action];if(fn){haptic();fn({...el.dataset,value:el.value,files:el.files})}});
matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change',()=>{if(state.theme==='auto'){applyTheme();render()}});
render();
</script>
