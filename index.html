          ${wish.length ? wish.map(w=>`<div class="card"><div class="row" style="justify-content:space-between;align-items:start"><div><strong>${esc(w.name)}</strong><div class="muted">${esc(w.house || "Wishlist")}</div><div class="small muted" style="margin-top:6px">${esc(w.priority)}${w.price ? " · " + esc(w.price) : ""}</div><div style="margin-top:6px">${esc(w.why || "")}</div></div><button type="button" data-delete-wishlist="${esc(w.id)}">Delete</button></div></div>`).join("") : `<div class="empty-state"><div><strong>No wishlist items yet. Track samples, full bottles, and backup-bottle ideas here.</strong></div><div style="margin-top:6px">Track samples, full bottles, and backup bottles here.</div></div>`}
        </div>
      </div>

      <div class="card">
        <div class="kicker">Compare</div><h3>Side-by-side comparison</h3>
        <div class="grid cols-2" style="margin-top:12px">
          <div class="field"><label>Fragrance A</label><select id="compareA">${getAllCollection().map(f=>`<option ${state.compareA===f.n?"selected":""}>${esc(f.n)}</option>`).join("")}</select></div>
          <div class="field"><label>Fragrance B</label><select id="compareB">${getAllCollection().map(f=>`<option ${state.compareB===f.n?"selected":""}>${esc(f.n)}</option>`).join("")}</select></div>
        </div>
        ${compare ? `<div class="grid cols-2" style="margin-top:14px">
          <div class="card"><div class="kicker">A unique DNA</div><div style="margin-top:8px">${compare.uniqueA.length ? compare.uniqueA.map(x=>`<span class="pill">${esc(x)}</span>`).join("") : '<span class="muted">No major unique lane</span>'}</div><div class="small muted" style="margin-top:8px">${esc(compare.a.h)}</div></div>
          <div class="card"><div class="kicker">B unique DNA</div><div style="margin-top:8px">${compare.uniqueB.length ? compare.uniqueB.map(x=>`<span class="pill">${esc(x)}</span>`).join("") : '<span class="muted">No major unique lane</span>'}</div><div class="small muted" style="margin-top:8px">${esc(compare.b.h)}</div></div>
        </div>
        <div class="card" style="margin-top:12px"><div class="kicker">Shared DNA and occasions</div><div style="margin-top:8px">${compare.shared.length ? compare.shared.map(x=>`<span class="pill">${esc(x)}</span>`).join("") : '<span class="muted">Very little shared DNA</span>'}</div><div class="small muted" style="margin-top:8px">Shared occasions: ${esc(compare.sharedOcc.join(" / ") || "None")}</div></div>` : ``}
      </div>
    </div>

    <div class="grid cols-3">
      <div class="card"><div class="kicker">Rotation tracker</div><h3>Neglected bottles</h3>${neglected.map(row=>`<div style="margin-top:10px"><strong>${esc(row.item.n)}</strong><div class="muted">${row.last ? `Last worn: ${esc(row.last)}` : "Never logged"}</div></div>`).join("")}</div>
      <div class="card"><div class="kicker">Signature scent tools</div><h3>Best signature candidates</h3>${signature.map(row=>`<div style="margin-top:10px"><strong>${esc(row.item.n)}</strong><div class="muted">${esc(row.item.h)}</div></div>`).join("")}</div>
      <div class="card"><div class="kicker">Seasonal wardrobe mode</div><h3>What to pull forward this week</h3>${weekly.map(f=>`<div style="margin-top:10px"><strong>${esc(f.n)}</strong><div class="muted">${esc(f.h)}</div></div>`).join("")}</div>
    </div>

    <div class="grid cols-2">
      <div class="card">
        <div class="kicker">Mood-based wearing</div>
        <h3>Mood-aligned picks</h3>
        <div class="field" style="margin-top:12px; max-width:320px">
          <label>Choose mood</label>
          <select id="hobbyMoodSelect">${["Any","Clean","Cozy","Seductive","Classy","Loud","Relaxing"].map(x=>`<option ${state.wearMood===x?"selected":""}>${x}</option>`).join("")}</select>
        </div>
        <div class="muted" style="margin-top:10px">Current mood: ${esc(state.wearMood || "Any")} · ranked across your full collection</div>
        <div class="grid cols-2" style="margin-top:12px">
          ${moodPicks.map(f=>`<div class="card"><strong>${esc(f.n)}</strong><div class="muted">${esc(f.h)}</div><div style="margin-top:8px">${displayDNAList(f).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div></div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="kicker">Collection story</div>
        <h3>Your collection at a glance</h3>
        <div style="margin-top:8px"><strong>Hidden gem:</strong> ${esc(story.hiddenGem)}</div>
        <div style="margin-top:8px"><strong>Favorite:</strong> ${esc(story.favorite)}</div>
        <div style="margin-top:8px"><strong>Top house:</strong> ${esc(story.topHouse)}</div>
        <div style="margin-top:8px"><strong>Most worn:</strong> ${esc(story.mostWorn)}</div>
      </div>
    </div>
  </div>`;
}

function render(){
  document.documentElement.setAttribute("data-theme", state.theme==="dark" ? "dark" : "light");
  document.getElementById("app").innerHTML = `
    <div class="top">
      <div class="brand"><div class="brand-row"><div class="brandmark">V</div><div><small>The Vault</small><h1>AJ’s Fragrance Collection</h1><p>Private fragrance collection studio</p></div></div></div>
      <div class="tabs">${VIEWS.map(v=>`<button type="button" class="tab ${getPrimaryViewLabel(state.view)===v?'active':''}" data-view="${v}"><span class="tab-ico">${({Home:"⌂",Collection:"◫",Wear:"☼",Layer:"◌",More:"⋯"}[v]||"•")}</span><span>${v}</span></button>`).join("")}</div>
      ${getPrimaryViewLabel(state.view)==="More" ? `<div class="subnav">${getMoreSections().map(v=>`<button type="button" class="${state.view===v?'active':''}" data-more-view="${v}">${v}</button>`).join("")}</div>` : ``}
    </div>
    ${state.view==="Home"?homeView():""}
    ${state.view==="Collection"?collectionView():""}
    ${state.view==="Wear Today"?wearTodayView():""}
    ${state.view==="Layering"?layeringView():""}
    ${state.view==="Display"?displayView():""}
    ${state.view==="Buy or Skip"?buySkipView():""}
    ${state.view==="Hobby Lab"?hobbyView():""}
    ${sheetView()}
    ${toastView()}
  `;
  bindEvents();
}

function bindValue(id, fn){
  const el=document.getElementById(id);
  if (!el) return;
  el.oninput = el.onchange = e => fn(e.target.value);
}
function bindEvents(){
  const dismissOnboarding=document.getElementById("dismissOnboarding"); if(dismissOnboarding) dismissOnboarding.onclick=()=>{ state.showOnboarding=false; saveOnboardingPref(); render(); };
  document.querySelectorAll("[data-accordion]").forEach(btn=>btn.onclick=()=>{ const key=btn.dataset.accordion; state.expandedSections={...(state.expandedSections||{}), [key]: !isExpanded(key)}; render(); });
  document.querySelectorAll("[data-view]").forEach(btn=>btn.onclick=(e)=>{
  e.preventDefault();
  const v = btn.dataset.view;
  if (v === "Wear") state.view = "Wear Today";
  else if (v === "Layer") state.view = "Layering";
  else if (v === "More") state.view = getCurrentMoreSection();
  else state.view = v;
  render();
});
  document.querySelectorAll("[data-more-view]").forEach(btn=>btn.onclick=(e)=>{ e.preventDefault(); state.view=btn.dataset.moreView; render(); });
  document.querySelectorAll("[data-open-fragrance]").forEach(btn=>btn.onclick=()=>{ const f=getAllCollection().find(x=>x.n===btn.dataset.openFragrance); if(f){ state.selectedFragrance=f; render(); } });
  const clearSelected=document.getElementById("clearSelectedFragrance"); if(clearSelected) clearSelected.onclick=()=>{ state.selectedFragrance=null; render(); };

  const editSelected=document.getElementById("editSelectedFragrance");
  if(editSelected) editSelected.onclick=()=>{
    if (state.selectedFragrance && state.selectedFragrance.id) startEditUserFragrance(state.selectedFragrance.id);
    openSheet("addFragrance");
    render();
  };
  const deleteSelected=document.getElementById("deleteSelectedFragrance");
  if(deleteSelected) deleteSelected.onclick=()=>{
    if (state.selectedFragrance && state.selectedFragrance.id) {
      confirmDeleteUserFragrance(state.selectedFragrance.id, state.selectedFragrance.n);
      render();
    }
  };
  const openAddFragranceSheet=document.getElementById("openAddFragranceSheet");
  if(openAddFragranceSheet) openAddFragranceSheet.onclick=()=>{ openSheet("addFragrance"); render(); };
  const openBackupSheet=document.getElementById("openBackupSheet");
  if(openBackupSheet) openBackupSheet.onclick=()=>{ openSheet("backupTools"); render(); };
  const closeSheetBtn=document.getElementById("closeSheetBtn");
  if(closeSheetBtn) closeSheetBtn.onclick=()=>{ closeSheet(); render(); };
  const sheetBackdrop=document.getElementById("sheetBackdrop");
  if(sheetBackdrop) sheetBackdrop.onclick=()=>{ closeSheet(); render(); };
  const resetCollectionFiltersEmpty=document.getElementById("resetCollectionFiltersEmpty");
  if(resetCollectionFiltersEmpty) resetCollectionFiltersEmpty.onclick=()=>{ resetCollectionFilters(); render(); };

  const saveNewFragrance=document.getElementById("saveNewFragrance");
  if(saveNewFragrance) saveNewFragrance.onclick=()=>{
    const res = upsertUserFragranceFromForm();
    if (res.ok){
      closeSheet();
      pushToast(state.editingFragranceId ? "Fragrance updated" : "Fragrance added", "success");
      render();
    } else {
      pushToast(res.message || "Could not save fragrance", "error");
    }
  };
  const clearNewFragranceForm=document.getElementById("clearNewFragranceForm");
  if(clearNewFragranceForm) clearNewFragranceForm.onclick=()=>{ clearFragranceForm(); render(); };

  const exportAllData=document.getElementById("exportAllData");
  if(exportAllData) exportAllData.onclick=()=>{ exportAllAppData(); pushToast("Backup exported", "success"); };

  const importAllData=document.getElementById("importAllData");
  if(importAllData) importAllData.onchange=(e)=>{
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      const res = importAllAppDataFromText(String(reader.result||""));
      if (res.ok){
        closeSheet();
        pushToast("Backup imported", "success");
        render();
      } else {
        pushToast(res.message || "Import failed", "error");
      }
    };
    reader.readAsText(file);
  };

  const confirmDeleteBtn=document.getElementById("confirmDeleteBtn");
  if(confirmDeleteBtn) confirmDeleteBtn.onclick=()=>{
    if (state.pendingDelete && state.pendingDelete.type === "userFragrance"){
      deleteUserFragrance(state.pendingDelete.id);
      state.selectedFragrance = null;
      closeSheet();
      pushToast("Fragrance deleted", "warn");
      render();
    }
  };

  const toggleFavoriteSelected=document.getElementById("toggleFavoriteSelected"); if(toggleFavoriteSelected && state.selectedFragrance){ toggleFavoriteSelected.onclick=()=>{ toggleFavorite(state.selectedFragrance.n); render(); }; }
  const resetCollection=document.getElementById("resetCollectionFilters"); if(resetCollection) resetCollection.onclick=()=>{ resetCollectionFilters(); render(); };
  const addFragranceBtn=document.getElementById("addFragranceBtn");
  if(addFragranceBtn) addFragranceBtn.onclick=()=>{
    const res = addNewFragranceFromForm();
    if(!res.ok){
      alert(res.message);
      return;
    }
    alert(res.message);
    render();
  };
  const resetNewFragranceBtn=document.getElementById("resetNewFragranceBtn");
  if(resetNewFragranceBtn) resetNewFragranceBtn.onclick=()=>{ resetNewFragranceForm(); render(); };
  bindValue("collectionTab", v=>{ state.collectionTab=v; render(); });
  bindValue("collectionHouseFilter", v=>{ state.collectionHouseFilter=v; render(); });
  bindValue("collectionOccasionFilter", v=>{ state.collectionOccasionFilter=v; render(); });
  bindValue("collectionDNAFilter", v=>{ state.collectionDNAFilter=v; render(); });
  bindValue("collectionPlaneFilter", v=>{ state.collectionPlaneFilter=v; render(); });
  bindValue("collectionInspirationFilter", v=>{ state.collectionInspirationFilter=v; render(); });
  bindValue("collectionSort", v=>{ state.collectionSort=v; render(); });
  const themeToggle=document.getElementById("themeToggle");
  if (themeToggle) themeToggle.onclick=()=>{ state.theme=state.theme==="dark"?"light":"dark"; saveTheme(); render(); };

  bindValue("weatherMode", v=>{ state.weatherPref.mode=v; saveWeatherPref(); loadWeather(); });
  bindValue("manualCity", v=>{ state.weatherPref.city=v; saveWeatherPref(); });
  const mc=document.getElementById("manualCity"); if (mc) mc.onchange=()=>loadWeather();

  bindValue("collectionSearch", v=>{ state.collectionSearch=v; render(); });

  bindValue("newFragranceHouse", v=>{ state.newFragrance.house=v; });
  bindValue("newFragranceName", v=>{ state.newFragrance.name=v; });
  bindValue("newFragranceInspiration", v=>{ state.newFragrance.inspiration=v; });
  bindValue("newFragranceDNA", v=>{ state.newFragrance.dna=v; });
  bindValue("newFragranceOccasions", v=>{ state.newFragrance.occasions=v; });
  bindValue("newFragranceSeason", v=>{ state.newFragrance.season=v; });
  bindValue("newFragranceRating", v=>{ state.newFragrance.rating=v; });

  bindValue("newFragHouse", v=>{ state.newFragrance.house=v; });
  bindValue("newFragName", v=>{ state.newFragrance.name=v; });
  bindValue("newFragInspiration", v=>{ state.newFragrance.inspiration=v; });
  bindValue("newFragDNA", v=>{ state.newFragrance.dna=v; });
  bindValue("newFragOccasions", v=>{ state.newFragrance.occasions=v; });
  bindValue("newFragSeason", v=>{ state.newFragrance.season=v; });
  bindValue("newFragRating", v=>{ state.newFragrance.rating=v; });
  bindValue("homeOccasion", v=>{ state.homeOccasion=v; render(); });
  bindValue("homeEnvironment", v=>{ state.homeEnvironment=v; render(); });

  bindValue("wearOccasion", v=>{ state.wearOccasion=v; render(); });
  bindValue("wearEnvironment", v=>{ state.wearEnvironment=v; render(); });
  bindValue("wearStrategy", v=>{ state.wearStrategy=v; render(); });
  bindValue("wearMood", v=>{ state.wearMood=v; render(); });
  bindValue("hobbyMoodSelect", v=>{ state.wearMood=v; render(); });
  bindValue("wearSelected", v=>{ state.wearSelected=v; render(); });
  bindValue("wearDate", v=>{ state.wearDate=v; });
  bindValue("wearAmount", v=>{ state.wearAmount=v; });
  bindValue("wearNotes", v=>{ state.wearNotes=v; });
  document.querySelectorAll("[data-apply-pick]").forEach(btn=>btn.onclick=()=>{
    const f=getAllCollection().find(x=>x.n===btn.dataset.applyPick);
    if (!f) return;
    state.wearSelected=f.n;
    state.wearAmount=getSprayAdvice(f,state.wearOccasion);
    if (!state.wearNotes) state.wearNotes=`Generated pick for ${state.wearOccasion}.`;
    render();
  });

  document.querySelectorAll("[data-apply-layer]").forEach(btn=>btn.onclick=()=>{
    const parts = btn.dataset.applyLayer.split("||");
    if (parts.length !== 2) return;
    state.layerBase = parts[0];
    state.layerTop = parts[1];
    render();
  });

  const toggleAvoidRecent=document.getElementById("toggleAvoidRecent"); if(toggleAvoidRecent) toggleAvoidRecent.onclick=()=>{ state.avoidRecentWear=!state.avoidRecentWear; render(); };
  const openSelectedFromWear=document.getElementById("openSelectedFromWear");
  if (openSelectedFromWear) openSelectedFromWear.onclick=()=>{
    const f=getAllCollection().find(x=>x.n===state.wearSelected);
    if (!f) return;
    state.view = "Collection";
    state.selectedFragrance = f;
    render();
  };

  document.querySelectorAll("[data-open-history]").forEach(btn=>btn.onclick=()=>{
    const idx = Number(btn.dataset.openHistory);
    const entry = state.wearLog[idx];
    if (!entry) return;
    const f = getAllCollection().find(x=>x.n===entry.fragrance);
    if (f){
      state.wearSelected = f.n;
      state.wearOccasion = entry.occasion || state.wearOccasion;
      state.wearAmount = entry.amount || getSprayAdvice(f, state.wearOccasion);
      state.wearNotes = entry.notes || "";
    }
    render();
  });

  const analyzeBuy=document.getElementById("analyzeBuySkip");
  if (analyzeBuy) analyzeBuy.onclick=()=>{
    state.buy = {...(state.buyDraft||state.buy)};
    render();
  };

  const resetBuy=document.getElementById("resetBuyForm");
  if (resetBuy) resetBuy.onclick=()=>{
    resetBuyForm();
    render();
  };


  bindValue("compareA", v=>{ state.compareA=v; render(); });
  bindValue("compareB", v=>{ state.compareB=v; render(); });
  bindValue("wishlistName", v=>{ state.wishlistDraft.name=v; });
  bindValue("wishlistHouse", v=>{ state.wishlistDraft.house=v; });
  bindValue("wishlistWhy", v=>{ state.wishlistDraft.why=v; });
  bindValue("wishlistPriority", v=>{ state.wishlistDraft.priority=v; });
  bindValue("wishlistPrice", v=>{ state.wishlistDraft.price=v; });
  document.querySelectorAll("[data-delete-wishlist]").forEach(btn=>btn.onclick=()=>{ deleteWishlistItem(btn.dataset.deleteWishlist); pushToast("Wishlist item deleted","warn"); render(); });
  const addWishlistItemBtn=document.getElementById("addWishlistItem");
  if(addWishlistItemBtn) addWishlistItemBtn.onclick=()=>{ const res=addWishlistItem(); if(res.ok){ pushToast("Wishlist item added","success"); render(); } else pushToast(res.message || "Could not add wishlist item","error"); };
  const saveJournalEntryBtn=document.getElementById("saveJournalEntry");
  if(saveJournalEntryBtn) saveJournalEntryBtn.onclick=()=>{
    const name = state.selectedFragrance && state.selectedFragrance.n;
    if(!name) return;
    setJournalEntry(name,{
      format:(document.getElementById("journalFormat")||{}).value || "Full Bottle",
      photo:(document.getElementById("journalPhoto")||{}).value || "",
      moodTags:(document.getElementById("journalMoodTags")||{}).value || "",
      scent:(document.getElementById("journalScent")||{}).value || "0",
      performance:(document.getElementById("journalPerformance")||{}).value || "0",
      compliments:(document.getElementById("journalCompliments")||{}).value || "0",
      uniqueness:(document.getElementById("journalUniqueness")||{}).value || "0",
      comfort:(document.getElementById("journalComfort")||{}).value || "0",
      complimentContext:(document.getElementById("journalComplimentContext")||{}).value || "",
      notes:(document.getElementById("journalNotes")||{}).value || ""
    });
    pushToast("Journal saved","success");
    render();
  };

  const save=document.getElementById("saveWear");
  if (save) save.onclick=()=>{
    const f=getAllCollection().find(x=>x.n===state.wearSelected);
    state.wearLog.unshift({date:state.wearDate || new Date().toISOString().slice(0,10), fragrance:f.n, house:f.h, amount:state.wearAmount||getSprayAdvice(f,state.wearOccasion), occasion:state.wearOccasion, notes:state.wearNotes.trim()});
    saveWearLog();
    state.wearNotes="";
    render();
  };

  bindValue("layerBase", v=>{ state.layerBase=v; render(); });
  bindValue("layerTop", v=>{ state.layerTop=v; render(); });
  bindValue("layerOccasion", v=>{ state.layerOccasion=v; render(); });
  bindValue("layerProjectionMode", v=>{ state.layerProjectionMode=v; render(); });
  bindValue("layerComboNote", v=>{ state.layerComboNote=v; });
  bindValue("layerComboRating", v=>{ state.layerComboRating=v; });

  const layerBaseMinus=document.getElementById("layerBaseMinus");
  if(layerBaseMinus) layerBaseMinus.onclick=(e)=>{
    e.preventDefault();
    state.layerBaseSprays=Math.max(1, Number(state.layerBaseSprays||2)-1);
    render();
  };
  const layerBasePlus=document.getElementById("layerBasePlus");
  if(layerBasePlus) layerBasePlus.onclick=(e)=>{
    e.preventDefault();
    state.layerBaseSprays=Math.min(6, Number(state.layerBaseSprays||2)+1);
    render();
  };
  const layerTopMinus=document.getElementById("layerTopMinus");
  if(layerTopMinus) layerTopMinus.onclick=(e)=>{
    e.preventDefault();
    state.layerTopSprays=Math.max(1, Number(state.layerTopSprays||1)-1);
    render();
  };
  const layerTopPlus=document.getElementById("layerTopPlus");
  if(layerTopPlus) layerTopPlus.onclick=(e)=>{
    e.preventDefault();
    state.layerTopSprays=Math.min(6, Number(state.layerTopSprays||1)+1);
    render();
  };

  const generateLayerComboBtn=document.getElementById("generateLayerCombo");
  if(generateLayerComboBtn) generateLayerComboBtn.onclick=()=>{
    const combo = generateLayerCombo(getAllCollection(), state.layerOccasion, state.weather);
    if (!combo) return;
    state.layerBase = combo.base.n;
    state.layerTop = combo.top.n;
    state.layerBaseSprays = 2;
    state.layerTopSprays = 1;
    render();
  };
  const saveLayerComboBtn=document.getElementById("saveLayerCombo");
  if(saveLayerComboBtn) saveLayerComboBtn.onclick=()=>{
    const item = {
      base: state.layerBase,
      top: state.layerTop,
      baseSprays: state.layerBaseSprays,
      topSprays: state.layerTopSprays,
      projection: state.layerProjectionMode,
      occasion: state.layerOccasion
    };
    state.savedLayerCombos = state.savedLayerCombos || [];
    state.savedLayerCombos.unshift(item);
    state.savedLayerCombos = state.savedLayerCombos.slice(0,12);
    saveLayerCombos();
    render();
  };
  document.querySelectorAll("[data-load-saved-layer]").forEach(btn=>btn.onclick=()=>{
    const idx = Number(btn.dataset.loadSavedLayer);
    const item = (state.savedLayerCombos||[])[idx];
    if (!item) return;
    state.layerBase = item.base;
    state.layerTop = item.top;
    state.layerBaseSprays = item.baseSprays || 2;
    state.layerTopSprays = item.topSprays || 1;
    state.layerProjectionMode = item.projection || "Balanced";
    state.layerOccasion = item.occasion || "Casual";
    render();
  });

  bindValue("seasonMode", v=>{ state.seasonMode=v; render(); });
  const saveDisplaySnapshotBtn=document.getElementById("saveDisplaySnapshot"); if(saveDisplaySnapshotBtn) saveDisplaySnapshotBtn.onclick=()=>{ const active = state.seasonMode==="Auto" ? getSeasonMode() : state.seasonMode; const sections = getDisplaySections(getAllCollection(), active); saveCurrentDisplaySnapshot(active, sections); render(); };
  document.querySelectorAll("[data-load-display]").forEach(btn=>btn.onclick=()=>{ const snap=loadDisplaySnapshot(btn.dataset.loadDisplay); if(!snap) return; state.seasonMode=snap.season; render(); });

  bindValue("buyName", v=>{ state.buyDraft.name=v; });
  bindValue("buyHouse", v=>{ state.buyDraft.house=v; });
  bindValue("buyInspiration", v=>{ state.buyDraft.inspiration=v; });
  bindValue("buyDNA", v=>{ state.buyDraft.dna=v; });
  bindValue("buyOccasions", v=>{ state.buyDraft.occasions=v; });
  bindValue("buySeason", v=>{ state.buyDraft.season=v; });
}

async function loadWeather(){
  state.weather={loading:true,error:"",temp:null,code:null,wind:null,humidity:null,city:state.weatherPref.mode==="manual"?(state.weatherPref.city||"Manual city"):"Your area"};
  render();
  state.weather=await fetchWeather(state.weatherPref);
  render();
}
loadWeather();
render();
</script>
</body>
