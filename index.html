  const fresh = dna.filter(x=>["fresh","citrus","aquatic","blue","green","musk / powdery"].includes(x)).length;
  const structured = dna.filter(x=>["woody","fougere","vetiver / earthy","musk / powdery","blue"].includes(x)).length;
  const dense = dna.filter(x=>["amber","sweet","spicy","gourmand","oud","tobacco"].includes(x)).length;
  const elegant = dna.filter(x=>["woody","fougere","vetiver / earthy","musk / powdery"].includes(x)).length + (occ.includes("Office") ? 1.5 : 0);
  const loud = dense + (occ.includes("Evening") ? 1 : 0) + (occ.includes("Date") ? 0.5 : 0);

  };
}
function scoreSeasonWeatherFit(fragrance, weather){

      score += dna.some(x=>["woody","fresh","fougere","vetiver / earthy","musk / powdery"].includes(x)) ? 1.5 : 0;
    } else if (temp <= 75){
      score += dna.some(x=>["fresh","woody","green","blue","fougere","musk / powdery"].includes(x)) ? 1.4 : 0;
      score += season.includes("spring") || season.includes("fall") || season.includes("year") ? 0.9 : 0;
    } else if (temp <= 85){
      score += season.includes("summer") || season.includes("spring") || season.includes("year") ? 1.1 : 0;
      score += dna.some(x=>["fresh","citrus","aquatic","blue","green","musk / powdery"].includes(x)) ? 2.0 : 0;
      score -= dna.some(x=>["amber","gourmand","oud","tobacco"].includes(x)) ? 1.5 : 0;
    } else {
      score += season.includes("summer") || season.includes("year") ? 1.3 : 0;
      score += dna.some(x=>["fresh","citrus","aquatic","blue","green"].includes(x)) ? 2.5 : 0;
      score -= dna.some(x=>["amber","gourmand","oud","tobacco","spicy"].includes(x)) ? 2.3 : 0;
    }
  }

  if (humidity !== null){
    if (humidity >= 75){
      score += dna.some(x=>["fresh","citrus","aquatic","green","musk / powdery"].includes(x)) ? 1.0 : 0;
      score -= dna.some(x=>["amber","gourmand","sweet","oud","tobacco"].includes(x)) ? 1.4 : 0;
    } else if (humidity <= 35){
      score += dna.some(x=>["amber","woody","musk / powdery","vetiver / earthy"].includes(x)) ? 0.7 : 0;
    }
  }

  return clampScore(score);
}
function scoreEnvironmentFit(dna, environment){
  let score = 5.7;
  if (environment === "Indoors"){
    if (dna.some(x=>["fresh","woody","musk / powdery","fougere","blue","green"].includes(x))) score += 1.8;
    if (dna.some(x=>["gourmand","oud","tobacco"].includes(x))) score -= 2.0;
    if (dna.includes("amber")) score -= 0.9;
  } else if (environment === "Outdoors"){
    if (dna.some(x=>["fresh","green","citrus","aquatic","blue","woody","vetiver / earthy"].includes(x))) score += 1.6;
    if (dna.includes("oud")) score -= 0.7;
  }
  return clampScore(score);
}
function scoreOccasionAlignment(occasions, occasion){
  const list = Array.isArray(occasions) ? occasions : [];
  if (!occasion) return 6.4;
  if (occasion === "Plane"){
    if (list.includes("Travel")) return 10;
    if (list.includes("Office") || list.includes("Casual") || list.includes("Gym")) return 8.8;
    return list.length ? 5.4 : 6.2;
  }
  if (list.includes(occasion)) return 10;
  if ((occasion === "Office" || occasion === "Buttoned Up") && list.includes("Casual")) return 6.9;
  if (occasion === "Casual" && list.includes("Office")) return 7.4;
  if (occasion === "Date" && list.includes("Evening")) return 8.2;
  if (occasion === "Evening" && list.includes("Date")) return 8.2;
  if (list.includes("Casual")) return 5.2;
  return list.length ? 3.6 : 5.8;
}
function getFragranceOverlapStats(fragrance, pool=getAllCollection()){
  const key = getFragranceKey(fragrance);
  const dna = displayDNAList(fragrance).map(norm);
  const overlaps = (pool || []).filter(other => getFragranceKey(other) !== key).map(other => {
    const otherDna = displayDNAList(other).map(norm);
    const shared = dna.filter(tag => otherDna.includes(tag)).length;
    return shared / Math.max(1, Math.max(dna.length, otherDna.length));
  });
  if (!overlaps.length) return {top:0, average:0};
  const top = Math.max(...overlaps);
  const average = overlaps.reduce((a,b)=>a+b,0) / overlaps.length;
  return {top, average};
}
function scoreRotationBehavior(fragrance, occasion){
  const log = getWearLogForFragrance(fragrance);
  if (!log.length) return 8.8;
  const sorted = log.slice().sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  const lastAny = sorted[0];
  const lastSameOcc = sorted.find(entry => (entry.occasion || "Casual") === occasion);
  const wearCount = sorted.length;
  let score = 6.7;
  if (lastAny){
    const daysAgoAny = (Date.now() - new Date(lastAny.date || 0)) / 86400000;
    if (daysAgoAny < 2) score -= 2.6;
    else if (daysAgoAny < 7) score -= 1.1;
    else if (daysAgoAny > 30) score += 1.1;
  }
  if (lastSameOcc){
    const daysAgoOcc = (Date.now() - new Date(lastSameOcc.date || 0)) / 86400000;
    if (daysAgoOcc < 3) score -= 3.2;
    else if (daysAgoOcc < 7) score -= 1.8;
    else if (daysAgoOcc < 14) score -= 0.9;
    else if (daysAgoOcc > 45) score += 0.8;
  } else {
    score += 1.0;
  }
  if (wearCount > 14) score -= 1.4;
  else if (wearCount > 8) score -= 0.6;
  return clampScore(score);
}
function getScoringSignals(fragrance, context={}){
  const role = getCollectionRoleVector(fragrance);
  const weather = context.weather || null;
  const environment = context.environment || "Mixed";
  const occasion = context.occasion || "Casual";
  const mood = context.mood || "Any";
  const strategy = context.strategy || "Safest pick";
  const pool = context.pool || getAllCollection();

  const journal = getScoringJournalMetrics(fragrance);
  const overlap = getFragranceOverlapStats(fragrance, pool);
  const rating = clampScore(Number(fragrance.r || 0), 0, 5);
  const favorite = getScoringFavoriteFlag(fragrance);

  const weatherFit = scoreSeasonWeatherFit(fragrance, weather);
  const environmentFit = scoreEnvironmentFit(role.dna, environment);
  const occasionFit = scoreOccasionAlignment(role.occ, occasion);
  const versatilityFit = clampScore(4.9 + role.versatile * 1.1 + (role.structured ? 0.45 : 0) - (role.dense > 3 ? 0.55 : 0));
  const styleFit = clampScore(4.8 + role.elegant * 1.0 + (role.fresh ? 0.45 : 0) - (role.dense > 3 ? 0.75 : 0));
  const uniquenessFit = clampScore(8.9 - (overlap.average * 5.1) - (overlap.top * 1.9));
  const performanceConfidence = clampScore(
    4.5 +
    (journal.performance ? journal.performance * 0.48 : 0) +
    (journal.scent ? journal.scent * 0.12 : 0) +
    Math.min(role.dense, 3) * 0.45 +
    (role.structured ? 0.25 : 0)
  );
  const comfortFit = clampScore(
    5.3 +
    (journal.comfort ? journal.comfort * 0.5 : 0) +
    (role.fresh ? 0.35 : 0) +
    (role.dense > 3 ? -0.85 : 0)
  );
  const identityFit = clampScore(
    4.2 +
    rating * 0.65 +
    (favorite ? 0.9 : 0) +
    (journal.average5 ? journal.average5 * 0.34 : 0)
  );
  const confidence = clampScore(
    3.9 +
    journal.confidence * 0.46 +
    (rating ? rating * 0.16 : 0) +
    (favorite ? 0.25 : 0)
  );
  const rotationFit = scoreRotationBehavior(fragrance, occasion);

  let planeFit = 6.2;
  const planeLevel = getPlaneSafetyLevel(fragrance);
  if (occasion === "Plane"){
    planeFit = planeLevel === "Plane Safe" ? 10 : planeLevel === "Safe Enough" ? 7.2 : 1.2;
  }

  const moodFitMap = {
    any: 6.8,
    clean: clampScore(4.0 + role.fresh * 1.35 - role.dense * 0.3),
    cozy: clampScore(3.9 + role.dense * 1.25 - (role.fresh ? 0.45 : 0)),
    seductive: clampScore(4.3 + role.loud * 0.95 + (role.elegant ? 0.45 : 0)),
    classy: clampScore(4.8 + role.elegant * 1.2 + (role.fresh ? 0.3 : 0)),
    loud: clampScore(3.9 + role.loud * 1.4),
    relaxing: clampScore(4.7 + role.fresh * 0.8 + (journal.comfort ? journal.comfort * 0.45 : 0) - role.dense * 0.25)
  };
  const moodFit = moodFitMap[norm(mood)] ?? 6.8;

  let strategyFit = 6.7;
  if (strategy === "Most unique") strategyFit = clampScore((uniquenessFit * 0.8) + (identityFit * 0.1) + 0.7);
  else if (strategy === "Best performer") strategyFit = clampScore((performanceConfidence * 0.7) + (styleFit * 0.12) + 1.0);
  else strategyFit = clampScore((occasionFit * 0.34) + (weatherFit * 0.24) + (comfortFit * 0.16) + (styleFit * 0.12) + 1.0);

  const risk = clampScore(
    1.0 +
    (occasion === "Plane" && planeLevel === "Not Plane Safe" ? 4.8 : 0) +
    (environment === "Indoors" && role.dense > 3 ? 1.6 : 0) +
    (weather && typeof weather.temp === "number" && weather.temp >= 82 && role.dense > 2 ? 1.5 : 0) +
    (weather && typeof weather.humidity === "number" && weather.humidity >= 75 && role.dense > 2 ? 1.1 : 0)
  );

  return {
    role, journal, overlap, rating, favorite, confidence, risk,
    weatherFit, environmentFit, occasionFit, versatilityFit, styleFit,
    uniquenessFit, performanceConfidence, comfortFit, identityFit,
    rotationFit, planeFit, moodFit, strategyFit
  };
}


function getNormalizedScoreModel(fragrance, context={}){
  const s = getScoringSignals(fragrance, context);
  const fit = composeScore({
    weather:{score:s.weatherFit, weight:0.20},
    occasion:{score:s.occasionFit, weight:0.22},
    environment:{score:s.environmentFit, weight:0.08},
    mood:{score:s.moodFit, weight:0.08},
    versatility:{score:s.versatilityFit, weight:0.11},
    identity:{score:s.identityFit, weight:0.08},
    comfort:{score:s.comfortFit, weight:0.09},
    performance:{score:s.performanceConfidence, weight:0.08},
    uniqueness:{score:s.uniquenessFit, weight:0.06}
  }, 10);
  const confidence = roundScore(s.confidence, 1);
  const risk = roundScore(s.risk, 1);
  const total = clampScore((fit * 0.76) + (confidence * 0.16) - (risk * 0.11) + 1.0);
  return {
    total: roundScore(total, 1),
    fit: roundScore(fit, 1),
    confidence,
    risk,
    signals: s,
    parts: [
      {label:"Fit", score:fit},
      {label:"Confidence", score:confidence},
      {label:"Risk", score:10 - risk}
    ]
  };
}

function getNeglectedFragrances(limit=8){
  const now = Date.now();
  const wearCounts = {};
  const lastWorn   = {};
  (state.wearLog||[]).forEach(e => {
    const key = getWearEntryKey(e);
    wearCounts[key] = (wearCounts[key]||0)+1;
    if (!lastWorn[key]) lastWorn[key] = e.date;
  });

  return getAllCollection().map(f => {
    const key = getFragranceKey(f);
    const count = wearCounts[key] || 0;
    const last  = lastWorn[key] || "";
    const daysAgo = last ? (now - new Date(last)) / 86400000 : Infinity;

    // Neglect score: high if worn before but not recently
    // Never-worn frags score high but are flagged differently
    let neglect = 0;
    if (count === 0){
      neglect = 50; // Never worn — highest priority to try
    } else {
      // Expected wear cadence: roughly total wears / days owned
      // Proxy: if worn N times in log, expect roughly once every (logDays/N) days
      const totalDays = (now - new Date(state.wearLog[state.wearLog.length-1]?.date||new Date())) / 86400000 || 1;
      const avgInterval = Math.max(1, totalDays / count);
      // Neglect = how many "expected intervals" have passed since last wear
      neglect = daysAgo / avgInterval;
    }

    // Boost if it's a rated/favorited bottle (worth getting back to)
    if (isFavorite(f)) neglect *= 1.3;
    if ((f.r||0) >= 4) neglect *= 1.1;

    return { item: f, last, count, neglect };
  })
  .sort((a,b) => b.neglect - a.neglect)
  .slice(0, limit);
}
function getSignatureCandidates(limit=6){

}


function getMoodCandidates(mood, limit=6){

  return picks;
}

function displayDNAList(f, maxTags=4){
  const raw = dnatags(f);
  const scores = {
    "Fresh":0, "Citrus":0, "Aquatic":0, "Blue":0, "Green":0,
    "Woody":0, "Vetiver / Earthy":0, "Fougere":0, "Musk / Powdery":0,
    "Amber":0, "Sweet":0, "Spicy":0, "Gourmand":0, "Oud":0, "Tobacco":0
  };

  const bump = (key, n=1) => { if (scores[key] !== undefined) scores[key] += n; };
  const hasAny = (text, words) => words.some(word => text.includes(word));

  raw.forEach(tag => {
    const t = norm(tag);

    if (hasAny(t, ["fresh","clean","airy","soapy","soap","tea","crisp","bright","freshness","neroli lite","easy wear"])) bump("Fresh", 2);
    if (hasAny(t, ["citrus","orange","bergamot","lemon","lime","grapefruit","neroli","orange blossom","mandarin","yuzu","pineapple","citrusy"])) bump("Citrus", 2);
    if (hasAny(t, ["aquatic","marine","watery","salty","ocean","beach","sea","water"])) bump("Aquatic", 2);
    if (hasAny(t, ["blue","bleu","electric","cobalt","indigo"])) bump("Blue", 2);
    if (hasAny(t, ["green","grassy","herbal","mossy","minty","mint","cut grass","leafy","fig","basil"])) bump("Green", 2);
    if (hasAny(t, ["woody","woods","wood","patchouli","sandalwood","cedar","guaiac","bark","birch"])) bump("Woody", 2);
    // "woods" as a standalone primary note deserves extra weight — it's the core DNA, not a modifier
    if (hasAny(t, ["woods","wood"]) && !hasAny(t, ["driftwood","firewood"])) bump("Woody", 1);
    if (hasAny(t, ["palo santo"])) { bump("Woody", 2); bump("Amber", 1); } // palo santo = resinous sacred wood, amber-adjacent
    if (hasAny(t, ["vetiver","earthy","mineral","earthiness","earth","soil","rocky","terr"])) bump("Vetiver / Earthy", 3);
    if (hasAny(t, ["fougere","lavender","barbershop","shaving cream","fern","coumarin","geranium"])) bump("Fougere", 2);
    // 'aromatic' alone is too generic — only fires Fougere when paired with fougere-specific context
    if (hasAny(t, ["aromatic"]) && hasAny(t, ["lavender","fougere","barbershop","fern","geranium","coumarin","herbal"])) bump("Fougere", 2);
    if (hasAny(t, ["musk","musky","powdery","powder","iris","skin","soft musk","white musk"])) bump("Musk / Powdery", 2);
    if (hasAny(t, ["ambrox","ambroxan"])) { bump("Musk / Powdery", 2); bump("Amber", 1); } // ambroxan = synthetic amber-musk
    if (hasAny(t, ["amber","ambered","amberwood","benzoin","resinous","labdanum","ambergris"])) bump("Amber", 2);
    // "warm" and "warmth" alone are vibe descriptors — only fire Amber when paired with explicit amber chemistry
    if (hasAny(t, ["warm"]) && hasAny(t, ["amber","benzoin","resin","labdanum","amberwood"])) bump("Amber", 1);
    // Sweet: actual sweetness signals. "warm/warmth/golden/cozy" are vibe descriptors → small Sweet bump, not Amber
    if (hasAny(t, ["sweet","sweetness","vanilla","sugar","sugary","honey","praline","caramel","cream","creamy","cotton candy","spun sugar"])) bump("Sweet", 2);
    if (hasAny(t, ["golden","warm","warmth","cozy richness","rich sweetness"])) bump("Sweet", 1);
    if (hasAny(t, ["spice","spicy","pepper","ginger","cinnamon","cardamom","saffron","nutmeg","clove","hot"])) bump("Spicy", 2);
    // Gourmand: food/dessert/boozy — NOT tobacco or oud
    if (hasAny(t, ["gourmand","coffee","chocolate","cocoa","caramel","dessert","rum","boozy","tonka","hazelnut","chestnut","cookie","cake","praline"])) bump("Gourmand", 2);
    // Oud: explicit oud chemistry only
    // 'incense' alone is too broad (catches blue/woody notes) — requires oud context
    // 'smoky/smoke' are Tobacco territory; fireside/campfire are oud-adjacent not tobacco
    if (hasAny(t, ["oud","aoud","bakhoor","tarry","dark resin"])) bump("Oud", 3);
    if (hasAny(t, ["incense"]) && hasAny(t, ["oud","dark","resin","bakhoor"])) bump("Oud", 3);
    if (hasAny(t, ["incense"]) && !hasAny(t, ["oud","dark","resin","bakhoor"])) bump("Amber", 1); // incense in blue/woody = warm amber note only
    if (hasAny(t, ["fireside","campfire","burnt wood","charred"])) bump("Oud", 2);
    if (hasAny(t, ["mysterious","dark rum"])) bump("Oud", 1);
    if (hasAny(t, ["resinous"]) && hasAny(t, ["oud","aoud","dark","smoky oud"])) bump("Oud", 2);
    // Tobacco: fireside/campfire/cozy smoke is NOT tobacco — only explicit tobacco keywords
    if (hasAny(t, ["tobacco","tabac","pipe tobacco","cigarette","cuban"])) bump("Tobacco", 3);
    if (hasAny(t, ["smoky","smoke"]) && !hasAny(t, ["fireside","campfire","burnt wood","charred","cozy","fruity"])) bump("Tobacco", 3);
    if (hasAny(t, ["smoky","smoke"]) && hasAny(t, ["fruity"])) bump("Woody", 1); // birch smoke in Aventus-style = woody note

    // Honey is amber-adjacent when in warm/tobacco/aromatic context
    if (hasAny(t, ["honey"]) && hasAny(t, ["tobacco","amber","warm","lavender","aromatic","rich"])) bump("Amber", 2);

    // Fruity signals → Citrus + Sweet split
    if (hasAny(t, ["apple","pear","peach","mango","cherry","plum","berry","melon","coconut","apricot","blackcurrant"])) {
      bump("Citrus", 1); bump("Sweet", 1);
    }
    if (hasAny(t, ["floral","rose","jasmine","floral amber","fruity floral"])) bump("Sweet", 1);

    // Relationship nudges
    if (hasAny(t, ["aquatic","marine"])) bump("Fresh", 1);
    if (hasAny(t, ["citrus","bergamot"])) bump("Fresh", 1);
    if (hasAny(t, ["neroli","iris","ambrox"])) bump("Musk / Powdery", 1);
    if (hasAny(t, ["lavender","fougere"])) bump("Fougere", 1);
    if (hasAny(t, ["amber","benzoin"])) bump("Sweet", 1);
    if (hasAny(t, ["oud","incense"])) bump("Amber", 1);
  });

  // Structural boosts
  if (scores["Aquatic"] > 0) scores["Fresh"] += 1;
  if (scores["Citrus"] > 0)  scores["Fresh"] += 1;
  if (scores["Fougere"] > 0) scores["Fresh"] += 1;
  if (scores["Vetiver / Earthy"] > 0) scores["Woody"] += 1;
  if (scores["Oud"] > 0)     scores["Amber"] += 2; // oud almost always has amber warmth underneath
  if (scores["Tobacco"] > 0) scores["Amber"] += 2; // tobacco blends almost always have amber/warmth base
  // Lavender/Fougere as accent note in tobacco/amber/spicy frags — suppress dominance
  if (scores["Tobacco"] > 0 && scores["Fougere"] > 0) scores["Fougere"] = Math.max(0, scores["Fougere"] - 2);
  if (scores["Amber"] >= 4 && scores["Spicy"] >= 4 && scores["Fougere"] > 0) scores["Fougere"] = Math.max(0, scores["Fougere"] - 2);

  // Rank by score
  let ranked = Object.entries(scores)
    .filter(([,score]) => score > 0)
    .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]))
    .map(([name]) => name);

  // De-dup overlapping signals
  if (ranked.includes("Gourmand") && ranked.indexOf("Sweet") > ranked.indexOf("Gourmand")) {
    ranked = ranked.filter(x => x !== "Sweet").concat(["Sweet"]);
  }
  if (ranked.includes("Oud") && ranked.includes("Amber")) {
    // Keep Oud first, push Amber lower
    ranked = ["Oud", ...ranked.filter(x => x !== "Oud")];
  }
  if (ranked.includes("Vetiver / Earthy") && ranked.includes("Woody")) {
    ranked = ["Vetiver / Earthy", ...ranked.filter(x => x !== "Vetiver / Earthy")];
  }
  if (ranked.includes("Aquatic") && ranked.includes("Blue") && ranked.includes("Fresh")) {
    ranked = ranked.slice(0, maxTags);
  }

  return ranked.slice(0, maxTags).length ? ranked.slice(0, maxTags) : ["Fresh"];
}

function getWeatherAdjustedWeights(baseWeights, weather){
  const w = {...baseWeights};
  const temp = weather && typeof weather.temp==="number" ? weather.temp : null;
  if (temp !== null){
    if (temp <= 55){
      w["amber"] = (w["amber"]||0) + 2;
      w["woody"] = (w["woody"]||0) + 1;
      w["spicy"] = (w["spicy"]||0) + 1;
      w["fresh"] = (w["fresh"]||0) - 1;
      w["aquatic"] = (w["aquatic"]||0) - 2;
    }
    if (temp >= 82){
      w["fresh"] = (w["fresh"]||0) + 2;
      w["citrus"] = (w["citrus"]||0) + 1;
      w["aquatic"] = (w["aquatic"]||0) + 1;
      w["amber"] = (w["amber"]||0) - 2;
      w["gourmand"] = (w["gourmand"]||0) - 3;
    }
  }
  return w;
}

function scoreFragrance(f, weights, weather=null, environment="Mixed"){
  const model = getNormalizedScoreModel(f, {occasion:"Casual", weather, environment, pool:getAllCollection()});
  const dna = displayDNAList(f).map(norm);
  const weightedTagFit = getWeightedTagFit(dna, weights || {});
  const roleFit = clampScore((model.fit * 0.55) + (weightedTagFit * 0.35) + (model.signals.styleFit * 0.10));
  return roundScore(roleFit * 10, 1);
}

function pickTop(items, weights, count=3, weather=null, environment="Mixed"){
  const ranked = [...items].map(item=>({item, score:scoreFragrance(item, weights, weather, environment)})).sort((a,b)=>b.score-a.score);
  const out=[], seen=new Set();
  for (const row of ranked){
    const key = getFragranceKey(row.item);
    if (seen.has(key)) continue;

function getPlaneSafetyLevel(f){
  const dna = displayDNAList(f, 5).map(norm);
  const occasions = simplifyOccasionList(f);
  const rich    = dna.some(x=>["amber","sweet","gourmand","spicy"].includes(x));
  const veryRisky = dna.some(x=>["gourmand","oud","tobacco"].includes(x));
  const freshCore = dna.some(x=>["fresh","citrus","musk / powdery","woody","vetiver / earthy","blue","aquatic","green","fougere"].includes(x));
  const officeLike = occasions.some(x=>["Office","Casual","Gym"].includes(x));

  if (veryRisky) return "Not Plane Safe";
  if (freshCore && !rich) return "Plane Safe";
  if ((freshCore && rich) || officeLike) return "Safe Enough";
  return "Not Plane Safe";
}

function getLayerSuggestions(collection, occasion, weather, count=8){

  for (let i = 0; i < pool.length; i++) {
    for (let j = 0; j < pool.length; j++) {
      if (i === j) continue;
      const base = pool[i];
      const top = pool[j];
      const res = getLayeringAnalysis(base, top);
      if (res.score >= 6) combos.push({base, top, res});
    }
  }
  combos.sort((a,b)=>b.res.score-a.res.score);
  const out = [];
  const seen = new Set();
  for (const combo of combos) {
    const key = combo.base.n + "||" + combo.top.n;
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(combo);
    if (out.length >= count) break;
  }
  return out;
}

  };
  if (season==="Fall") return {

    avoid:["aquatic"],

  };
  return {

    signature:["amber","gourmand","tobacco","oud","spicy"],
    daily:["woody","amber","musk / powdery","fougere","spicy"]
  };
}
function getDisplayDNAOverlap(a, b){
  const ad = displayDNAList(a).map(norm);
  const bd = displayDNAList(b).map(norm);
  let score = ad.filter(x=>bd.includes(x)).length;
  if ((a.i||"").trim() && (b.i||"").trim() && norm(a.i)===norm(b.i)) score += 2;
  const ao = simplifyOccasionList(a);
  const bo = simplifyOccasionList(b);
  score += ao.filter(x=>bo.includes(x)).length * 0.5;
  return score;
}
function getDisplayClusterKey(f, season){
  const dna = displayDNAList(f).map(norm);
  const profile = getDisplaySeasonProfile(season);
  const lead = dna.find(x=>profile.signature.includes(x)) || dna.find(x=>profile.core.includes(x)) || dna[0] || "other";
  const style = norm(f.i||"");
  if (style.includes("imagination")) return "imagination";
  if (style.includes("aventus") || style.includes("hacivat") || style.includes("poseidon")) return "aventus";
  if (style.includes("bleu de chanel") || style.includes("blue")) return "blue";
  if (style.includes("terre")) return "terre";
  if (style.includes("1 million")) return "1million";
  return lead;
}
function getDisplayRoleFit(f, role, season){
  const pool = getAllCollection();
  const model = getNormalizedScoreModel(f, {occasion: role==="statement" ? "Evening" : "Casual", environment:"Mixed", pool, mood: role==="statement" ? "Seductive" : "Classy"});
  const roleVec = getCollectionRoleVector(f);
  const profile = getDisplaySeasonProfile(season);
  const seasonText = norm(f.s||"");
  let seasonFit = seasonText.includes(norm(season)) ? 8.8 : 5.4;
  if (seasonText.includes("year")) seasonFit += 0.8;
  roleVec.dna.forEach(x=>{
    if (profile.core.includes(x)) seasonFit += 0.8;
    if (profile.support.includes(x)) seasonFit += 0.4;
    if (profile.avoid.includes(x)) seasonFit -= 0.9;
  });

  let roleFit = 5.5;
  if (role==="anchor"){
    roleFit = clampScore((model.signals.versatilityFit * 0.45) + (model.signals.styleFit * 0.25) + (model.signals.identityFit * 0.15) + 1.0);
  } else if (role==="daily"){
    roleFit = clampScore((model.signals.comfortFit * 0.30) + (model.signals.occasionFit * 0.20) + (model.signals.weatherFit * 0.20) + (model.signals.versatilityFit * 0.20) + 1.0);
  } else {
    roleFit = clampScore((model.signals.identityFit * 0.25) + (model.signals.performanceConfidence * 0.22) + ((10 - model.risk) * 0.12) + (roleVec.loud * 0.9) + 1.0);
  }

  const varietyFit = clampScore(model.signals.uniquenessFit + (role==="statement" ? 0.7 : 0));
  const confidenceFit = clampScore((model.confidence * 0.55) + (model.signals.identityFit * 0.25) + 1.2);
  return composeScore({
    season:{score:seasonFit, weight:0.28},
    role:{score:roleFit, weight:0.28},
    variety:{score:varietyFit, weight:0.16},
    confidence:{score:confidenceFit, weight:0.14},
    safety:{score:10 - model.risk, weight:0.14}
  }, 20);
}
function pickDisplayRoleCandidates(collection, season, role, limit, existing){
  const chosen = [];
  const houseCounts = {};
  const clusterCounts = {};
  const allPicked = existing ? existing.slice() : [];
  const ranked = collection.map(f=>({
    item:f,
    score:getDisplayRoleFit(f, role, season)
  })).sort((a,b)=>b.score-a.score);

  for (const row of ranked){
    const f = row.item;
    if (allPicked.includes(f) || chosen.includes(f)) continue;

    const house = f.h || "Other";
    const cluster = getDisplayClusterKey(f, season);
    const overlapMax = [...allPicked, ...chosen].reduce((m, other)=>Math.max(m, getDisplayDNAOverlap(f, other)), 0);

    let adjusted = row.score;
    adjusted -= (houseCounts[house] || 0) * 1.25;
    adjusted -= (clusterCounts[cluster] || 0) * 1.5;
    adjusted -= Math.max(0, overlapMax - 2) * 1.25;

    const strongEnough = adjusted >= (role==="anchor" ? 9.5 : role==="daily" ? 8.5 : 8);
    const houseCap = role==="anchor" ? 2 : 3;
    const clusterCap = role==="statement" ? 2 : 3;

    if (!strongEnough) continue;
    if ((houseCounts[house] || 0) >= houseCap) continue;
    if ((clusterCounts[cluster] || 0) >= clusterCap) continue;

    chosen.push(f);
    houseCounts[house] = (houseCounts[house] || 0) + 1;
    clusterCounts[cluster] = (clusterCounts[cluster] || 0) + 1;

    if (chosen.length >= limit) break;
  }

  // fill remaining spots more loosely, but still avoid obvious duplicates
  if (chosen.length < limit){
    for (const row of ranked){
      const f = row.item;
      if (allPicked.includes(f) || chosen.includes(f)) continue;
      const overlapMax = [...allPicked, ...chosen].reduce((m, other)=>Math.max(m, getDisplayDNAOverlap(f, other)), 0);
      if (overlapMax > 4.5) continue;
      chosen.push(f);
      if (chosen.length >= limit) break;
    }
  }

  return chosen;
}

function getCandidateOverlap(candidate, existing){
  const cdna = (candidate.dna||[]).map(x => norm(x));
  const edna = displayDNAList(existing).map(x => norm(x));
  const sharedDNA = cdna.filter(x => edna.includes(x));
  const existingOccasions = simplifyOccasionList(existing);
  const sharedOccasion = (candidate.occasions||[]).filter(x => existingOccasions.includes(x));
  const dnaRatio = sharedDNA.length / Math.max(1, Math.max(cdna.length, edna.length));
  const occasionRatio = sharedOccasion.length / Math.max(1, Math.max((candidate.occasions||[]).length, existingOccasions.length));
  const sameInspiration = (candidate.inspiration||"").trim() && (existing.i||"").trim() && candidate.inspiration.trim().toLowerCase() === existing.i.trim().toLowerCase();
  const seasonMatch = (candidate.season||"").trim() && (existing.s||"").toLowerCase().includes((candidate.season||"").trim().toLowerCase());
  const inspirationA = norm(candidate.inspiration || "").replace(/inspired by|style|clone of/g, " ");
  const inspirationB = norm(existing.i || "").replace(/inspired by|style|clone of/g, " ");
  const tokenA = inspirationA.split(/[^a-z0-9]+/).filter(Boolean);
  const tokenB = inspirationB.split(/[^a-z0-9]+/).filter(Boolean);
  const sharedStyleTokens = tokenA.filter(t => tokenB.includes(t) && t.length > 2);
  const inspirationFit = sameInspiration ? 10 : sharedStyleTokens.length >= 2 ? 8.4 : sharedStyleTokens.length === 1 ? 6.2 : 3.4;
  const dnaFit = clampScore(dnaRatio * 10);
  const occasionFit = clampScore(occasionRatio * 10);
  const concentrationFit = clampScore(8.6 - (Math.abs((candidate.dna||[]).length - edna.length) * 0.9));
  const overlapScore = composeScore({
    dna:{score:dnaFit, weight:0.38},
    occasion:{score:occasionFit, weight:0.14},
    inspiration:{score:inspirationFit, weight:0.28},
    season:{score:seasonMatch ? 7.2 : 4.8, weight:0.08},
    concentration:{score:concentrationFit, weight:0.12}
  }, 10);
  const twistValue = roundScore(clampScore((10 - dnaFit) * 0.45 + (10 - occasionFit) * 0.20 + (seasonMatch ? 0.8 : 1.6) + (sameInspiration ? 0.2 : 1.4)), 1);
  const gapValue = roundScore(clampScore((10 - overlapScore) * 0.75 + twistValue * 0.45), 1);
  return {
    score: overlapScore,
    sharedDNA,
    sharedOccasion,
    dnaRatio: roundScore(dnaRatio, 2),
    occasionRatio: roundScore(occasionRatio, 2),
    sameInspiration,
    seasonMatch,
    twistValue,
    gapValue
  };
}


function getBuySkipAnalysis(){
  const source = (state.buy && (state.buy.name || state.buy.house || state.buy.inspiration || state.buy.dna || state.buy.occasions)) ? state.buy : (state.buyDraft || state.buy);
  const candidate = {
    name: (source.name||"").trim(),
    house: (source.house||"").trim(),
    inspiration: (source.inspiration||"").trim(),
    dna: (source.dna||"").split(",").map(x=>x.trim()).filter(Boolean),
    occasions: (source.occasions||"").split(",").map(x=>x.trim()).filter(Boolean),
    season: (source.season||"").trim()
  };
  if (!candidate.name && !candidate.inspiration && !candidate.dna.length) {
    return {verdict:"Add candidate details", reason:"Enter at least a name plus DNA or inspiration to compare it.", overlaps:[]};
  }

  const overlaps = getAllCollection().map(item => ({
    item,
    overlap: getCandidateOverlap(candidate, item)
  })).sort((a,b)=>b.overlap.score-a.overlap.score).slice(0,5);

  const best = overlaps[0];
  let verdict = "Worth considering";
  let reason = "It looks different enough to fill a useful gap.";

  if (best) {
    const top = best.overlap.score;
    const gap = best.overlap.gapValue;
    const twist = best.overlap.twistValue;
    if (top >= 8.4) {
      verdict = gap <= 3.0 ? "Skip" : "Good but redundant";
      reason = `It sits very close to ${best.item.n}. This looks more like a minor variation than a true new lane.`;
    } else if (top >= 6.8) {
      verdict = gap >= 6.0 || twist >= 6.2 ? "Interesting but unnecessary" : "Good but redundant";
      reason = `It overlaps with ${best.item.n}, but there may be enough twist to matter if you specifically want that angle.`;
    } else if (top >= 5.0) {
      verdict = gap >= 6.2 ? "Worth considering" : "Interesting but unnecessary";
      reason = `There is some overlap with ${best.item.n}, but it still creates usable contrast in the collection.`;
    } else {
      verdict = "Strong add";
      reason = "It does not appear heavily covered by what you already own, so it looks like a real gap filler.";
    }
  }

  return {candidate, verdict, reason, overlaps};
}

function getWearTodayPicks(collection, occasion, weather, environment, count=5){

  const ranked = [...pool].map(f => {
    const model = getNormalizedScoreModel(f, {
      occasion,
      weather,
      environment,
      mood: state.wearMood || "Any",
      strategy: state.wearStrategy || "Safest pick",
      pool
    });
    const s = model.signals;
    let score = composeScore({
      fit:{score:model.fit, weight:0.38},
      confidence:{score:model.confidence, weight:0.10},
      weather:{score:s.weatherFit, weight:0.14},
      occasion:{score:s.occasionFit, weight:0.18},
      strategy:{score:s.strategyFit, weight:0.10},
      rotation:{score:state.avoidRecentWear ? s.rotationFit : clampScore(s.rotationFit + 1.2), weight:0.06},
      risk:{score:10 - model.risk, weight:0.04}
    }, 100);

    if (occasion === "Plane" && s.planeFit < 4) score -= 12;
    score += getRecommendationMemoryScore("wear", f) * 0.6;
    if (state.wearStrategy === "Most unique") score += s.uniquenessFit * 0.9;
    if (state.wearStrategy === "Best performer") score += s.performanceConfidence * 0.75;
    if (!state.avoidRecentWear) score += 1.0;

    return { item: f, score: roundScore(score, 1), model };
  })
  .filter(x => occasion !== "Plane" || getPlaneSafetyLevel(x.item) !== "Not Plane Safe")
  .sort((a,b) => b.score - a.score || a.item.n.localeCompare(b.item.n));

  const out = [];
  const seenClusters = {};
  for (const row of ranked) {
    const f = row.item;
    const cluster = getDisplayClusterKey(f, weather && typeof weather.temp === "number" && weather.temp >= 70 ? "Summer" : "Fall");
    seenClusters[cluster] = seenClusters[cluster] || 0;
    if (seenClusters[cluster] >= 2 && out.length < Math.max(2, count - 1)) continue;
    out.push(f);
    seenClusters[cluster] += 1;
    if (out.length >= count) break;
  }
  const picks = out.length ? out : ranked.slice(0, count).map(x=>x.item);
  rememberRecommendations("wear", picks);
  return picks;
}

function getWearTodayReason(f, occasion, weather, environment){
  if (occasion === "Plane") return getPlaneReason(f);
  const dna = displayDNAList(f, 5).map(norm);
  const ctx = getWeatherContext(weather, environment);
  const bits = [];

  // Concrete weather-driven reasons with actual numbers
  if (ctx.temp !== null){
    if (ctx.temp <= 45){
      if (dna.some(x=>["amber","woody","spicy","vetiver / earthy","oud","tobacco"].includes(x)))
        bits.push(`${Math.round(ctx.temp)}°F outside — its warmer, richer DNA lands better in the cold`);
      else if (dna.some(x=>["fresh","aquatic","citrus"].includes(x)))
        bits.push(`${Math.round(ctx.temp)}°F — fresher DNA can feel thin in this cold, but it still fits the occasion`);
    } else if (ctx.temp <= 60){
      if (dna.some(x=>["woody","fougere","vetiver / earthy","musk / powdery"].includes(x)))
        bits.push(`${Math.round(ctx.temp)}°F cool weather suits its structured, grounded DNA`);
    } else if (ctx.temp <= 75){
      bits.push(`${Math.round(ctx.temp)}°F — comfortable range where most DNA works`);
    } else if (ctx.temp <= 85){
      if (dna.some(x=>["fresh","citrus","aquatic","blue","green"].includes(x)))
        bits.push(`${Math.round(ctx.temp)}°F — its fresh DNA performs well in the warmth`);
      if (dna.some(x=>["amber","gourmand","oud"].includes(x)))
        bits.push(`${Math.round(ctx.temp)}°F is warm — its heavy DNA may project stronger than expected`);
    } else {
      if (dna.some(x=>["fresh","citrus","aquatic","blue","green"].includes(x)))
        bits.push(`${Math.round(ctx.temp)}°F heat — one of its best use cases, DNA stays clean and refreshing`);
      if (dna.some(x=>["amber","gourmand","spicy","oud"].includes(x)))
        bits.push(`${Math.round(ctx.temp)}°F is very hot — heavy DNA like this will amplify significantly, use fewer sprays`);
    }
  }

  if (ctx.humidity !== null && ctx.humidity >= 75){
    if (dna.some(x=>["fresh","citrus","green","musk / powdery"].includes(x)))
      bits.push(`${Math.round(ctx.humidity)}% humidity — lighter DNA handles the moisture better`);
    else if (dna.some(x=>["amber","sweet","gourmand"].includes(x)))
      bits.push(`${Math.round(ctx.humidity)}% humidity will amplify its sweetness — go lighter on sprays`);
  }

  if (ctx.rain){
    if (dna.some(x=>["woody","vetiver / earthy","fougere","musk / powdery"].includes(x)))
      bits.push("Rain suits its grounded, structured character");
    if (dna.some(x=>["aquatic","marine"].includes(x)))
      bits.push("Aquatic DNA can feel redundant in rain — still fine, just not its peak context");
  }

  if (ctx.wind !== null && ctx.wind >= 15 && environment !== "Indoors"){
    if (dna.some(x=>["woody","amber","fougere"].includes(x)))
      bits.push(`${Math.round(ctx.wind)}mph wind — denser DNA holds better in the breeze`);
    if (dna.some(x=>["musk / powdery","aquatic"].includes(x)))
      bits.push(`${Math.round(ctx.wind)}mph wind will disperse its lighter DNA faster`);
  }

  if (environment === "Indoors" && dna.some(x=>["musk / powdery","woody","fougere","fresh"].includes(x)))
    bits.push("stays controlled in enclosed indoor spaces");
  if (environment === "Outdoors" && dna.some(x=>["fresh","green","blue","woody"].includes(x)))
    bits.push("has the projection and DNA to work well outdoors");

  // Occasion reason as context
  const standard = getWhyWear(f, occasion);
  if (standard) bits.unshift(standard.replace(/\.$/, ""));

  // Remove the generic temp-range reason if we have a better one
  const filtered = bits.filter(b => !b.includes("comfortable range where most DNA works") || bits.length === 1);
  return filtered.length ? filtered.slice(0,3).join(". ") + "." : "Fits the selected occasion and conditions.";
}

  const generic = [

    "2 sprays. Light and controlled.",
    "3 sprays. Balanced standard.",

    "5 sprays. Stronger projection.",
    "6 sprays. Bold projection.",

  const base = (map[occasion] || generic).slice();

function simplifyOccasionList(f){
  const raw = (f.o||[]).map(norm);
  const out = [];
  const add = x => { if (x && !out.includes(x)) out.push(x); };

  raw.forEach(o => {
    if (/plane|flight|airplane/.test(o)) add("Plane");
    if (/gym|sport|workout|active|poolside/.test(o)) add("Gym");
    if (/office|work|business|smart casual|daytime|professional|everyday office/.test(o)) add("Office");
    if (/date|romantic|upscale casual|close-range|intimate/.test(o)) add("Date");
    if (/evening|night|formal|special occasion|special|cocktail|club|lounge|bar|statement|bold|social night/.test(o)) add("Evening");
    if (/casual|everyday|weekend|social|outdoors|outdoor|beach|vacation|fresh|playful|day off|errands/.test(o)) add("Casual");
  });

  if (!out.length) add("Casual");

  const order = ["Plane","Office","Date","Casual","Gym","Evening"];
  return order.filter(x => out.includes(x)).slice(0,3);
}

function getMostRedundantWith(f){
  const targetDNA = new Set(displayDNAList(f));
  let best = null;
  let bestScore = -1;
  COLLECTION.forEach(other => {
    if (other.n === f.n) return;
    let score = 0;
    displayDNAList(other).forEach(tag => { if (targetDNA.has(tag)) score += 2; });
    if ((other.i||"") === (f.i||"")) score += 4;
    simplifyOccasionList(other).forEach(tag => { if (simplifyOccasionList(f).includes(tag)) score += 1; });
    if (score > bestScore){ bestScore = score; best = other; }
  });
  return best ? best.n : "Nothing obvious";
}

function getMostRedundantScore(f){
  const targetDNA = new Set(displayDNAList(f));
  let bestScore = 0;
  getAllCollection().forEach(other => {
    if (other.n === f.n) return;
    let score = 0;
    displayDNAList(other).forEach(tag => { if (targetDNA.has(tag)) score += 2; });
    if ((other.i||"") === (f.i||"")) score += 4;
    simplifyOccasionList(other).forEach(tag => { if (simplifyOccasionList(f).includes(tag)) score += 1; });
    if (score > bestScore) bestScore = score;
  });
  return Math.min(bestScore, 16); // cap at 16
}

function getFragranceFitSummary(f){
  const dna = displayDNAList(f, 5).map(norm);
  const occ = simplifyOccasionList(f);
  const season = norm(f.s || "");
  const journal = getJournalEntry(f) || {};
  const wearCount = getWearCountForFragrance(f);
  const bits = [];

  // Bottle-specific opening based on name/inspiration context
  const isAttar = /attar|oil/i.test(f.n);
  const isExtrait = /extrait|elixir|intense|parfum/i.test(f.n);
  const isCologne = /cologne|eau de/i.test(f.n);
  if (isAttar)   bits.push(`As an attar, ${f.n} is meant to be worn close — 1–2 wrist dabs or a chest pulse point is enough.`);
  if (isExtrait) bits.push(`The extrait/intense concentration means projection is strong — fewer sprays than you'd think are needed.`);
  if (isCologne) bits.push(`Cologne concentration means lighter sillage — good for close quarters and repeated daily use.`);

  // DNA character
  const isFresh = dna.some(x=>["fresh","citrus","aquatic","blue","green"].includes(x));
  const isWarm  = dna.some(x=>["amber","sweet","gourmand","spicy","oud","tobacco"].includes(x));
  const isWoody = dna.some(x=>["woody","vetiver / earthy","fougere"].includes(x));
  const isMusky = dna.includes("musk / powdery");

  if (isFresh && !isWarm)  bits.push(`Its DNA reads clean and lifted — lower projection risk, easier to wear around others.`);
  if (isWarm && !isFresh)  bits.push(`Its richer DNA gives it more presence and sillage — best when you want to be noticed.`);
  if (isFresh && isWarm)   bits.push(`The balance of fresher top notes and warmer base gives it versatility — opens clean, dries warmer.`);
  if (isWoody)             bits.push(`The woody or structured backbone keeps it from feeling sweet or one-dimensional.`);
  if (isMusky && isWarm)   bits.push(`The powdery-musk character smooths the drydown and makes the sillage more refined.`);

  // Occasion fit
  if (occ.includes("Office") && occ.includes("Date")) bits.push(`Occasion range is wide — works dressed up or dressed down depending on spray count.`);
  else if (occ.includes("Office"))  bits.push(`Its occasion profile is suited to professional or daytime settings.`);
  else if (occ.includes("Evening")) bits.push(`Its character is strongest in evenings or cooler air when the sillage can breathe.`);

  // Season
  if (season.includes("spring") || season.includes("summer")) bits.push(`Best deployed from roughly March through September.`);
  else if (season.includes("fall") || season.includes("winter")) bits.push(`A cooler-weather bottle — heat amplifies projection unpleasantly.`);
  else if (season.includes("year")) bits.push(`Season-agnostic — works year-round with spray count adjustments.`);

  // Journal data if available
  if (Number(journal.performance||0) >= 4) bits.push(`Your journal shows strong performance — sillage and longevity hold up well on your skin.`);
  if (Number(journal.compliments||0) >= 4) bits.push(`High compliment rating in your log — this one gets noticed.`);
  if (Number(journal.comfort||0) <= 2 && journal.comfort) bits.push(`Comfort rated low in your journal — may be worth layering lightly rather than wearing solo.`);
  if (wearCount >= 10) bits.push(`You've reached for this ${wearCount} times — it's earned its shelf space.`);
  else if (wearCount === 0) bits.push(`Never logged — worth giving it a proper wear trial to know where it fits.`);

  if (!bits.length) return `${f.n} is a solid bottle with a balanced profile that fits comfortably in the collection.`;
  return bits.slice(0, 4).join(" ");
}

function getLayeringAnalysis(base, top){
  if (!base || !top) return {score:0, verdict:"Pick two fragrances to analyze.", why:"", ratio:"", sprays:"", baseRole:"", topRole:"", placement:""};

  const bd = displayDNAList(base).map(norm);
  const td = displayDNAList(top).map(norm);
  const shared = bd.filter(x=>td.includes(x));

  // ── Known-good combos from AJ's actual layering library ──────────────────
  const KNOWN_COMBOS = [
    {a:"Ottoman Breeze", b:"His Perspective", bonus:3, note:"Established anchor pairing — Hacivat freshness lifted by Paradigme structure."},
    {a:"Poseidon's Swimming Cologne", b:"His Perspective", bonus:2.5, note:"Bright citrus base with clean aromatic top — proven office pairing."},
    {a:"Jean Lowe Immortal", b:"Ameer Al Oudh Intense", bonus:2.5, note:"Airy ambrox base grounded by smoky fireside warmth."},
    {a:"Midnight Rendezvous", b:"Aphrodisiac", bonus:2, note:"Cardamom lavender anchored by powdery vanilla haze."},
    {a:"Midnight Rendezvous", b:"Wazir", bonus:2, note:"La Nuit DNA plus fruity floral amber for evening depth."},
    {a:"MIRIS No54602", b:"His Perspective", bonus:2, note:"Hacivat oil base with Paradigme spray — clean upscale pairing."},
    {a:"Bleu de Dua Attar", b:"His Perspective", bonus:2, note:"Deep blue attar base with modern aromatic top."},
    {a:"Poseidon's Fireplace", b:"Fortune", bonus:1.5, note:"Smoky aventus base sweetened by honey tobacco."},
    {a:"Ottoman Breeze", b:"Midnight Rendezvous", bonus:1.5, note:"Fresh chypre base warmed by cardamom evening DNA."},
  ];

  let knownBonus = 0;
  let knownNote = "";
  for (const combo of KNOWN_COMBOS){
    const aMatch = norm(base.n).includes(norm(combo.a)) || norm(combo.a).includes(norm(base.n));
    const bMatch = norm(top.n).includes(norm(combo.b))  || norm(combo.b).includes(norm(top.n));
    const aMatch2 = norm(base.n).includes(norm(combo.b)) || norm(combo.b).includes(norm(base.n));
    const bMatch2 = norm(top.n).includes(norm(combo.a))  || norm(combo.a).includes(norm(top.n));
    if ((aMatch && bMatch) || (aMatch2 && bMatch2)){
      knownBonus = combo.bonus;
      knownNote  = combo.note;
      break;
    }
  }

  // ── Complementary DNA pairs — expanded ───────────────────────────────────
  const COMP_PAIRS = [
    ["fresh","woody"],["fresh","amber"],["fresh","musk / powdery"],
    ["citrus","musk / powdery"],["citrus","woody"],["citrus","amber"],
    ["blue","amber"],["blue","woody"],["blue","spicy"],
    ["aquatic","woody"],["aquatic","musk / powdery"],
    ["vetiver / earthy","citrus"],["vetiver / earthy","fresh"],
    ["fougere","amber"],["fougere","sweet"],
    ["green","woody"],["green","musk / powdery"],
  ];
  const compScore = COMP_PAIRS.reduce((acc, [a,b])=>{
    const match = (bd.includes(a) && td.includes(b)) || (bd.includes(b) && td.includes(a));
    return acc + (match ? 1 : 0);
  }, 0);
  const complementary = compScore > 0;

  // ── Clash detection — expanded ────────────────────────────────────────────
  const CLASH_PAIRS = [
    ["gourmand","aquatic"],["gourmand","marine"],["gourmand","green"],
    ["amber","aquatic"],["amber","marine"],
    ["oud","fresh"],["oud","citrus"],["oud","aquatic"],
    ["tobacco","aquatic"],["tobacco","fresh"],
  ];
  const clashScore = CLASH_PAIRS.reduce((acc,[a,b])=>{
    const match = (bd.includes(a) && td.includes(b)) || (bd.includes(b) && td.includes(a));
    return acc + (match ? 1 : 0);
  }, 0);
  const clash = clashScore > 0;

  // ── Concentration check — attar/oil base is always safer ─────────────────
  const baseIsOil = /attar|oil|no\d/i.test(base.n + base.h);
  const oilBonus = baseIsOil ? 0.5 : 0;

  // ── Same inspiration bonus ────────────────────────────────────────────────
  const sameInspiration = (base.i||"").trim() && (top.i||"").trim() &&
    norm(base.i||"").split(/[×x]/)[0].trim() === norm(top.i||"").split(/[×x]/)[0].trim();

  // ── Score assembly ────────────────────────────────────────────────────────
  let raw = 4
    + shared.length * 1.5
    + compScore * 1.2
    - clashScore * 2.5
    + (sameInspiration ? 0.8 : 0)
    + oilBonus
    + knownBonus;

  let score = Math.max(1, Math.min(10, Math.round(raw)));
  let verdict = score>=9 ? "Excellent — proven or highly compatible" : score>=7 ? "Very good pairing" : score>=5 ? "Workable with spray control" : "Do not layer these";
  let ratio = score<=4 ? "Not recommended" : score>=8 ? "2 sprays base + 2 sprays top" : "2 sprays base + 1 light spray top";
  let sprays = score<=4 ? "Skip — wear one of them solo instead." : score>=8 ? "Apply base first, add top evenly. Both should be audible in the blend." : "Let the base lead. Top should only lift the opening.";

  let why = knownNote ? knownNote + " " : "";
  if (score>=8){
    why += "Strong structural connection — enough shared DNA for coherence, enough contrast for dimension. ";
  } else if (score>=5){
    why += "Can work with discipline. Base should carry the identity; top adds one layer of lift or tonal shift. ";
    why += "Overspray the top and it gets muddy. ";
  } else {
    why += "Weak pairing — the DNA profiles compete rather than support each other. ";
  }
  if (shared.length) why += `Shared DNA: ${shared.join(", ")}. `;
  else why += "No direct DNA overlap — blend coherence depends entirely on spray balance. ";
  if (complementary && compScore >= 2) why += "Multiple complementary DNA pairs work in its favour. ";
  if (clash) why += `Clash risk (${CLASH_PAIRS.filter(([a,b])=>(bd.includes(a)&&td.includes(b))||(bd.includes(b)&&td.includes(a))).map(p=>p.join("+")?.[0]).join(", ")}) — keep sprays conservative. `;

  const baseRole = getLayerRoleSummary(base);
  const topRole  = getLayerRoleSummary(top);
  const placement = getLayerPlacement(base, top);

  return {score, verdict, why:why.trim(), ratio, sprays, baseRole, topRole, placement};
}

function getDisplaySections(collection, season){
  const ranked=[...collection].map(f=>({item:f,score:scoreDisplay(f,season)})).sort((a,b)=>b.score-a.score);
  const display=ranked.slice(0,30).map(x=>x.item);
  const anchors=[],daily=[],statement=[];
  display.forEach(f=>{
    const dna=displayDNAList(f).map(norm);
    if ((f.r||0)>=4 && anchors.length<8) anchors.push(f);
    else if (dna.some(x=>["fresh","woody","citrus","blue","green","vetiver / earthy","musk / powdery","fougere","aquatic"].includes(x)) && daily.length<12) daily.push(f);
    else if (statement.length<10) statement.push(f);
  });
  display.forEach(f=>{
    if (!anchors.includes(f) && !daily.includes(f) && !statement.includes(f)){
      if (daily.length<12) daily.push(f); else if (statement.length<10) statement.push(f); else if (anchors.length<8) anchors.push(f);
    }
  });
  return {anchors,daily,statement,display};
}

async function fetchWeather(pref){
  try{
    if (pref.mode==="manual" && pref.city){
      const ge = await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(pref.city)+"&count=1&language=en&format=json").then(r=>r.json());
      if (ge.results && ge.results[0]){
        const g=ge.results[0];
        return await fetchWeatherByCoords(g.latitude,g.longitude,g.name+(g.admin1?", "+g.admin1:""));
      }
    }
    return new Promise(resolve=>{
      if (!navigator.geolocation) return fetchWeatherByCoords(38.8816,-77.091,"Arlington area").then(resolve);
      navigator.geolocation.getCurrentPosition(
        pos=>fetchWeatherByCoords(pos.coords.latitude,pos.coords.longitude).then(resolve),
        _=>fetchWeatherByCoords(38.8816,-77.091,"Arlington area").then(resolve),
        {enableHighAccuracy:false,timeout:8000,maximumAge:300000}
      );
    });
  }catch(e){
    return {loading:false,error:"Unable to load weather.",temp:null,code:null,wind:null,humidity:null,city:"Your area"};
  }
}
async function resolveWeatherCity(lat,lon){
  try{
    const resp = await fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+encodeURIComponent(lat)+"&lon="+encodeURIComponent(lon)+"&zoom=10&addressdetails=1", {
      headers: {"Accept":"application/json"}
    });
    const rg = await resp.json();
    const a = rg && rg.address ? rg.address : null;
    if (!a) return "Your area";
    const city = a.city || a.town || a.village || a.hamlet || a.municipality || a.county;
    const state = a.state || a.region;
    if (city && state) return city + ", " + state;
    if (city) return city;
    if (state) return state;
    return rg.display_name ? String(rg.display_name).split(',').slice(0,2).join(', ').trim() : "Your area";
  }catch(e){
    return "Your area";
  }
}
async function fetchWeatherByCoords(lat,lon,label=""){
  const wd = await fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph").then(r=>r.json());
  const cityLabel = label || await resolveWeatherCity(lat,lon);
  return {loading:false,error:"",temp:wd.current?.temperature_2m??null,code:wd.current?.weather_code??null,wind:wd.current?.wind_speed_10m??null,humidity:wd.current?.relative_humidity_2m??null,city:cityLabel||"Your area"};
}
function getWeatherLabel(code){
  if (code===0) return "Clear";
  if ([1,2,3].includes(code)) return "Partly cloudy";
  if ([61,63,65,80,81,82].includes(code)) return "Rain";
  return "Current conditions";
}

function toggleHiddenRecommendation(f){
  const key = getFragranceKey(f);

  const arr = getHiddenRecommendationKeys().slice();

  addRecentChange("toggle_hide_recommendation", f.n || "Unknown fragrance", f.h || "");
  render();

function getUserAddedFragranceEntries(){
  const raw = Array.isArray(state.userFragrances) ? state.userFragrances : [];
  return raw.map(item=>{
    const built = makeUserFragranceObject(item);
    const builtInMatch = COLLECTION.find(f =>
      norm(String(f.n || "")) === norm(String(item.name || built.n || "")) &&
      norm(String(f.h || "")) === norm(String(item.house || built.h || ""))
    ) || COLLECTION.find(f =>
      norm(String(f.n || "")) === norm(String(item.name || built.n || ""))
    ) || null;
    return { raw: item, fragrance: built, id: item.id || "", builtInMatch };
  }).filter(x=>x.fragrance && x.fragrance.n);
}

function getCollectionIntegrityReport(){
  const builtIn = Array.isArray(COLLECTION) ? COLLECTION.length : 0;
  const userAdded = safeArray(state.userFragrances).length;
  const all = getAllCollection();
  const byName = {}, byHouseName = {};
  let missingInspiration = 0, missingDNA = 0, planeSafe = 0, favorites = getFavoriteItems().length;
  all.forEach(f=>{
    const n = norm(f.n || "");
    const hk = `${norm(f.h||"")}__${n}`;
    byName[n] = (byName[n] || 0) + 1;
    byHouseName[hk] = (byHouseName[hk] || 0) + 1;
    if (!String(f.i || "").trim()) missingInspiration += 1;
    if (!displayDNAList(f).length) missingDNA += 1;
    if (typeof getPlaneSafetyLevel === "function" && getPlaneSafetyLevel(f) === "Plane Safe") planeSafe += 1;
  });
  return {
    builtIn, userAdded, total: all.length,
    sameName: Object.values(byName).filter(x=>x>1).length,
    exactDupes: Object.values(byHouseName).filter(x=>x>1).length,
    missingInspiration, missingDNA, planeSafe, favorites
  };
}

function renderExplainabilityChipsFromFragrance(f, context={}){
  let total = 0, fit = 0, confidence = 0, risk = 0, weather = 0, occasion = 0, uniqueness = 0, performance = 0;
  try{
    if (typeof getNormalizedScoreModel === "function"){
      const model = getNormalizedScoreModel(f, context);
      total = model.total || 0;
      fit = model.fit || 0;
      confidence = model.confidence || 0;
      risk = model.risk || 0;
      const s = model.signals || {};
      weather = s.weatherFit || 0;
      occasion = s.occasionFit || 0;
      uniqueness = s.uniquenessFit || 0;
      performance = s.performanceConfidence || 0;
    }
  }catch(_){}
  const chips = [
    {cls:"good", sym:"✦", label:"Fit", val:fit || total},
    {cls:"", sym:"◔", label:"Confidence", val:confidence},
    {cls:risk >= 6 ? "bad" : risk >= 4 ? "warn" : "good", sym:"◇", label:"Risk", val:risk},
    {cls:"", sym:"☼", label:"Weather", val:weather},
    {cls:"", sym:"◆", label:"Occasion", val:occasion},
    {cls:"", sym:"⬡", label:"Unique", val:uniqueness},
    {cls:"", sym:"≈", label:"Performance", val:performance}
  ].filter(x => Number(x.val) > 0);
  return `<div class="explain-strip">${
    chips.map(c=>`<span class="explain-chip ${c.cls}"><span class="sym">${c.sym}</span><span>${c.label} ${Number(c.val).toFixed(1)}</span></span>`).join("")
  }</div>`;
}

  </div>`;

// ─── Local Fragrance Analyzer Engine ────────────────────────────────────────
// Parses the user's name/house/notes input to extract DNA, occasions, season,
// inspiration, and then scores against the live collection for overlap, gap,
// verdict, layering, and spray guidance — no API call needed.

function parseAnalyzerInput(name, house, notes){
  const bag = norm(`${name} ${house} ${notes}`);

  // ── Step 1: Check if the name matches something already in the collection ──
  // If it does, seed DNA/occasions/season/inspiration directly from that entry.
  const existingMatch = getAllCollection().find(f =>
    norm(f.n) === norm(name) ||
    norm(f.n).includes(norm(name)) ||
    norm(name).includes(norm(f.n))
  );
  if (existingMatch && norm(existingMatch.n) === norm(name)){
    return {
      inspired_by: existingMatch.i || "Original",
      dna: displayDNAList(existingMatch),
      occasions: simplifyOccasionList(existingMatch),
      season: existingMatch.s || "Year-round",
      rating: existingMatch.r || 4
    };
  }

  // ── Step 2: Dua Brand name-pattern → DNA map ───────────────────────────────
  // Covers common Dua naming conventions that plain keyword scan misses.
  const DUA_PATTERNS = [
    {match:["poseidon","swimming","cologne"],       dna:["fresh","aquatic","blue","woody"],         occ:["Casual","Office"],    season:"Spring · Summer", insp:"Creed Aventus Cologne"},
    {match:["casino royale"],                       dna:["fresh","citrus","woody","amber"],         occ:["Office","Casual"],    season:"Spring · Summer", insp:"Creed Aventus"},

    {match:["drowning","bleu de dua"],              dna:["blue","citrus","aquatic","woody"],         occ:["Office","Casual"],    season:"Year-round",       insp:"Bleu de Chanel + Nishane Ani"},
    {match:["bleu de dua"],                         dna:["blue","citrus","woody","musk / powdery"], occ:["Office","Casual"],    season:"Year-round",       insp:"Bleu de Chanel"},
    {match:["bleu de savage","savage","fierce"],    dna:["blue","citrus","spicy","woody"],           occ:["Casual","Date"],      season:"Year-round",       insp:"Dior Sauvage"},
    {match:["ottoman","hacivat"],                   dna:["fresh","green","citrus","woody"],          occ:["Casual","Office"],    season:"Spring · Summer", insp:"Nishane Hacivat"},
    {match:["midnight rendezvous","la nuit"],       dna:["amber","sweet","spicy","woody"],           occ:["Date","Evening"],     season:"Fall · Winter",    insp:"Paco Rabanne La Nuit"},
    {match:["aphrodisiac","psychedelic"],           dna:["amber","spicy","sweet","woody"],           occ:["Date","Evening"],     season:"Fall · Winter",    insp:"Initio Psychedelic Love"},
    {match:["black widow","phantom"],               dna:["sweet","gourmand","woody","amber"],        occ:["Evening","Date"],     season:"Fall · Winter",    insp:"Kilian Black Phantom"},
    {match:["jean lowe immortal","immensité"],      dna:["aquatic","woody","fresh","musk / powdery"],occ:["Casual","Office"],   season:"Year-round",       insp:"Louis Vuitton L'Immensité"},
    {match:["jean lowe vibe","pacific chill"],      dna:["fresh","citrus","aquatic","green"],        occ:["Casual"],             season:"Spring · Summer", insp:"Louis Vuitton Pacific Chill"},
    {match:["khamrah"],                             dna:["gourmand","sweet","amber","spicy"],        occ:["Evening","Date"],     season:"Fall · Winter",    insp:"Original"},
    {match:["fortune","naxos"],                     dna:["sweet","gourmand","amber","woody"],        occ:["Evening","Date"],     season:"Fall · Winter",    insp:"Xerjoff Naxos"},
    {match:["imperial blue","millesime"],           dna:["aquatic","fresh","citrus","musk / powdery"],occ:["Casual","Office"], season:"Spring · Summer", insp:"Creed Millésime Impérial"},
    {match:["city of","city of stars"],             dna:["sweet","amber","musk / powdery","woody"], occ:["Evening","Date"],     season:"Fall · Winter",    insp:"Louis Vuitton City of Stars"},
    {match:["cola fizz","tonka"],                   dna:["sweet","gourmand","amber","spicy"],        occ:["Casual","Evening"],   season:"Fall · Winter",    insp:"Original"},
    {match:["smoky cuba","tabac"],                  dna:["tobacco","woody","amber","spicy"],         occ:["Evening","Date"],     season:"Fall · Winter",    insp:"Original"},
    {match:["gone swimming","afternoon swim"],      dna:["aquatic","fresh","citrus","musk / powdery"],occ:["Casual"],           season:"Spring · Summer", insp:"Louis Vuitton Afternoon Swim"},
    {match:["midnight fig"],                        dna:["woody","green","sweet","musk / powdery"], occ:["Casual","Evening"],   season:"Fall · Winter",    insp:"Nest Indigo"},
    {match:["rome in yellow","valentino born"],     dna:["citrus","fresh","woody","musk / powdery"],occ:["Casual"],             season:"Spring · Summer", insp:"Valentino Born in Roma"},
    {match:["rome in green"],                       dna:["green","fresh","woody","citrus"],          occ:["Casual"],             season:"Spring · Summer", insp:"Valentino Born in Roma Green"},
    {match:["rome in coral"],                       dna:["fresh","citrus","sweet","musk / powdery"],occ:["Casual"],             season:"Spring · Summer", insp:"Valentino Uomo Born in Roma Coral Fantasy"},
    {match:["true self","myslf"],                   dna:["fresh","woody","amber","citrus"],          occ:["Casual","Office"],    season:"Year-round",       insp:"YSL MYSLF"},
    {match:["cotton candy","poseidon"],             dna:["sweet","fresh","musk / powdery","citrus"],occ:["Casual"],             season:"Spring · Summer", insp:"Creed Aventus + Cotton Candy"},
    {match:["stronger","azure","supernova"],        dna:["fresh","citrus","blue","woody"],           occ:["Office","Casual"],    season:"Year-round",       insp:"Stronger with You + AdG Profondo"},
    {match:["error 413","1m lucky"],                dna:["sweet","spicy","amber","woody"],           occ:["Evening","Date"],     season:"Fall · Winter",    insp:"Paco Rabanne 1 Million Lucky"},
    {match:["error 429","garden tales"],            dna:["fresh","green","citrus","woody"],          occ:["Casual"],             season:"Spring · Summer", insp:"Original"},
    {match:["attitude","coffee","fougere"],         dna:["fougere","gourmand","woody","musk / powdery"],occ:["Office","Casual"],season:"Fall · Winter",    insp:"Original"},
    {match:["electrique","rendezvous","gingembre"], dna:["spicy","fresh","woody","citrus"],          occ:["Casual","Date"],      season:"Year-round",       insp:"Original"},
    {match:["jazz","club"],                         dna:["tobacco","woody","spicy","amber"],         occ:["Evening"],            season:"Fall · Winter",    insp:"MMM Jazz Club"},
    {match:["his perspective","paradigme"],         dna:["woody","fresh","musk / powdery","amber"], occ:["Office","Casual"],    season:"Year-round",       insp:"Prada Paradigme"},
    {match:["intuition vision","profumo"],          dna:["fresh","aquatic","woody","musk / powdery"],occ:["Office","Casual"],  season:"Spring · Summer", insp:"Acqua di Giò Profumo"},
    {match:["gentleman","givenchy"],                dna:["fresh","woody","spicy","musk / powdery"], occ:["Office","Date"],      season:"Year-round",       insp:"Givenchy Gentleman Society"},
  ];

  // Check Dua patterns against the bag
  let duaMatch = null;
  for (const p of DUA_PATTERNS){
    if (p.match.some(m => bag.includes(norm(m)))){ duaMatch = p; break; }
  }

  // ── Step 3: DNA inference from keywords ────────────────────────────────────
  const DNA_SIGNALS = {
    "fresh":           ["fresh","clean","crisp","bright","light","airy","soapy","shower"],
    "citrus":          ["citrus","lemon","lime","bergamot","orange","grapefruit","mandarin","yuzu","zesty","pineapple"],
    "aquatic":         ["aquatic","marine","ocean","sea","water","watery","aqua","oceanic"],
    "blue":            ["blue","bleu","elixir","electric","cobalt","navy","indigo"],
    "green":           ["green","grass","herbal","basil","mint","tea","vetiver lite","fougere lite"],
    "woody":           ["wood","woody","cedar","sandalwood","guaiac","patchouli","vetiver","bark","oud lite"],
    "vetiver / earthy":["vetiver","earthy","earth","soil","mineral","rocky","mossy","terra"],
    "fougere":         ["fougere","lavender","geranium","coumarin","barbershop","aromatic","fern"],
    "musk / powdery":  ["musk","musky","powder","powdery","iris","violet","ambrette","soft","clean musk","skin"],
    "amber":           ["amber","ambre","ambroxan","ambrox","warm","resinous","benzoin","labdanum"],
    "sweet":           ["sweet","vanilla","tonka","sugar","caramel","honey","praline","creamy"],
    "gourmand":        ["gourmand","gourmande","food","dessert","chocolate","coffee","cocoa","pastry","cookie","cake","hazelnut"],
    "spicy":           ["spicy","spice","pepper","cardamom","cinnamon","ginger","nutmeg","clove","hot"],
    "oud":             ["oud","aoud","incense","smoky","smoke","resin","dark","tarry","bakhoor"],
    "tobacco":         ["tobacco","tabac","pipe","leather","leathery"],
  };

  const dnaSig = [];
  for (const [tag, signals] of Object.entries(DNA_SIGNALS)){
    if (signals.some(s => bag.includes(s))) dnaSig.push(tag);
  }

  // Merge Dua pattern DNA with keyword DNA (Dua pattern takes priority)
  const dna = duaMatch
    ? [...new Set([...duaMatch.dna, ...dnaSig])]
    : dnaSig;

  // ── Step 4: Inspiration ────────────────────────────────────────────────────
  const INSPIRATION_MAP = [
    {match:["casino royale","royale"],        insp:"Creed Aventus"},
    {match:["aventus"],                       insp:"Creed Aventus"},
    {match:["bleu de chanel","bleu chanel"],  insp:"Bleu de Chanel"},
    {match:["sauvage"],                       insp:"Dior Sauvage"},
    {match:["acqua di gio"],                  insp:"Armani Acqua di Giò"},
    {match:["layton"],                        insp:"Parfums de Marly Layton"},
    {match:["hacivat","hacivet"],             insp:"Nishane Hacivat"},
    {match:["imagination"],                   insp:"Louis Vuitton Imagination"},
    {match:["ultra male"],                    insp:"JPG Ultra Male"},
    {match:["myslf"],                         insp:"YSL MYSLF"},
    {match:["terre d'hermès","terre hermes"], insp:"Hermès Terre d'Hermès"},
    {match:["baccarat rouge","br 540"],       insp:"Baccarat Rouge 540"},
    {match:["one million","1 million"],        insp:"Paco Rabanne 1 Million"},
    {match:["percival"],                       insp:"Parfums de Marly Percival"},
    {match:["khamrah"],                        insp:"Lattafa Khamrah"},
    {match:["silver mountain water","smw"],    insp:"Creed Silver Mountain Water"},
    {match:["irish tweed","green irish"],      insp:"Creed Green Irish Tweed"},
    {match:["millesime imperial"],             insp:"Creed Millésime Impérial"},
    {match:["herod"],                          insp:"Parfums de Marly Herod"},
    {match:["pegasus"],                        insp:"Parfums de Marly Pegasus"},
    {match:["invictus"],                       insp:"Paco Rabanne Invictus"},
    {match:["y elixir","ysl y"],               insp:"YSL Y EDP"},
    {match:["l'homme","l homme"],              insp:"Prada L'Homme"},
  ];

  let inspired_by = duaMatch ? duaMatch.insp : "Original";
  if (!duaMatch){
    for (const entry of INSPIRATION_MAP){
      if (entry.match.some(m => bag.includes(m))){ inspired_by = entry.insp; break; }
    }
  }

  // ── Step 5: Occasions ──────────────────────────────────────────────────────
  let occasions = duaMatch ? [...duaMatch.occ] : [];
  const addOcc = o => { if (!occasions.includes(o)) occasions.push(o); };
  if (/office|work|professional|business|formal/.test(bag)) addOcc("Office");
  if (/casual|every ?day|daily|daytime|weekend/.test(bag)) addOcc("Casual");
  if (/date|romantic|seductive|sensual|intimate/.test(bag)) addOcc("Date");
  if (/evening|night|club|dinner|going out/.test(bag)) addOcc("Evening");
  if (/gym|sport|athletic|workout|active/.test(bag)) addOcc("Gym");
  if (/plane|flight|travel|airplane/.test(bag)) addOcc("Plane");
  if (!occasions.length){
    if (dna.some(d=>["fresh","citrus","aquatic","blue","green"].includes(d))) addOcc("Casual");
    if (dna.some(d=>["woody","fougere","musk / powdery"].includes(d))) addOcc("Office");
    if (dna.some(d=>["amber","sweet","gourmand","spicy","oud"].includes(d))) addOcc("Evening");
    if (!occasions.length) addOcc("Casual");
  }

  // ── Step 6: Season ─────────────────────────────────────────────────────────
  let season = duaMatch ? duaMatch.season : "Year-round";
  if (!duaMatch){
    const hasWarm = dna.some(d=>["fresh","citrus","aquatic","blue","green"].includes(d));
    const hasCold = dna.some(d=>["amber","sweet","gourmand","spicy","oud","tobacco"].includes(d));
    if (/spring|summer/.test(bag) && !/fall|winter/.test(bag)) season = "Spring · Summer";
    else if (/fall|winter|autumn/.test(bag) && !/spring|summer/.test(bag)) season = "Fall · Winter";
    else if (hasWarm && !hasCold) season = "Spring · Summer";
    else if (hasCold && !hasWarm) season = "Fall · Winter";
  }

  // ── Step 7: Rating ─────────────────────────────────────────────────────────
  let rating = 4;
  if (/masterpiece|incredible|perfect|elite|best/.test(bag)) rating = 5;
  if (/average|mediocre|weak|so-so|meh/.test(bag)) rating = 3;
  if (/bad|terrible|dislike|hate/.test(bag)) rating = 2;

  return { inspired_by, dna: dna.length ? dna : ["fresh"], occasions, season, rating };
}

function buildLocalAnalysis(name, house, notes){
  const parsed = parseAnalyzerInput(name, house, notes);
  const all    = getAllCollection();
  const candidateDNA  = parsed.dna.map(norm);
  const candidateOccs = parsed.occasions;
  const inspirLower   = norm(parsed.inspired_by);
  const season        = parsed.season;

  const overlaps = all.map(f => {
    const fDNA  = displayDNAList(f).map(norm);
    const fOccs = simplifyOccasionList(f);
    let score = 0;
    candidateDNA.forEach(d => { if (fDNA.includes(d)) score += 2; });
    candidateOccs.forEach(o => { if (fOccs.includes(o)) score += 1; });
    const fInspLower = norm(f.i || "");
    if (inspirLower && inspirLower !== "original" && fInspLower && fInspLower === inspirLower) score += 5;
    if (inspirLower && fInspLower && inspirLower !== "original" && fInspLower.includes(inspirLower)) score += 3;
    return { item: f, score, sharedDNA: candidateDNA.filter(d=>fDNA.includes(d)), sharedOcc: candidateOccs.filter(o=>fOccs.includes(o)) };
  }).sort((a,b)=>b.score-a.score).slice(0,5);

  const best = overlaps[0];
  const topScore = best ? best.score : 0;

  let verdict, verdict_reason, overlap_risk;
  if (topScore >= 10){
    verdict = "Good But Redundant"; overlap_risk = "High";
    verdict_reason = `Very close to ${best.item.n} (${best.item.h}) in both DNA and occasion fit. Unless the price or format is materially different, it doesn't add a new lane.`;
  } else if (topScore >= 6){
    verdict = "Interesting But Unnecessary"; overlap_risk = "Moderate";
    verdict_reason = `Some overlap with ${best.item.n} (shared: ${best.sharedDNA.join(", ")||"occasion fit"}), but not a direct copy. Worth sampling before buying.`;
  } else if (topScore >= 3){
    verdict = "Worth Considering"; overlap_risk = "Low";
    verdict_reason = `Light overlap with ${best && best.item ? best.item.n : "existing bottles"} — different enough to stand on its own if the DNA appeals to you.`;
  } else {
    verdict = "Strong Add"; overlap_risk = "Low";
    verdict_reason = "No meaningful overlap with your current collection. This would fill a real gap.";
  }

  const overlap_note = best && best.score >= 3
    ? `Closest: ${best.item.n} (${best.item.h}) — shared DNA: ${best.sharedDNA.join(", ")||"occasion only"}`
    : "No significant overlap identified.";

  const dnaCounts = {};
  all.forEach(f => displayDNAList(f).forEach(d => dnaCounts[norm(d)] = (dnaCounts[norm(d)]||0)+1));
  const rareInCollection = candidateDNA.filter(d => !dnaCounts[d] || dnaCounts[d] <= 2);
  const collection_gap_filled = rareInCollection.length
    ? `Adds rare DNA for this collection: ${rareInCollection.join(", ")}.`
    : (topScore < 4 ? "Fills an underrepresented occasion or style lane." : "None — this DNA is already well covered.");

  const dnaSet = new Set(candidateDNA);
  const hasRich   = dnaSet.has("amber")||dnaSet.has("sweet")||dnaSet.has("gourmand")||dnaSet.has("spicy")||dnaSet.has("oud")||dnaSet.has("tobacco");
  const hasFresh  = dnaSet.has("fresh")||dnaSet.has("citrus")||dnaSet.has("aquatic")||dnaSet.has("blue")||dnaSet.has("green")||dnaSet.has("musk / powdery")||dnaSet.has("woody");
  const veryRisky = dnaSet.has("gourmand")||dnaSet.has("oud")||dnaSet.has("tobacco")||inspirLower.includes("oud");
  const plane_safe = veryRisky ? "Not Plane Safe" : (hasFresh && !hasRich) ? "Plane Safe" : (hasFresh && hasRich) ? "Safe Enough" : "Not Plane Safe";

  const primaryOcc = candidateOccs[0] || "Casual";
  const sprayMap = {"Office":"2–3 sprays. Keep it controlled.","Plane":"1–2 sprays maximum.","Gym":"1–2 sprays. Light application only.","Casual":"3–4 sprays. Easy wear.","Date":"3–4 sprays. Let it project.","Evening":"4–5 sprays. Full presence."};
  const spray_guidance = sprayMap[primaryOcc] || "3–4 sprays depending on occasion.";

  const layeringCandidates = all.filter(f => {
    const fDNA = displayDNAList(f).map(norm);
    const freshTop  = candidateDNA.some(d=>["fresh","citrus","aquatic","blue"].includes(d));
    const woodyBase = candidateDNA.some(d=>["woody","amber","fougere","vetiver / earthy"].includes(d));
    if (freshTop  && fDNA.some(d=>["woody","amber","musk / powdery"].includes(d))) return true;
    if (woodyBase && fDNA.some(d=>["fresh","citrus","aquatic"].includes(d))) return true;
    return candidateDNA.filter(d=>fDNA.includes(d)).length >= 2;
  }).slice(0,3).map(f=>f.n);
  const layering_potential = layeringCandidates.length ? layeringCandidates.join(", ") : "None obvious from current collection DNA.";

  const summaryParts = [];
  summaryParts.push(`${name}${house?" from "+house:""} reads as a ${candidateDNA.slice(0,3).join(", ")||"versatile"} fragrance best suited for ${candidateOccs.slice(0,2).join(" and ")||"casual"} wear in ${season.toLowerCase()} conditions.`);
  summaryParts.push(topScore >= 6 ? `It sits close to ${best.item.n} in your collection, so buy or skip will come down to price and format.` : `It doesn't closely overlap anything you already own, giving it a clear reason to exist on the shelf.`);
  if (rareInCollection.length) summaryParts.push(`The ${rareInCollection[0]} angle is underrepresented in the collection, which works in its favor.`);

  return {
    inspired_by: parsed.inspired_by,
    dna: parsed.dna,
    occasions: parsed.occasions,
    season: parsed.season,
    rating: parsed.rating,
    verdict, verdict_reason, overlap_risk, overlap_note,
    collection_gap_filled, spray_guidance, plane_safe,
    layering_potential, summary: summaryParts.join(" "),
    _source: "local"
  };
}

async function runAIAnalyzer(){
  const name  = (state.aiAnalyzer.name  || "").trim();
  const house = (state.aiAnalyzer.house || "").trim();
  const notes = (state.aiAnalyzer.notes || "").trim();
  const apiKey = (state.apiKey || "").trim();

  if (!name){ state.aiAnalyzer.error = "Enter a fragrance name first."; render(); return; }

  state.aiAnalyzer.error = "";
  state.aiAnalyzer.loading = true;
  state.aiAnalyzer.result  = null;
  render();

  // ── API path: use Claude when key is present ───────────────────────────────
  if (apiKey){
    try {
      const all = getAllCollection();
      const dnaCounts = {};
      all.forEach(f => displayDNAList(f).forEach(d => dnaCounts[d] = (dnaCounts[d]||0)+1));
      const topDNA = Object.entries(dnaCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([d,n])=>`${d}(${n})`).join(", ");
      const houseCounts = {};
      all.forEach(f => houseCounts[f.h] = (houseCounts[f.h]||0)+1);
      const topHouses = Object.entries(houseCounts).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([h,n])=>`${h}(${n})`).join(", ");

      // Favorites context
      const favNames = getFavoriteNameList(12).join(", ");
      // Wear frequency — top 10 most worn
      const wearCounts = {};
      (state.wearLog||[]).forEach(e => { const key = getWearEntryKey(e); wearCounts[key] = (wearCounts[key]||0)+1; });
      const topWorn = Object.entries(wearCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,ct])=>`${getFragranceNameByKey(n)}(${ct}x)`).join(", ");
      // Recently worn — last 14 days
      const cutoff = new Date(Date.now() - 14*86400000).toISOString().slice(0,10);
      const recentWorn = [...new Set((state.wearLog||[]).filter(e=>e.date>=cutoff).map(e=>getFragranceNameByKey(getWearEntryKey(e))))].slice(0,8).join(", ");

      const prompt = `You are an expert fragrance analyst. Analyze this fragrance against a personal collection and return ONLY a JSON object — no markdown, no backticks, no explanation.

COLLECTION (${all.length} bottles): Top houses: ${topHouses}. Top DNA: ${topDNA}. Skews masculine, heavy in Aventus-cluster, blues, aquatics, dark ambers.
FAVORITES (${getFavoriteCount()} starred): ${favNames||"None yet"}.
MOST WORN: ${topWorn||"No wear data yet"}.
RECENTLY WORN (last 14 days): ${recentWorn||"Nothing logged recently"}.

FRAGRANCE: Name: "${name}"${house?`, House: "${house}"`:""}${notes?`, Notes: "${notes}"`:""}

Return this exact JSON structure:
{"inspired_by":"clone/inspiration or Original","dna":["tag1","tag2","tag3"],"occasions":["Casual","Office","Date","Evening","Gym","Plane"],"season":"Year-round|Spring · Summer|Fall · Winter","rating":4,"verdict":"Strong Add|Worth Considering|Interesting But Unnecessary|Good But Redundant","verdict_reason":"1-2 sentences","overlap_risk":"Low|Moderate|High","overlap_note":"closest bottle in the collection and why","collection_gap_filled":"what gap this fills or None","spray_guidance":"concise spray count for primary occasion","plane_safe":"Plane Safe|Safe Enough|Not Plane Safe","layering_potential":"existing bottles it pairs well with","summary":"2-3 sentence overall take"}`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-allow-browser": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5",
          max_tokens: 1024,
          messages: [{ role: "user", content: prompt }]
        })
      });

      if (!response.ok){
        const err = await response.json().catch(()=>({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const text = (data.content||[]).map(b=>b.text||"").join("").trim()
        .replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/```\s*$/,"").trim();
      const parsed = JSON.parse(text);

      // Run local overlap scoring on top of AI classification
      const local = buildLocalAnalysis(name, house, notes);
      // Merge: trust AI for dna/inspired_by/verdict/summary, trust local for overlap scoring
      const result = {
        ...parsed,
        overlap_note:         local.overlap_note,
        collection_gap_filled:local.collection_gap_filled,
        layering_potential:   local.layering_potential,
        plane_safe:           local.plane_safe,
        spray_guidance:       local.spray_guidance,
        _source: "claude"
      };

      state.aiAnalyzer.result  = result;
      state.aiAnalyzer.loading = false;
      state.newFragrance = {
        house: house || "", name,
        inspiration: result.inspired_by || "",
        dna: (result.dna||[]).join(", "),
        occasions: (result.occasions||[]).join(", "),
        season: result.season || "Year-round",
        rating: String(result.rating || 4)
      };
      render();
      return;

    } catch(e){
      // API failed — fall through to local with error note
      state.aiAnalyzer.error = `API error: ${e.message}. Showing local analysis instead.`;
    }
  }

  // ── Local fallback ─────────────────────────────────────────────────────────
  setTimeout(()=>{
    try {
      const result = buildLocalAnalysis(name, house, notes);
      state.aiAnalyzer.result  = result;
      state.aiAnalyzer.loading = false;
      state.newFragrance = {
        house: house || "", name,
        inspiration: result.inspired_by || "",
        dna: result.dna.join(", "),
        occasions: result.occasions.join(", "),
        season: result.season,
        rating: String(result.rating)
      };
    } catch(e){
      state.aiAnalyzer.loading = false;
      state.aiAnalyzer.error   = "Analysis failed: " + (e.message || "unknown error");
    }
    render();
  }, 600);
}
